<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Southwest Edge Portal</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="icon" type="image/png" sizes="180x180" href="icon-180.png">
<meta name="theme-color" content="#E1531A">
<link rel="apple-touch-icon" href="icon-180.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SW Edge">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --edge:#E1531A;
    --edge-dark:#B8410F;
    --edge-darker:#8F3009;
    --edge-light:#FDECE3;
    --edge-lighter:#FFF7F3;
    --ink:#20242C;
    --ink-soft:#5B6270;
    --line:#E7E5E2;
    --line-soft:#F0EEEB;
    --paper:#FFFFFF;
    --canvas:#FAF9F7;
    --good:#3E8E5B;
    --bad:#D64545;
    --warn:#C98A1E;
    --radius:10px;
    --shadow:0 12px 40px rgba(32,20,10,0.14);
    --shadow-sm:0 2px 8px rgba(32,20,10,0.06);
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--canvas);
    color:var(--ink);
    overflow:hidden;
  }
  #app{height:100vh;width:100vw;display:flex;flex-direction:column;position:relative;}
  button{font-family:inherit;cursor:pointer;}
  input,select,textarea{font-family:inherit;}
  a{color:inherit;}
  ::-webkit-scrollbar{width:8px;height:8px;}
  ::-webkit-scrollbar-thumb{background:#DDD8D2;border-radius:8px;}
  ::-webkit-scrollbar-track{background:transparent;}

  /* ---------- LOGIN ---------- */
  .login-wrap{
    min-height:100vh;width:100vw;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;
    background:var(--canvas);
    padding:48px 24px;overflow-y:auto;
  }
  .login-logo{margin-bottom:2px;}
  .login-logo img{height:64px;width:auto;display:block;margin:0 auto;}
  .login-title{font-size:30px;font-weight:600;margin-top:14px;color:var(--edge);}
  .login-title-sub{font-size:16px;font-weight:600;margin-top:2px;color:var(--edge);}
  .login-tag{color:var(--ink);margin-top:8px;font-size:17px;letter-spacing:.02em;font-style:italic;font-weight:600;}
  .login-card{
    background:var(--paper);border-radius:16px;box-shadow:var(--shadow);width:420px;max-width:100%;
    padding:30px 30px 26px;margin-top:34px;
  }
  .login-card-title{font-size:20px;font-weight:600;color:var(--edge);margin-bottom:16px;}
  .login-user-row{
    display:flex;align-items:center;gap:12px;border:1.5px solid var(--line);border-radius:10px;padding:11px 14px;
    margin-bottom:10px;cursor:pointer;transition:border-color .12s, background .12s;
  }
  .login-user-row:hover{border-color:#EFC1A8;}
  .login-user-row.selected{border-color:var(--edge);background:var(--edge-lighter);}
  .login-user-row .user-avatar{
    width:34px;height:34px;border-radius:50%;background:var(--edge);color:#fff;font-weight:600;font-size:13px;
    display:flex;align-items:center;justify-content:center;flex-shrink:0;
  }
  .login-user-row .user-name{font-weight:600;font-size:14.5px;color:var(--edge-darker);}
  .login-user-row .user-handle{font-size:12px;color:var(--ink-soft);margin-top:1px;}
  .login-password-field{
    width:100%;padding:11px 13px;border:1px solid var(--line);border-radius:9px;font-size:13.5px;
    background:var(--line-soft);margin-top:6px;
  }
  .login-submit-btn{
    width:100%;padding:12px;border:none;border-radius:9px;background:var(--edge);color:#fff;font-weight:600;
    font-size:14.5px;margin-top:14px;
  }
  .login-submit-btn:hover{background:var(--edge-dark);}
  .login-hint{margin-top:16px;font-size:12px;color:var(--ink-soft);text-align:left;line-height:1.55;}
  .login-register-link{
    display:block;text-align:center;margin-top:14px;color:var(--edge);font-weight:600;font-size:13.5px;
    background:none;border:none;width:100%;padding:6px;
  }
  .login-register-panel{
    margin-top:14px;padding-top:14px;border-top:1px solid var(--line);
  }
  .login-register-panel .field{margin-bottom:10px;}
  .login-register-panel label{font-size:11.5px;font-weight:600;color:var(--ink-soft);display:block;margin-bottom:4px;}
  .login-register-panel input{
    width:100%;padding:9px 11px;border:1px solid var(--line);border-radius:8px;font-size:13px;
  }

  /* ---------- BUTTONS ---------- */
  .btn{
    background:var(--edge);color:#fff;border:none;border-radius:8px;padding:9px 16px;font-size:13px;font-weight:600;
    transition:background .12s;
  }
  .btn:hover{background:var(--edge-dark);}
  .btn.secondary{background:var(--paper);color:var(--ink);border:1px solid var(--line);}
  .btn.secondary:hover{background:var(--line-soft);}
  .btn.ghost{background:transparent;color:var(--edge);border:1px solid var(--edge);}
  .btn.ghost:hover{background:var(--edge-light);}
  .btn.sm{padding:6px 11px;font-size:12px;}
  .btn.danger{background:var(--bad);}
  .btn:disabled{opacity:.45;cursor:not-allowed;}

  /* ---------- LEASING REPORT (LSR) ---------- */
  .lsr-dead-date{font-size:11px;color:var(--bad);font-weight:600;}
  .print-only{display:none;}
  @media print{
    body *{visibility:hidden;}
    #lsrPrintArea, #lsrPrintArea *{visibility:visible;}
    .no-print{display:none !important;}
    .print-only{display:block !important;}
    /* Release every ancestor's scroll/height/overflow clipping so the report can
       flow across as many pages as it needs, instead of being cut to what fit
       on screen inside the modal's own scrollable viewport. */
    .modal-overlay, .modal-card, .modal-body{
      position:static !important; overflow:visible !important; max-height:none !important;
      height:auto !important; width:auto !important; box-shadow:none !important; background:none !important;
    }
    #lsrPrintArea{position:static;width:100%;}
    @page{size:landscape;margin:12mm;}
  }

  /* ---------- CALENDAR VIEW ---------- */
  .cv-overlay{position:fixed;inset:0;background:rgba(20,14,8,0.5);z-index:150;display:flex;align-items:center;justify-content:center;}
  .cv-card{background:var(--canvas);width:96vw;height:92vh;border-radius:14px;box-shadow:var(--shadow);display:flex;flex-direction:column;overflow:hidden;}
  .cv-head{background:var(--edge);color:#fff;padding:14px 22px;display:flex;align-items:center;gap:14px;}
  .cv-head-title{font-size:19px;font-weight:700;flex:1;}
  .cv-nav-btn{background:rgba(255,255,255,.18);border:none;color:#fff;width:32px;height:32px;border-radius:8px;font-size:15px;}
  .cv-nav-btn:hover{background:rgba(255,255,255,.32);}
  .cv-legend{display:flex;gap:16px;padding:10px 22px;background:var(--paper);border-bottom:1px solid var(--line);font-size:12px;color:var(--ink-soft);align-items:center;}
  .cv-legend-dot{display:inline-block;width:11px;height:11px;border-radius:3px;margin-right:5px;vertical-align:middle;}
  .cv-grid{flex:1;overflow-y:auto;display:grid;grid-template-columns:repeat(7,1fr);grid-auto-rows:minmax(110px,1fr);padding:10px;gap:6px;}
  .cv-dow{grid-row:1;text-align:center;font-size:11px;font-weight:700;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.04em;padding:4px 0;}
  .cv-day{
    background:var(--paper);border:1px solid var(--line);border-radius:8px;padding:6px;overflow-y:auto;
    display:flex;flex-direction:column;gap:4px;
  }
  .cv-day.other-month{background:var(--canvas);opacity:.55;}
  .cv-day.is-today{border-color:var(--edge);box-shadow:0 0 0 2px rgba(225,83,26,.18) inset;}
  .cv-day-num{font-size:12px;font-weight:700;color:var(--ink-soft);margin-bottom:2px;}
  .cv-day.is-today .cv-day-num{color:var(--edge-dark);}
  .cv-day.drag-over{background:var(--edge-lighter);border-color:var(--edge);}
  .cv-card-note{
    font-size:11px;padding:4px 6px;border-radius:5px;cursor:grab;line-height:1.3;
    background:var(--edge-light);color:var(--edge-darker);border-left:3px solid var(--edge);
  }
  .cv-card-note.assigned-other{
    background:#E6F0FA;color:#1D5A99;border-left-color:#3B82C4;
  }
  .cv-card-note:active{cursor:grabbing;}

  /* ---------- PULL TO REFRESH ---------- */
  #pullRefreshIndicator{
    position:fixed;top:0;left:50%;transform:translate(-50%,-100%);z-index:900;
    background:var(--edge);color:#fff;padding:8px 16px;border-radius:0 0 12px 12px;font-size:12.5px;font-weight:600;
    box-shadow:var(--shadow-sm);transition:transform .15s ease-out;display:flex;align-items:center;gap:8px;
  }
  #pullRefreshIndicator.visible{transition:none;}
  #pullRefreshIndicator .spin{display:inline-block;animation:pullspin 0.8s linear infinite;}
  @keyframes pullspin{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}

  /* ---------- SHELL ---------- */
  .shell{display:flex;height:100vh;width:100vw;}
  .sidebar{
    width:270px;min-width:270px;height:100vh;background:var(--paper);border-right:1px solid var(--line);
    display:flex;flex-direction:column;overflow-y:auto;
  }
  .sidebar-header{
    padding:16px 16px 12px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--line-soft);
  }
  .sidebar-avatar{
    width:36px;height:36px;border-radius:50%;background:var(--edge);color:#fff;font-weight:600;font-size:14px;
    display:flex;align-items:center;justify-content:center;flex-shrink:0;
  }
  .sidebar-user{font-weight:600;font-size:14px;}
  .sidebar-sub{font-size:11px;color:var(--ink-soft);}
  .sidebar-topicons{margin-left:auto;display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end;}
  .icon-btn{
    width:30px;height:30px;border-radius:8px;border:none;background:transparent;display:flex;align-items:center;
    justify-content:center;font-size:15px;color:var(--ink-soft);
  }
  .icon-btn:hover{background:var(--line-soft);color:var(--ink);}

  .nav-section-label{
    font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--ink-soft);font-weight:600;
    padding:14px 16px 6px;display:flex;align-items:center;justify-content:space-between;
  }
  .nav-add{
    width:20px;height:20px;border-radius:50%;background:var(--edge-light);color:var(--edge-dark);border:none;
    font-size:13px;line-height:1;display:flex;align-items:center;justify-content:center;font-weight:600;
  }
  .nav-list{display:flex;flex-direction:column;padding:0 8px;}
  .nav-row-wrap{
    display:flex;align-items:center;border-radius:8px;position:relative;
  }
  .nav-row-wrap:hover{background:var(--edge-lighter);}
  .nav-row-wrap:hover .nav-ellipsis{opacity:1;}
  .nav-row-wrap.active{background:var(--edge-light);}
  .nav-row-wrap.active .nav-row{color:var(--edge-darker);font-weight:600;}
  .nav-row{
    display:flex;align-items:center;gap:10px;padding:9px 8px;font-size:13.5px;color:var(--ink);flex:1;min-width:0;
    border:none;background:transparent;text-align:left;
  }
  .nav-ellipsis{
    background:none;border:none;color:var(--ink-soft);font-size:13px;padding:6px 8px;border-radius:6px;
    opacity:0;flex-shrink:0;margin-right:4px;
  }
  .nav-ellipsis:hover{opacity:1 !important;background:var(--line-soft);}
  .nav-context-menu{
    position:absolute;top:34px;right:6px;background:#fff;border:1px solid var(--line);border-radius:8px;
    box-shadow:var(--shadow);z-index:250;min-width:150px;overflow:hidden;
  }
  .nav-context-menu button{
    display:block;width:100%;text-align:left;padding:8px 12px;font-size:12.5px;background:none;border:none;color:var(--ink);
  }
  .nav-context-menu button:hover{background:var(--edge-lighter);}
  .nav-context-menu button.danger{color:var(--bad);}
  .nav-icon{width:20px;text-align:center;font-size:14px;flex-shrink:0;}
  .nav-label{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .nav-count{
    font-size:11px;font-weight:600;color:#fff;background:#C7C2BC;border-radius:9px;padding:1px 7px;min-width:16px;
    text-align:center;
  }
  .nav-count.urgent{background:var(--bad);}
  .nav-count.mild{background:var(--warn);}
  .sidebar-footer{margin-top:auto;padding:12px 16px;border-top:1px solid var(--line-soft);}

  .main{flex:1;display:flex;flex-direction:column;min-width:0;background:var(--canvas);}
  .topbar{
    height:56px;min-height:56px;border-bottom:1px solid var(--line);background:var(--paper);
    display:flex;align-items:center;padding:0 22px;gap:14px;
  }
  .topbar-title{font-size:22px;font-weight:700;color:var(--edge-darker);letter-spacing:-0.01em;}
  .topbar-eyebrow{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--ink-soft);}
  .topbar-sub{font-size:12px;color:var(--ink-soft);}
  .topbar-spacer{flex:1;}
  .segmented{display:flex;background:var(--line-soft);border-radius:8px;padding:2px;}
  .segmented button{
    border:none;background:transparent;padding:6px 13px;border-radius:7px;font-size:12.5px;font-weight:600;color:var(--ink-soft);
  }
  .segmented button.active{background:var(--paper);color:var(--edge-darker);box-shadow:var(--shadow-sm);}

  .content{flex:1;overflow-y:auto;padding:20px 26px 60px;}
  .content-flex{display:flex;gap:24px;align-items:flex-start;max-width:1280px;margin:0 auto;}
  .content-inner{flex:1;min-width:0;max-width:760px;}
  .side-panel{width:300px;flex-shrink:0;display:flex;flex-direction:column;gap:16px;}
  @media (max-width:1180px){ .side-panel{display:none;} }
  .widget-card{background:var(--paper);border:1px solid var(--line);border-radius:12px;padding:16px;box-shadow:var(--shadow-sm);}
  .widget-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
  .widget-title{font-size:12.5px;font-weight:700;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.04em;}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;text-align:center;}
  .cal-dow{font-size:9.5px;color:var(--ink-soft);font-weight:700;padding-bottom:4px;}
  .cal-day{
    font-size:11.5px;padding:5px 0;border-radius:6px;position:relative;color:var(--ink);
  }
  .cal-day.today{background:var(--edge);color:#fff;font-weight:700;}
  .cal-day.has-todos:not(.today)::after{
    content:'';position:absolute;bottom:2px;left:50%;transform:translateX(-50%);width:4px;height:4px;
    border-radius:50%;background:var(--edge);
  }
  .cal-day.blank{visibility:hidden;}
  .weather-row{display:flex;align-items:center;gap:12px;}
  .weather-temp{font-size:30px;font-weight:700;color:var(--edge-darker);}
  .weather-icon{font-size:32px;}
  .widget-picker-toggle{background:none;border:none;color:var(--ink-soft);font-size:14px;padding:2px 4px;}
  .widget-picker-toggle:hover{color:var(--edge);}

  /* ---------- ROWS / CARDS ---------- */
  .section-label{
    font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--ink-soft);font-weight:600;
    margin:22px 0 8px;
  }
  .section-label:first-child{margin-top:0;}
  .row-card{
    background:var(--paper);border:1px solid var(--line);border-radius:var(--radius);padding:13px 16px;
    margin-bottom:9px;display:flex;align-items:flex-start;gap:13px;cursor:pointer;transition:box-shadow .12s, border-color .12s;
  }
  .row-card:hover{box-shadow:var(--shadow-sm);border-color:#E3B79E;}
  .row-check{
    width:26px;height:26px;border-radius:50%;border:2.5px solid var(--edge);flex-shrink:0;margin-top:1px;
    display:flex;align-items:center;justify-content:center;font-size:13px;color:#fff;
  }
  .row-check.done{background:var(--good);border-color:var(--good);}
  .row-body{flex:1;min-width:0;}
  .row-title{font-size:14.5px;font-weight:600;color:var(--ink);}
  .row-title.done{text-decoration:line-through;color:var(--ink-soft);}
  .row-meta{font-size:12px;color:var(--ink-soft);margin-top:2px;display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
  .row-meta .due{font-weight:600;}
  .row-meta .due.overdue{color:var(--bad);}
  .row-meta .due.today{color:var(--edge-dark);}
  .pill{
    font-size:10.5px;font-weight:600;padding:2px 8px;border-radius:20px;background:var(--edge-light);color:var(--edge-darker);
  }
  .pill.gray{background:var(--line-soft);color:var(--ink-soft);}
  .pill.private{background:#EFE7FB;color:#7647B5;}
  .progress-track{height:5px;border-radius:4px;background:var(--line-soft);margin-top:8px;overflow:hidden;}
  .progress-fill{height:100%;background:var(--good);}
  .row-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0;}
  .row-select{width:14px;height:14px;margin-top:4px;flex-shrink:0;accent-color:#B8B2A8;opacity:.75;}
  .row-trash{
    background:none;border:none;font-size:14px;opacity:.55;padding:2px;border-radius:6px;line-height:1;
  }
  .row-trash:hover{opacity:1;background:var(--edge-light);}
  .row-contact{display:flex;flex-direction:column;gap:3px;margin-left:6px;flex-shrink:0;max-width:170px;align-items:flex-end;}
  .contact-link{
    font-size:11px;color:var(--edge-dark);text-decoration:none;white-space:nowrap;overflow:hidden;
    text-overflow:ellipsis;max-width:170px;
  }
  .contact-link:hover{text-decoration:underline;}
  .bulk-bar{
    display:flex;align-items:center;gap:10px;background:var(--edge-light);border:1px solid var(--edge-light);
    border-radius:10px;padding:9px 14px;margin-bottom:10px;font-size:13px;color:var(--edge-darker);
  }
  .bulk-bar .btn{padding:6px 12px;font-size:12px;}
  .avatar-chip{
    width:24px;height:24px;border-radius:50%;background:var(--edge);color:#fff;font-size:10.5px;font-weight:600;
    display:flex;align-items:center;justify-content:center;
  }
  .star{color:#E8B23D;}
  .empty-state{
    text-align:center;padding:60px 20px;color:var(--ink-soft);
  }
  .empty-state .big{font-size:15px;font-weight:600;color:var(--ink);margin-bottom:4px;}
  .empty-state .tiny{font-size:12.5px;line-height:1.6;}

  .team-row{
    background:var(--paper);border:1px solid var(--line);border-radius:var(--radius);padding:14px 16px;
    margin-bottom:9px;display:flex;align-items:center;gap:13px;cursor:pointer;
  }
  .team-row:hover{box-shadow:var(--shadow-sm);}
  .team-stats{margin-left:auto;display:flex;gap:18px;}
  .team-stat{text-align:center;}
  .team-stat .num{font-size:16px;font-weight:600;color:var(--edge-darker);}
  .team-stat .lab{font-size:10px;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.04em;}

  .fab{
    position:fixed;bottom:26px;left:30px;width:52px;height:52px;border-radius:50%;background:var(--edge);
    color:#fff;font-size:24px;border:none;box-shadow:0 8px 22px rgba(225,83,26,0.45);display:flex;
    align-items:center;justify-content:center;z-index:80;
  }
  .fab:hover{background:var(--edge-dark);}

  /* ---------- MODALS ---------- */
  .modal-overlay{
    position:fixed;inset:0;background:rgba(20,14,8,0.42);display:flex;align-items:center;justify-content:center;
    z-index:100;animation:fadeIn .12s ease-out;
  }
  @keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
  .modal-card{
    background:var(--paper);border-radius:16px;width:560px;max-width:92vw;max-height:86vh;display:flex;flex-direction:column;
    box-shadow:var(--shadow);overflow:hidden;
  }
  .modal-card.wide{width:1320px;max-height:90vh;}
  .modal-head{
    background:var(--edge);color:#fff;padding:16px 20px;display:flex;align-items:center;gap:10px;
  }
  .modal-breadcrumb{font-size:12px;opacity:.85;display:flex;gap:5px;flex-wrap:wrap;}
  .modal-breadcrumb span{cursor:pointer;text-decoration:underline;text-underline-offset:2px;}
  .modal-title-row{display:flex;align-items:center;width:100%;}
  .modal-title{font-size:17px;font-weight:600;flex:1;}
  .modal-close{background:rgba(255,255,255,.18);border:none;color:#fff;width:28px;height:28px;border-radius:8px;font-size:14px;}
  .modal-close:hover{background:rgba(255,255,255,.32);}
  .modal-body{padding:18px 20px;overflow-y:auto;flex:1;}
  .modal-foot{padding:12px 20px;border-top:1px solid var(--line);display:flex;gap:8px;justify-content:flex-end;}

  .contact-card{
    background:var(--edge-lighter);border:1px solid var(--edge-light);border-radius:10px;padding:12px 14px;margin-bottom:14px;
  }
  .contact-card .label{font-size:10px;text-transform:uppercase;color:var(--edge-darker);font-weight:600;letter-spacing:.05em;}
  .contact-line{display:flex;justify-content:space-between;font-size:13px;margin-top:6px;}
  .contact-line b{font-weight:600;}

  .field{margin-bottom:13px;}
  .field label{font-size:12px;font-weight:600;color:var(--ink-soft);display:block;margin-bottom:5px;}
  .field input, .field select, .field textarea{
    width:100%;padding:9px 10px;border:1px solid var(--line);border-radius:8px;font-size:13.5px;color:var(--ink);
    background:#fff;
  }
  .field input:focus, .field select:focus, .field textarea:focus{outline:2px solid var(--edge);outline-offset:1px;}
  .field-row{display:flex;gap:10px;}
  .field-row .field{flex:1;}
  .type-toggle{display:flex;gap:6px;margin-bottom:13px;}
  .type-toggle button{
    flex:1;padding:8px;border-radius:8px;border:1px solid var(--line);background:#fff;font-size:12.5px;font-weight:600;color:var(--ink-soft);
  }
  .type-toggle button.active{background:var(--edge);color:#fff;border-color:var(--edge);}
  .quickdate-row{display:flex;gap:6px;margin-top:6px;flex-wrap:wrap;}
  .quickdate-row button{
    border:1px solid var(--line);background:#fff;border-radius:20px;padding:4px 11px;font-size:11.5px;color:var(--ink-soft);
  }
  .quickdate-row button:hover{border-color:var(--edge);color:var(--edge-dark);}
  .autocomplete-box{position:relative;}
  .suggest-list{
    position:absolute;top:100%;left:0;right:0;background:#fff;border:1px solid var(--line);border-radius:8px;
    box-shadow:var(--shadow);z-index:20;max-height:180px;overflow-y:auto;margin-top:3px;
  }
  .suggest-item{padding:8px 12px;font-size:13px;cursor:pointer;}
  .suggest-item:hover{background:var(--edge-lighter);}
  .suggest-item .sub{font-size:11px;color:var(--ink-soft);}

  .assign-toggle{display:flex;gap:8px;margin-top:6px;}
  .assign-toggle .btn{flex:1;}

  .toast{
    position:fixed;bottom:26px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;
    padding:11px 20px;border-radius:10px;font-size:13px;box-shadow:var(--shadow);z-index:300;
    animation:toastIn .15s ease-out;
  }
  @keyframes toastIn{from{opacity:0;transform:translate(-50%,8px);}to{opacity:1;transform:translate(-50%,0);}}

  .admin-menu{
    position:absolute;top:64px;left:16px;background:#fff;border:1px solid var(--line);border-radius:10px;
    box-shadow:var(--shadow);width:250px;z-index:150;overflow:hidden;
  }
  .admin-item{padding:11px 14px;font-size:13px;border-bottom:1px solid var(--line-soft);display:flex;align-items:center;gap:9px;}
  .admin-item:hover{background:var(--edge-lighter);cursor:pointer;}
  .admin-item:last-child{border-bottom:none;}

  .contacts-table{width:100%;border-collapse:collapse;font-size:13px;}
  .contacts-table th{
    text-align:left;font-size:10.5px;text-transform:uppercase;letter-spacing:.04em;color:var(--ink-soft);
    padding:8px 10px;border-bottom:2px solid var(--line);position:sticky;top:0;background:var(--canvas);
  }
  .contacts-table td{padding:9px 10px;border-bottom:1px solid var(--line-soft);}
  .contacts-table tr:hover td{background:var(--edge-lighter);}
  .checkbox-cell{width:28px;}

  .tab-strip{display:flex;gap:4px;border-bottom:1px solid var(--line);margin-bottom:16px;}
  .tab-strip button{
    padding:9px 4px;margin-right:18px;border:none;background:transparent;font-size:13px;font-weight:600;color:var(--ink-soft);
    border-bottom:2px solid transparent;
  }
  .tab-strip button.active{color:var(--edge-darker);border-color:var(--edge);}

  /* ---------- MOBILE ---------- */
  @media (max-width:820px){
    .sidebar{
      position:fixed;inset:0;z-index:60;width:100%;min-width:0;transform:translateX(0);
    }
    .shell.mobile-detail .sidebar{display:none;}
    .main{width:100%;}
    .shell.mobile-list .main{display:none;}
    .modal-card{width:100%;max-width:100%;height:100%;max-height:100%;border-radius:0;position:fixed;inset:0;}
    .fab{bottom:78px;left:18px;}
    .mobile-tabbar{
      display:flex;position:fixed;bottom:0;left:0;right:0;height:58px;background:#fff;border-top:1px solid var(--line);
      z-index:70;
    }
    .mobile-tabbar button{
      flex:1;border:none;background:transparent;display:flex;flex-direction:column;align-items:center;justify-content:center;
      gap:2px;font-size:10px;color:var(--ink-soft);
    }
    .mobile-tabbar button.active{color:var(--edge);}
    .mobile-tabbar .mt-icon{font-size:18px;}
    .content{padding-bottom:80px;}
  }
  .mobile-tabbar{display:none;}
  @media (max-width:820px){ .mobile-tabbar{display:flex;} }
  .mobile-back{display:none;background:none;border:none;color:#fff;font-size:20px;margin-right:6px;}
  @media (max-width:820px){ .mobile-back.show{display:block;} }
</style>
</head>

let pendingUsers = []; // {id, name, email, requestedAt} — awaiting admin approval before they can sign in
async function fetchPendingUsersFromSupabase(){
  const { data, error } = await supabaseClient.from('pending_users').select('*');
  if(error){ console.error('fetchPendingUsersFromSupabase error:', error); return; }
  pendingUsers = data.map(r=>({id:r.id, name:r.name, email:r.email, requestedAt:new Date(r.requested_at)}));
}
async function supaCreatePendingUser(request){
  const { error } = await supabaseClient.from('pending_users').insert({id:request.id, name:request.name, email:request.email});
  if(error) console.error('supaCreatePendingUser error:', error); // registrant has no way to see a toast here — logged for later diagnosis only
}
async function supaDeletePendingUser(id){
  const { error } = await supabaseClient.from('pending_users').delete().eq('id', id);
  if(error){ console.error('supaDeletePendingUser error:', error); flashToast('Removed here, but syncing to the server failed. (' + error.message + ')'); render(); }
}
async function fetchDirectoryAdditions(){
  // Anyone admitted through the app (not baked into the original USERS array)
  // lives here instead — read publicly, before anyone's even logged in, so the
  // login screen can show a tile for them from any device, immediately.
  const { data, error } = await supabaseClient.from('admitted_users').select('*');
  if(error){ console.error('fetchDirectoryAdditions error:', error); return false; }
  let addedAny = false;
  data.forEach(r=>{
    if(!USERS.find(u=>u.email.toLowerCase()===r.email.toLowerCase())){
      USERS.push({id:'admitted_'+r.id, name:r.name, email:r.email, role:r.role||'User', initials:r.initials, emailClient:null, notifPref:null});
      addedAny = true;
    }
  });
  return addedAny;
}
async function supaCreateAdmittedUser(name, email, role, initials){
  const { error } = await supabaseClient.from('admitted_users').insert({name, email, role, initials});
  if(error){ console.error('supaCreateAdmittedUser error:', error); flashToast('Admitted here, but syncing to the server failed — they may not be able to sign in from another device yet. (' + error.message + ')'); render(); }
}

   NOT wired to Supabase yet — that's still local for now, coming in later phases.

const SUPABASE_URL = 'https://ugtlyzwvnhmcphtqkbke.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_SkLAcSbiSghUS6i-kclzdQ_V3G_0xbC';
const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

async function fetchMyProfile(authUserId){
  const { data, error } = await supabaseClient.from('profiles').select('*').eq('id', authUserId).single();
  if(error){ console.error('fetchMyProfile error:', error); return null; }
  return data;
}
async function fetchAllProfilesIntoUsers(){
  // Refreshes the local USERS mirror (used throughout the app for name display,
  // assignment dropdowns, etc.) from the real profiles table. Matched by EMAIL,
  // not id — the app's existing data (seed to-do's, deals, etc.) still uses the
  // original local ids like 'mclark' everywhere; those aren't migrated to
  // Supabase yet, so we keep that id stable and just stash the real Supabase
  // auth id alongside it (as authId) for use once later phases need it.
  const { data, error } = await supabaseClient.from('profiles').select('*');
  if(error){ console.error('fetchAllProfilesIntoUsers error:', error); return; }
  data.forEach(p=>{
    let u = USERS.find(x=>x.email.toLowerCase()===p.email.toLowerCase());
    if(!u){ u = {id:p.id, email:p.email}; USERS.push(u); }
    Object.assign(u, {authId:p.id, name:p.name, role:p.role, initials:p.initials, emailClient:p.email_client});
  });
}

/* ---------------- CONTACTS (Phase 2, domain 1 — the first real shared-data table) ----------------
   Pattern used for every domain from here on: fetch the real table on login (so
   everyone starts from the same live data), then every local create/edit/delete
   updates the on-screen array immediately (so the UI never feels slow) while a
   matching Supabase call fires in the background. If that background call fails,
   we log it and toast an error rather than silently losing the change. */

          email:r.email||'', mobile:r.mobile||'', phone:r.phone||'', address:r.address||'',
          city:r.city||'', state:r.state||'', zip:r.zip||''};
}
function contactLocalToRow(c){

/* ---------------- SHARED USER-ID MAPPING ----------------
   Local code everywhere uses short ids like 'mclark'/'nault'/'lkhoudary'. The
   database needs real Supabase Auth UUIDs for any foreign key pointing at a
   person (edge_tracker, owner_id, assigned_to, created_by). These two helpers
   convert between the two. If someone hasn't ever logged in on Supabase yet,
   there's no UUID for them — the write is skipped rather than crashing. */
function localUserIdToAuthId(localId){
  const u = USERS.find(x=>x.id===localId);
  return (u && u.authId) || null;
}
function authIdToLocalUserId(authId){
  const u = USERS.find(x=>x.authId===authId);
  return u ? u.id : null;
}

async function fetchListsClientsDealsFromSupabase(){
  const { data:lists, error:e1 } = await supabaseClient.from('lists').select('*');
  if(e1){ console.error('fetchListsClientsDealsFromSupabase error:', e1); return; }
  if(!lists.length) return; // nothing seeded server-side yet — keep local defaults as the starting point
  const { data:clients, error:e2 } = await supabaseClient.from('clients').select('*');
  if(e2){ console.error('fetchListsClientsDealsFromSupabase error:', e2); return; }
  const [{data:secConts,error:e3}, {data:deals,error:e4}, {data:authUsers,error:e5}] = await Promise.all([
    supabaseClient.from('client_secondary_contacts').select('*'),
    supabaseClient.from('deals').select('*'),
    supabaseClient.from('client_authorized_users').select('*'),
  ]);
  if(e3||e4){ console.error('fetchListsClientsDealsFromSupabase error:', e3||e4); return; }
  const customCategories = await fetchPropertyCategoriesFromSupabase() || [];
  const newLists = lists.slice().sort((a,b)=>a.display_order-b.display_order).map(l=>({
    id:l.id, name:l.name, icon:l.icon, type:l.type, isDefault:l.is_default,
    clients: l.type==='deep' ? [] : undefined,
    entries: l.type==='flat' ? [] : undefined,
  }));
  db.archivedClients = [];
  clients.forEach(cr=>{
    const list = newLists.find(l=>l.id===cr.list_id);
    if(!list) return;
    const c = clientRowToLocal(cr);
    c.secondary = secConts.filter(sc=>sc.client_id===cr.id).map(sc=>sc.contact_id);
    c.deals = deals.filter(d=>d.client_id===cr.id).map(dealRowToLocal);
    if(authUsers) c.authorizedUserIds = authUsers.filter(a=>a.client_id===cr.id).map(a=>authIdToLocalUserId(a.user_id)).filter(Boolean);
    if(list.id==='listings'){
      c.prospects=[];
      c.categoryConfig=newLSRCategoryConfig();
      c.categoryConfig.custom = customCategories.filter(cat=>cat.listing_id===cr.id).map(cat=>({id:cat.id, name:cat.name}));
      c.categoryConfig.custom.forEach(cat=>{ if(!c.categoryConfig.order.includes(cat.id)) c.categoryConfig.order.push(cat.id); });
    }
    if(cr.archived_at){ c.archivedListId = list.id; db.archivedClients.push(c); }
    else list.clients.push(c);
  });
  db.lists = newLists;
}

async function approveDeletionRequest(reqId){
  const req = db.deletionRequests.find(r=>r.id===reqId);
  if(!req) return;
  const l = db.lists.find(x=>x.id===req.listId);
  const c = l && l.clients.find(x=>x.id===req.clientId);
  if(c){
    // Detach (don't delete) any to-do's pointing at this client, so they aren't silently lost.
    db.todos.filter(t=>t.clientId===c.id).forEach(t=>{ t.clientId=null; t.listId=null; supaUpdateTodo(t); });
    l.clients = l.clients.filter(x=>x.id!==c.id);
    supaDeleteClient(c.id);
  } else {
    // It may currently be sitting in Archived instead of its normal list.
    db.archivedClients = db.archivedClients.filter(x=>x.id!==req.clientId);
    supaDeleteClient(req.clientId);
  }
  db.deletionRequests = db.deletionRequests.filter(r=>r.id!==reqId);
  const { error } = await supabaseClient.from('client_deletion_requests').delete().eq('id', reqId);
  if(error) console.error('approveDeletionRequest cleanup error:', error);
  flashToast(`${req.clientName} deleted — approved by ${state.currentUser.name}.`);
  render();
}
async function cancelDeletionRequest(reqId){
  const req = db.deletionRequests.find(r=>r.id===reqId);
  db.deletionRequests = db.deletionRequests.filter(r=>r.id!==reqId);
  const { error } = await supabaseClient.from('client_deletion_requests').delete().eq('id', reqId);
  if(error) console.error('cancelDeletionRequest error:', error);
  if(req) flashToast(`Deletion request for ${req.clientName} cancelled.`);
  render();
}

function renderAddUsersPrompt(){
  const {listId, clientId} = state.addUsersPrompt;
  const l = db.lists.find(x=>x.id===listId);
  const c = l && l.clients.find(x=>x.id===clientId);
  if(!c){ state.addUsersPrompt=null; return; }
  const others = USERS.filter(u=>u.id!==c.createdBy);
  const overlay = document.createElement('div');
  overlay.className='modal-overlay'; overlay.style.zIndex=210;
  overlay.innerHTML = `
  <div class="modal-card">
    <div class="modal-head"><div class="modal-title">Include other users on ${escapeHtml(c.name)}?</div></div>
    <div class="modal-body">
      <p style="font-size:12.5px;color:var(--ink-soft);margin-top:0;">
        Right now, only you can see this ${l.id==='listings'?'listing':'client'} (Admins can always see everything, regardless). Check anyone else who should have access — you can always change this later from the record itself.
      </p>
      ${others.length ? others.map(u=>`
        <label style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--line-soft);font-size:13.5px;">
          <input type="checkbox" class="addUsersCheck" value="${u.id}" style="width:auto;">
          ${escapeHtml(u.name)}
        </label>`).join('') : `<div class="tiny" style="color:var(--ink-soft);">No other teammates yet.</div>`}
    </div>
    <div class="modal-foot">
      <button class="btn secondary" data-action="skipAddUsers">No, just me for now</button>
      <button class="btn" data-action="confirmAddUsers">Save</button>
    </div>
  </div>`;
  document.getElementById('app').appendChild(overlay);
  overlay.querySelector('[data-action="skipAddUsers"]').onclick=()=>{ state.addUsersPrompt=null; render(); };
  overlay.querySelector('[data-action="confirmAddUsers"]').onclick=()=>{
    const checked = Array.from(overlay.querySelectorAll('.addUsersCheck:checked')).map(el=>el.value);
    if(!c.authorizedUserIds) c.authorizedUserIds=[];
    checked.forEach(userId=>{
      if(!c.authorizedUserIds.includes(userId)){
        c.authorizedUserIds.push(userId);
        supaAddAuthorizedUser(c.id, userId);
      }
    });
    state.addUsersPrompt=null;
    if(checked.length) flashToast(`Added ${checked.length} teammate${checked.length===1?'':'s'} to ${c.name}.`);
    render();
  };
}

/* ---------------- DATE HELPERS ---------------- */
function todayDate(){ const d=new Date(); d.setHours(0,0,0,0); return d; }
function addDays(d,n){ const r=new Date(d); r.setDate(r.getDate()+n); return r; }
function fmtDate(d){
  if(!d) return null;
  const opts={month:'short',day:'numeric'};
  const now = new Date();
  if(d.getFullYear()!==now.getFullYear()) opts.year='numeric';
  return d.toLocaleDateString('en-US',opts);
}
function isSameDay(a,b){ return a && b && a.toDateString()===b.toDateString(); }
function wireDragReorder(selector, dragAttr, onReorder){
  let draggedId = null;
  document.querySelectorAll(selector).forEach(el=>{
    el.ondragstart = (ev)=>{ draggedId = el.dataset[dragAttr]; ev.dataTransfer.effectAllowed='move'; el.style.opacity='0.4'; };
    el.ondragend = ()=>{ el.style.opacity=''; };
    el.ondragover = (ev)=>{ ev.preventDefault(); };
    el.ondrop = (ev)=>{
      ev.preventDefault();
      const targetId = el.dataset[dragAttr];
      if(draggedId && targetId && draggedId!==targetId) onReorder(draggedId, targetId);
      draggedId = null;
    };
  });
}
function dueStatus(d){
  if(!d) return 'none';
  const t = todayDate();
  if(d < t) return 'overdue';
  if(isSameDay(d,t)) return 'today';
  if(d <= addDays(t,7)) return 'week';
  if(d <= addDays(t,30)) return 'month';
  return 'future';
}
// Natural language date parser: today, tomorrow, next monday, 7/20, 7/20/26, 7/20/2026
function parseNaturalDate(str){
  if(!str) return null;
  str = str.trim().toLowerCase();
  const t = todayDate();
  if(str==='today') return t;
  if(str==='tomorrow') return addDays(t,1);
  if(str==='next week') return addDays(t,7);
  const days=['sunday','monday','tuesday','wednesday','thursday','friday','saturday'];
  for(let i=0;i<days.length;i++){
    if(str.includes(days[i])){
      let target = i, cur = t.getDay();
      let diff = (target - cur + 7) % 7;
      if(diff===0) diff=7;
      if(str.includes('this') && diff>0 && (target-cur+7)%7 !== 0) diff = (target-cur+7)%7 || 7;
      return addDays(t, diff);
    }
  }
  // mm/dd or mm/dd/yy or mm/dd/yyyy
  const m = str.match(/^(\d{1,2})\/(\d{1,2})(?:\/(\d{2,4}))?$/);
  if(m){
    let year = m[3] ? parseInt(m[3]) : t.getFullYear();
    if(year < 100) year += 2000; // shorthand '26' -> 2026
    return new Date(year, parseInt(m[1])-1, parseInt(m[2]));
  }
  const d2 = new Date(str);
  if(!isNaN(d2)) return d2;
  return null;
}

function newLSRCategoryConfig(){
  return { order: DEFAULT_PROPERTY_CATEGORIES.map(c=>c.id), hidden: [], custom: [] };
}
function lsrCategoriesFor(listingClient){
  if(!listingClient.categoryConfig) listingClient.categoryConfig = newLSRCategoryConfig();
  const cfg = listingClient.categoryConfig;
  const all = DEFAULT_PROPERTY_CATEGORIES.concat(cfg.custom);
  const byId = {}; all.forEach(c=>byId[c.id]=c);
  // respect saved order, then append anything new (e.g. just-added custom categories)
  const ordered = cfg.order.map(id=>byId[id]).filter(Boolean);
  all.forEach(c=>{ if(!cfg.order.includes(c.id)) ordered.push(c); });
  return ordered.filter(c=>!cfg.hidden.includes(c.id));
}

const SMART_LIST_DEFAULTS = [
  {id:'todayMe', name:'Today Me', icon:'🔥'},
  {id:'todayAll', name:'Today - All', icon:'🔥'},
  {id:'overdueMe', name:'Overdue Me', icon:'⏰'},

  {id:'allMe', name:'All - Me', icon:'📋'},

  {id:'archived', name:'Archived', icon:'🗄️'},
  {id:'everything', name:'Everything', icon:'📚'},
  {id:'activeDeals', name:'Active Deals', icon:'⭐'},
  {id:'caStatus', name:'CA Status', icon:'📄'},
];
// Single mutable, ordered list of every smart list (defaults + user-created). Reordering,
// hiding, and deleting all operate on this one array so order is consistent everywhere.
let smartListsArr = SMART_LIST_DEFAULTS.map(s=>({...s, isDefault:true}));

function smartListTodos(key){
  const raw = smartListTodosRaw(key);
  if(key==='completed' || key==='archived') return raw;
  // Keep anything the user just marked complete visible in this same "open" list
  // until they navigate away — so a mis-click doesn't make it vanish instantly.
  if(state.recentlyCompletedIds.length){
    state.recentlyCompletedIds.forEach(id=>{
      if(raw.some(t=>t.id===id)) return;
      const td = db.todos.find(t=>t.id===id);
      if(td) raw.push(td);
    });
  }
  return raw;
}
// "My sphere" — my own to-do's, plus anything I've personally assigned to
// someone else. Deliberately excludes to-do's that only involve *other*
// people (e.g. something Nick created and assigned to himself, or to Lexi) —
// that's clutter for anyone who isn't Nick. Admins who genuinely need the
// full, unrestricted team view can still get it from the Admin menu.
function inMySphere(td){
  const me = state.currentUser.id;
  return td.assignedTo===me || td.createdBy===me;
}
function smartListTodosRaw(key){
  const t = db.todos.filter(td=>true);
  const me = state.currentUser.id;
  switch(key){
    case 'todayMe': return t.filter(td=>!td.completed && td.assignedTo===me && dueStatus(td.dueDate)==='today');
    case 'todayAll': return t.filter(td=>!td.completed && inMySphere(td) && dueStatus(td.dueDate)==='today');
    case 'overdueMe': return t.filter(td=>!td.completed && td.assignedTo===me && dueStatus(td.dueDate)==='overdue');
    case 'overdueAll': return t.filter(td=>!td.completed && inMySphere(td) && dueStatus(td.dueDate)==='overdue');
    case 'week': return t.filter(td=>!td.completed && inMySphere(td) && ['today','overdue','week'].includes(dueStatus(td.dueDate)));
    case 'month': return t.filter(td=>!td.completed && inMySphere(td) && ['today','overdue','week','month'].includes(dueStatus(td.dueDate)));
    case 'allMe': return t.filter(td=>!td.completed && inMySphere(td) && !!td.dueDate);
    case 'someday': return t.filter(td=>!td.completed && !td.dueDate && inMySphere(td));
    case 'completed': return t.filter(td=>td.completed && inMySphere(td));
    case 'archived': return db.archivedTodos.filter(td=>inMySphere(td));
    case 'everything': return t.filter(td=>!td.completed && inMySphere(td));
    case 'activeDeals': {
      // Back in the sidebar for now, pending a decision after checking with Nick.
      const activeDealIds = new Set();
      db.lists.filter(l=>l.type==='deep').forEach(l=>l.clients.forEach(c=>c.deals.forEach(d=>{ if(d.activeDeal && !d.complete) activeDealIds.add(d.id); })));
      return t.filter(td=>td.dealId && activeDealIds.has(td.dealId) && !td.completed);
    }
    case 'fullTeam': return t.filter(td=>!td.completed); // Admin-only, unrestricted — genuinely everyone
    default: {
      const custom = smartListsArr.find(c=>c.id===key && !c.isDefault);
      if(custom) return t.filter(td=>matchesCustomFilter(td, custom.filter));
      return [];
    }
  }
}
function matchesCustomFilter(td, f){
  if(!f) return false;
  if(f.status==='open' && td.completed) return false;
  if(f.status==='completed' && !td.completed) return false;
  if(f.assignee==='me' && td.assignedTo!==state.currentUser.id) return false;
  if(f.assignee && f.assignee!=='me' && f.assignee!=='any' && td.assignedTo!==f.assignee) return false;
  if(f.dateRule && f.dateRule!=='any'){
    const s = dueStatus(td.dueDate);
    if(f.dateRule==='nodate'){ if(td.dueDate) return false; }
    else if(f.dateRule==='exact'){
      if(!td.dueDate || !f.exactDate) return false;
      const target = new Date(f.exactDate+'T00:00:00');
      if(!isSameDay(td.dueDate, target)) return false;
    }
    else {
      if(f.dateRule==='today' && s!=='today') return false;
      if(f.dateRule==='week' && !['today','overdue','week'].includes(s)) return false;
      if(f.dateRule==='month' && !['today','overdue','week','month'].includes(s)) return false;
      if(f.dateRule==='overdue' && s!=='overdue') return false;
    }
  }
  if(f.clientId){
    if(td.clientId!==f.clientId){
      // also match to-do's linked to a deal that belongs to this client
      let dealMatches=false;
      if(td.dealId){
        for(const l of db.lists){ if(l.type==='deep'){ const c=l.clients.find(x=>x.id===f.clientId); if(c && c.deals.some(d=>d.id===td.dealId)){ dealMatches=true; break; } } }
      }
      if(!dealMatches) return false;
    }
  }
  if(f.category && f.category.trim()){
    if((td.category||'').toLowerCase() !== f.category.trim().toLowerCase()) return false;
  }
  return true;
}
function visibleTodo(td){
  // privacy: if private and not mine and not... (admins still can't see detail, only count)
  if(td.private && td.assignedTo!==state.currentUser.id) return false;
  return true;
}

const DAYS_OF_WEEK = [
  {id:'sunday',short:'Sun'},{id:'monday',short:'Mon'},{id:'tuesday',short:'Tue'},{id:'wednesday',short:'Wed'},
  {id:'thursday',short:'Thu'},{id:'friday',short:'Fri'},{id:'saturday',short:'Sat'}
];
function scheduleSummary(sched){
  if(!sched) return 'Using company default';
  const timeLabel = sched.time;
  if(sched.type==='weekly'){
    const day = DAYS_OF_WEEK.find(d=>d.id===(sched.days[0]||'sunday'));
    return `Weekly, ${day?day.short:'Sun'} at ${timeLabel}`;
  }
  const days = sched.days||[];
  let daysLabel;
  if(days.length===7) daysLabel='every day';
  else if(days.length===5 && !days.includes('saturday') && !days.includes('sunday')) daysLabel='weekdays';
  else daysLabel = days.map(d=>DAYS_OF_WEEK.find(x=>x.id===d).short).join('/') || 'no days selected';
  return `Daily (${daysLabel}) at ${timeLabel}`;
}
function generateDigestBody(forUser){
  const items = smartListTodos('week').filter(td=>td.assignedTo===forUser.id);
  const visible = items.filter(td=> !td.private || forUser.id===state.currentUser.id);
  const hiddenCount = items.length - visible.length;
  let body = `Hi ${forUser.name.split(' ')[0]},\n\nHere's what's due this week on Southwest Edge Portal:\n\n`;
  if(!visible.length) body += 'Nothing due this week. Nice work.\n';
  else visible.forEach(td=>{ body += `• ${td.title}${td.dueDate? ' — due '+fmtDate(td.dueDate):''}\n`; });
  if(hiddenCount>0) body += `\n(${hiddenCount} private item${hiddenCount===1?'':'s'} not shown here.)\n`;
  body += `\nLog in to see full details: ${portalUrl()}\n\n— Southwest Edge Portal`;
  return body;
}

async function doAppRefresh(){
  try{
    if('serviceWorker' in navigator){
      const regs = await navigator.serviceWorker.getRegistrations();
      for(const reg of regs) await reg.update();
    }
  } catch(e){ /* fine either way — reload below still fetches fresh over the network */ }
  location.reload();
}
function openEmailDraft(toUser, subject, body){
  const client = (state.currentUser && state.currentUser.emailClient) || 'other';
  const enc = encodeURIComponent;
  let url;
  if(client==='outlookWeb'){
    url = `https://outlook.office.com/mail/deeplink/compose?to=${enc(toUser.email)}&subject=${enc(subject)}&body=${enc(body)}`;
  } else if(client==='gmail'){
    url = `https://mail.google.com/mail/?view=cm&fs=1&to=${enc(toUser.email)}&su=${enc(subject)}&body=${enc(body)}`;
  } else {
    url = `mailto:${toUser.email}?subject=${enc(subject)}&body=${enc(body)}`;
  }
  // window.location works far more reliably than the old "invisible link click" trick,
  // especially on mobile Safari, where synthetic clicks on mailto: links are often
  // silently swallowed. Web-based clients still need a real new tab.
  if(client==='outlookWeb' || client==='gmail') window.open(url, '_blank');
  else window.location.href = url;
}
function openBlankEmailDraft(){

  }

}

function passwordIsStrong(pw){
  return pw.length>=8 && /[0-9]/.test(pw) && /[^A-Za-z0-9]/.test(pw);
}
function attachLoginHandlers(){
  document.querySelectorAll('[data-selectuser]').forEach(el=>el.onclick=()=>{
    state.selectedLoginUser = el.dataset.selectuser; state.loginError=null; render();
  });
  const toggleModeBtn = document.getElementById('toggleLoginModeBtn');
  if(toggleModeBtn) toggleModeBtn.onclick=()=>{
    state.loginMode = (state.loginMode==='signin') ? 'create' : 'signin';
    state.loginError = null;
    render();
  };
  const submit = document.getElementById('loginSubmitBtn');
  if(submit) submit.onclick=async ()=>{
    const u = USERS.find(x=>x.id===state.selectedLoginUser);
    const pw = document.getElementById('loginPw').value;
    state.loginError = null;
    submit.disabled = true; submit.textContent = 'One moment…';

    if(state.loginMode==='create'){
      const pw2 = document.getElementById('loginPw2').value;
      if(!passwordIsStrong(pw)){
        state.loginError = 'Password must be at least 8 characters, with a number and a special character.';
        submit.disabled=false; render(); return;
      }
      if(pw!==pw2){
        state.loginError = "Passwords don't match — try again.";
        submit.disabled=false; render(); return;
      }
      const { data, error } = await supabaseClient.auth.signUp({ email: u.email, password: pw });
      if(error){
        state.loginError = error.message.includes('already registered')
          ? 'An account already exists for this person — use "Sign in" instead.'
          : `Couldn't create the account: ${error.message}`;
        submit.disabled=false; render(); return;
      }
      // Real signup succeeded — now create the matching profile row.
      const { error: profileError } = await supabaseClient.from('profiles').insert({
        id: data.user.id, name: u.name, email: u.email, role: u.role, initials: u.initials
      });
      if(profileError){
        state.loginError = `Account created, but saving your profile failed: ${profileError.message}. Contact an admin.`;
        submit.disabled=false; render(); return;
      }
      u.authId = data.user.id;
      state.pendingLoginUser = u;
      state.showEmailClientPicker = true;
      render();
      return;
    }

    // mode === 'signin'
    const { data, error } = await supabaseClient.auth.signInWithPassword({ email: u.email, password: pw });
    if(error){
      state.loginError = error.message.includes('Invalid login credentials')
        ? 'Incorrect password, or no account yet — first time here? Use "Create your account" below.'
        : `Sign-in failed: ${error.message}`;
      submit.disabled=false; render(); return;
    }
    let profile = await fetchMyProfile(data.user.id);
    let selfHealError = null;
    if(!profile){
      // Account exists but its profile row never got created (e.g. an earlier
      // attempt hit an RLS error, exactly like this bug did) — self-heal it now.
      const { error: createError } = await supabaseClient.from('profiles').insert({
        id: data.user.id, name: u.name, email: u.email, role: u.role, initials: u.initials
      });
      if(!createError) profile = await fetchMyProfile(data.user.id);
      else selfHealError = createError;
    }
    if(!profile){
      // Still no profile — do NOT silently let them into the app with no real
      // account record. Show the real error so this can't fail invisibly again.
      state.loginError = `Signed in, but couldn't create/find your profile: ${selfHealError ? selfHealError.message : 'unknown error'}. Contact an admin — likely a database permissions issue.`;
      submit.disabled=false; render(); return;
    }
    u.authId = profile.id;
    if(!u.emailClient) u.emailClient = profile.email_client;
    if(profile.widget_order) state.widgetOrder = profile.widget_order;
    u.notesList = await fetchPersonalNotes(profile.id);
    await fetchAllProfilesIntoUsers();
    if(!u.emailClient){
      state.pendingLoginUser = u;
      state.showEmailClientPicker = true;
      render();
      return;
    }
    state.currentUser=u; state.screen='app'; if(!appStateWasLoaded) seedAll(); state.loginTarget=null;
    await fetchAllAppDataFromSupabase();
    render();
  };
  const showReg = document.getElementById('showRegisterBtn');
  if(showReg) showReg.onclick=()=>{ state.showRegisterForm=true; render(); };
  const regBtn = document.getElementById('regCreateBtn');
  if(regBtn) regBtn.onclick=()=>{
    const name = document.getElementById('regName').value.trim();
    const email = document.getElementById('regEmail').value.trim();
    if(!name || !email){ flashToast('Name and email are both required.'); render(); return; }
    const request = {id:crypto.randomUUID(), name, email, requestedAt:new Date()};
    pendingUsers.push(request);
    supaCreatePendingUser(request);
    state.showRegisterForm = false;
    state.showSendRequestReminder = {name}; // persistent on-screen reminder, not just a toast
    // Notify every admin — no one is logged in yet at this point, so this always
    // goes out as a plain mailto: rather than through a chosen email client. This
    // opens in the REQUESTER's own email app, not the admin's — so the wording
    // and the on-screen reminder both need to make it obvious they must hit Send.
    const admins = USERS.filter(x=>x.role==='Admin');
    const toList = admins.map(a=>a.email).join(',');
    const subject = `ACTION NEEDED: ${name} Has Requested Access to Southwest Edge Portal`;
    const body = `${name} (${email}) has requested access to the Southwest Edge Portal.\n\nLog in and open Admin > Pending User Requests to admit or deny this request.\n\n— Southwest Edge Portal`;
    window.location.href = `mailto:${toList}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
    render();
  };
  const dismissReminder = document.getElementById('dismissSendReminderBtn'); if(dismissReminder) dismissReminder.onclick=()=>{
    state.showSendRequestReminder = null; render();
  };
}

function computeGlobalSearchResults(query){
  const q = query.toLowerCase().trim();
  if(!q) return [];
  const results = [];
  db.contacts.forEach(c=>{
    const hay = `${c.first} ${c.last} ${c.company||''} ${c.email||''}`.toLowerCase();
    if(hay.includes(q)) results.push({kind:'Contact', label:`${c.first} ${c.last}`, sublabel:c.company||c.email||'', action:{type:'contact', id:c.id}});
  });
  PHOENIX_BROKER_LIST.forEach(b=>{
    const hay = `${b.name} ${b.company||''}`.toLowerCase();
    if(hay.includes(q)) results.push({kind:'Broker', label:b.name, sublabel:b.company||'', action:{type:'broker', id:b.id}});
  });
  db.lists.filter(l=>l.type==='deep').forEach(l=>{
    l.clients.forEach(c=>{
      if(c.name.toLowerCase().includes(q)) results.push({kind:l.id==='listings'?'Listing':'Client', label:c.name, sublabel:'', action:{type:'client', listId:l.id, clientId:c.id}});
      c.deals.forEach(d=>{
        if(d.name.toLowerCase().includes(q)) results.push({kind:'Deal', label:d.name, sublabel:c.name, action:{type:'deal', listId:l.id, clientId:c.id, dealId:d.id}});
      });
      (c.prospects||[]).forEach(p=>{
        if(p.tenantName.toLowerCase().includes(q)) results.push({kind:'Prospect', label:p.tenantName, sublabel:c.name, action:{type:'prospect', clientId:c.id, prospectId:p.id}});
      });
    });
  });
  db.todos.filter(t=>!t.completed).forEach(t=>{
    if(t.title.toLowerCase().includes(q)) results.push({kind:'To-Do', label:t.title, sublabel:t.category||'', action:{type:'todo', id:t.id}});
  });
  return results.slice(0,30).map((r,i)=>({...r, idx:i}));
}

let weatherCache = null; // {tempF, code, fetchedAt} | {error:true, fetchedAt} | null
function weatherEmoji(code){
  if(code===0) return '☀️';
  if([1,2,3].includes(code)) return '⛅';
  if([45,48].includes(code)) return '🌫️';
  if([51,53,55,56,57,61,63,65,66,67,80,81,82].includes(code)) return '🌧️';
  if([71,73,75,77,85,86].includes(code)) return '❄️';
  if([95,96,99].includes(code)) return '⛈️';
  return '🌡️';
}
function weatherLabel(code){
  if(code===0) return 'Clear';
  if([1,2,3].includes(code)) return 'Partly cloudy';
  if([45,48].includes(code)) return 'Foggy';
  if([51,53,55,56,57,61,63,65,66,67,80,81,82].includes(code)) return 'Rain';
  if([71,73,75,77,85,86].includes(code)) return 'Snow';
  if([95,96,99].includes(code)) return 'Thunderstorms';
  return 'Weather';
}
function fetchWeatherIfNeeded(){
  if(weatherCache && (Date.now()-weatherCache.fetchedAt) < 30*60*1000) return;
  weatherCache = {loading:true, fetchedAt:Date.now()};
  fetch('https://api.open-meteo.com/v1/forecast?latitude=33.4484&longitude=-112.0740&current=temperature_2m,weather_code&temperature_unit=fahrenheit&timezone=America%2FPhoenix')
    .then(r=>r.json())
    .then(data=>{
      weatherCache = {tempF:Math.round(data.current.temperature_2m), code:data.current.weather_code, fetchedAt:Date.now()};
      render();
    })
    .catch(()=>{ weatherCache = {error:true, fetchedAt:Date.now()}; render(); });
}

  if(!weatherCache || weatherCache.loading) fetchWeatherIfNeeded();
  return `

    ${!weatherCache || weatherCache.loading ? `<div style="font-size:12.5px;color:var(--ink-soft);">Loading…</div>` :
      weatherCache.error ? `<div style="font-size:12.5px;color:var(--ink-soft);">Couldn't load weather right now.</div>` :

let newsCache = null; // {items:[{title,link}], fetchedAt} | {error:true, fetchedAt} | {loading:true}
function fetchNewsIfNeeded(){
  if(newsCache && !newsCache.error && (Date.now()-newsCache.fetchedAt) < 30*60*1000) return;
  newsCache = {loading:true, fetchedAt:Date.now()};
  // ORION Investment Real Estate's own public "Daily Top 5" page — no login, no paywall,
  // the same content as their daily email. Their server may still not allow a direct browser
  // fetch from another site (CORS); if so this quietly falls back to a plain link-out.
  fetch('https://www.orionprop.com/daily-top-5/')
    .then(r=>{ if(!r.ok) throw new Error('bad status'); return r.text(); })
    .then(text=>{
      const doc = new DOMParser().parseFromString(text, 'text/html');
      const links = Array.from(doc.querySelectorAll('a[href*="/topfive/"]'));
      const seen = new Set();
      const items = [];
      for(const a of links){
        const href = a.getAttribute('href');
        const title = a.textContent.trim();
        if(!href || !title) continue;
        if(title.toLowerCase().includes('read the full article')) continue;
        if(seen.has(href)) continue;
        seen.add(href);
        items.push({title, link: href});
        if(items.length>=5) break;
      }
      if(!items.length) throw new Error('no items found');
      newsCache = {items, fetchedAt:Date.now()};
      render();
    })
    .catch(()=>{ newsCache = {error:true, fetchedAt:Date.now()}; render(); });
}

function openCalendarView(){
  const now = new Date();
  state.calendarViewMode = 'month';
  state.calendarCursor = {year: now.getFullYear(), month: now.getMonth()};
  state.calendarWeekStart = getSundayOfWeek(now);
  state.calendarViewOpen = true;
}
function getSundayOfWeek(d){
  const r = new Date(d);
  r.setHours(0,0,0,0);
  r.setDate(r.getDate() - r.getDay());
  return r;
}
function calendarEligibleTodos(){
  // Someday (no date) and Completed to-dos never appear on a calendar.
  return db.todos.filter(td=>td.dueDate && !td.completed && visibleTodo(td));
}
function calendarTodosByDateKey(){
  const map = {};
  calendarEligibleTodos().forEach(td=>{
    const d = td.dueDate;
    const key = `${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`;
    (map[key] = map[key]||[]).push(td);
  });
  return map;
}
function renderCalendarDayCell(y,m,d,todosByDateKey,today,otherMonth){
  const key = `${y}-${m}-${d}`;
  const items = todosByDateKey[key]||[];
  const isToday = y===today.getFullYear() && m===today.getMonth() && d===today.getDate();
  return `
  <div class="cv-day ${otherMonth?'other-month':''} ${isToday?'is-today':''}" data-cvdate="${y}-${m}-${d}">
    <div class="cv-day-num">${d}</div>
    ${items.map(td=>{
      const mine = td.assignedTo===state.currentUser.id;
      const assignee = USERS.find(u=>u.id===td.assignedTo);
      return `<div class="cv-card-note ${mine?'':'assigned-other'}" draggable="true" data-cvtodo="${td.id}" title="${escapeAttr(td.title)}">
        ${escapeHtml(td.title)}${!mine && assignee? ` <span style="opacity:.7;">(${escapeHtml(assignee.name.split(' ')[0])})</span>`:''}
      </div>`;
    }).join('')}
  </div>`;
}
function renderCalendarViewModal(){
  const mode = state.calendarViewMode || 'month';
  if(!state.calendarCursor){ const now=new Date(); state.calendarCursor={year:now.getFullYear(),month:now.getMonth()}; }
  if(!state.calendarWeekStart){ state.calendarWeekStart = getSundayOfWeek(new Date()); }
  const todosByDateKey = calendarTodosByDateKey();
  const today = todayDate();

  let headTitle = '', cellsHtml = '', gridRowsStyle = '';
  if(mode==='month'){
    const {year, month} = state.calendarCursor;
    headTitle = new Date(year,month,1).toLocaleDateString('en-US',{month:'long', year:'numeric'});
    const firstDow = new Date(year,month,1).getDay();
    const daysInMonth = new Date(year,month+1,0).getDate();
    const daysInPrevMonth = new Date(year,month,0).getDate();
    const leadCount = firstDow;
    for(let i=0;i<leadCount;i++){
      const dayNum = daysInPrevMonth - leadCount + 1 + i;
      let pm = month-1, py = year; if(pm<0){pm=11; py--;}
      cellsHtml += renderCalendarDayCell(py, pm, dayNum, todosByDateKey, today, true);
    }
    for(let d=1; d<=daysInMonth; d++){
      cellsHtml += renderCalendarDayCell(year, month, d, todosByDateKey, today, false);
    }
    const totalSoFar = leadCount + daysInMonth;
    const trailCount = (7 - (totalSoFar % 7)) % 7;
    for(let i=1;i<=trailCount;i++){
      let nm = month+1, ny = year; if(nm>11){nm=0; ny++;}
      cellsHtml += renderCalendarDayCell(ny, nm, i, todosByDateKey, today, true);
    }
  } else {
    // week or 2week — always a fixed Sun–Sat span (or two of them), never a rolling window
    const numWeeks = mode==='2week' ? 2 : 1;
    const start = state.calendarWeekStart;
    const end = new Date(start); end.setDate(end.getDate() + (numWeeks*7 - 1));
    const sameMonth = start.getMonth()===end.getMonth() && start.getFullYear()===end.getFullYear();
    const fmtShort = (d)=>d.toLocaleDateString('en-US',{month:'short',day:'numeric'});
    headTitle = sameMonth
      ? `${start.toLocaleDateString('en-US',{month:'long'})} ${start.getDate()}–${end.getDate()}, ${start.getFullYear()}`
      : `${fmtShort(start)} – ${fmtShort(end)}, ${end.getFullYear()}`;
    for(let i=0;i<numWeeks*7;i++){
      const d = new Date(start); d.setDate(d.getDate()+i);
      cellsHtml += renderCalendarDayCell(d.getFullYear(), d.getMonth(), d.getDate(), todosByDateKey, today, false);
    }
    gridRowsStyle = `grid-auto-rows:minmax(160px,1fr);`;
  }

  const overlay = document.createElement('div');
  overlay.className='cv-overlay';
  overlay.innerHTML = `
  <div class="cv-card">
    <div class="cv-head">
      <button class="cv-nav-btn" data-cvnav="prev">←</button>
      <div class="cv-head-title">${headTitle}</div>
      <button class="cv-nav-btn" data-cvnav="next">→</button>
      <button class="btn secondary sm" data-cvnav="today">Today</button>
      <div class="segmented" style="margin-left:8px;">
        <button class="${mode==='month'?'active':''}" data-cvmode="month">Month</button>
        <button class="${mode==='week'?'active':''}" data-cvmode="week">1 Week</button>
        <button class="${mode==='2week'?'active':''}" data-cvmode="2week">2 Weeks</button>
      </div>
      <div style="flex:1;"></div>
      <button class="modal-close" data-action="closeCalendarView">✕ Done</button>
    </div>
    <div class="cv-legend">
      <span><span class="cv-legend-dot" style="background:var(--edge);"></span>My To-Do's</span>
      <span><span class="cv-legend-dot" style="background:#3B82C4;"></span>Assigned to Others</span>
      <span style="margin-left:auto;">Drag a card onto another day to reschedule it</span>
    </div>
    <div class="cv-grid" style="${gridRowsStyle}">
      ${['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].map(d=>`<div class="cv-dow">${d}</div>`).join('')}
      ${cellsHtml}
    </div>
  </div>`;
  document.getElementById('app').appendChild(overlay);
  wireCalendarViewHandlers(overlay);
}
function wireCalendarViewHandlers(overlay){
  overlay.querySelectorAll('[data-action="closeCalendarView"]').forEach(b=>b.onclick=()=>{ state.calendarViewOpen=false; render(); });
  overlay.querySelectorAll('[data-cvmode]').forEach(b=>b.onclick=()=>{
    state.calendarViewMode = b.dataset.cvmode;
    if(state.calendarViewMode!=='month'){ state.calendarWeekStart = getSundayOfWeek(new Date()); }
    render();
  });
  overlay.querySelectorAll('[data-cvnav]').forEach(b=>b.onclick=()=>{
    const nav = b.dataset.cvnav;
    const mode = state.calendarViewMode || 'month';
    if(nav==='today'){
      const now=new Date();
      state.calendarCursor={year:now.getFullYear(),month:now.getMonth()};
      state.calendarWeekStart = getSundayOfWeek(now);
    } else if(mode==='month'){
      let {year,month} = state.calendarCursor;
      month += (nav==='next'?1:-1);
      if(month<0){month=11;year--;} if(month>11){month=0;year++;}
      state.calendarCursor = {year,month};
    } else {
      // week/2week: jump by exactly the span currently shown (7 or 14 days)
      const span = mode==='2week' ? 14 : 7;
      const d = new Date(state.calendarWeekStart);
      d.setDate(d.getDate() + (nav==='next'? span : -span));
      state.calendarWeekStart = d;
    }
    render();
  });
  overlay.querySelectorAll('[data-cvtodo]').forEach(card=>{
    card.ondragstart=(ev)=>{
      ev.dataTransfer.setData('text/plain', card.dataset.cvtodo);
      ev.dataTransfer.effectAllowed='move';
    };
    card.onclick=()=>{ openTodoDetail(card.dataset.cvtodo); render(); };
  });
  overlay.querySelectorAll('[data-cvdate]').forEach(cell=>{
    cell.ondragover=(ev)=>{ ev.preventDefault(); cell.classList.add('drag-over'); };
    cell.ondragleave=()=>{ cell.classList.remove('drag-over'); };
    cell.ondrop=(ev)=>{
      ev.preventDefault();
      cell.classList.remove('drag-over');
      const todoId = ev.dataTransfer.getData('text/plain');
      const td = db.todos.find(x=>x.id===todoId);
      if(!td) return;
      const [y,m,d] = cell.dataset.cvdate.split('-').map(Number);
      td.dueDate = new Date(y,m,d);
      supaUpdateTodo(td);
      flashToast(`"${td.title}" moved to ${fmtDate(td.dueDate)}.`);
      render();
    };
  });
}

function wireMarketingListWizard(overlay, listing, allCats){
  const m = state.marketingListWizard;
  overlay.querySelectorAll('[data-action="mlwCancel"]').forEach(b=>b.onclick=()=>{ state.marketingListWizard=null; render(); });
  if(m.step===1){
    overlay.querySelectorAll('.mlwCategoryCheck').forEach(cb=>cb.onchange=()=>{
      if(cb.checked) m.selectedCategoryIds.push(cb.value);
      else m.selectedCategoryIds = m.selectedCategoryIds.filter(id=>id!==cb.value);
    });
    overlay.querySelector('[data-action="mlwNext"]').onclick=()=>{
      if(!m.selectedCategoryIds.length){ flashToast('Pick at least one category first.'); return; }
      const existingNames = new Set(listing.prospects.map(p=>p.tenantName.toLowerCase().trim()));
      m.reviewItems = TENANT_ROSTER
        .filter(r=>m.selectedCategoryIds.includes(r.categoryId))
        .map(r=>({rosterId:r.id, name:r.name, categoryId:r.categoryId, tenantType:r.tenantType, notes:r.notes,
                   keep:true, tradeArea:false, prohibited:false, alreadyOnListing: existingNames.has(r.name.toLowerCase().trim())}));
      m.step = 2;
      render();
    };
  } else {
    overlay.querySelectorAll('[data-mlwflag]').forEach(cb=>cb.onclick=(ev)=>{
      ev.stopPropagation();
      const item = m.reviewItems.find(i=>i.rosterId===cb.dataset.rosterid);
      if(!item) return;
      item.keep = (cb.dataset.mlwflag==='keep');
      item.tradeArea = (cb.dataset.mlwflag==='tradeArea');
      item.prohibited = (cb.dataset.mlwflag==='prohibited');
    });
    overlay.querySelector('[data-action="mlwBack"]').onclick=()=>{ m.step=1; render(); };
    overlay.querySelector('[data-action="mlwAddNewTenant"]').onclick=()=>{
      const nameInput = document.getElementById('mlwNewName');
      const catSelect = document.getElementById('mlwNewCategory');
      const errBox = document.getElementById('mlwNewTenantError');
      const name = nameInput.value.trim();
      const categoryId = catSelect.value;
      if(!name || !categoryId){
        errBox.textContent = !categoryId ? 'Choose a category before adding this tenant.' : 'Enter a tenant name.';
        errBox.style.display = 'block';
        return;
      }
      errBox.style.display = 'none';
      const newRoster = {id:crypto.randomUUID(), name, categoryId, tenantType:'', notes:''};
      TENANT_ROSTER.push(newRoster); // added to the permanent, cross-listing roster
      supaCreateRosterEntry(newRoster);
      if(!m.selectedCategoryIds.includes(categoryId)) m.selectedCategoryIds.push(categoryId);
      const alreadyOnListing = listing.prospects.some(p=>p.tenantName.toLowerCase().trim()===name.toLowerCase().trim());
      m.reviewItems.push({rosterId:newRoster.id, name, categoryId, tenantType:'', notes:'', keep:true, tradeArea:false, prohibited:false, alreadyOnListing});
      flashToast(`"${name}" added to the roster and this review.`);
      render();
    };
    overlay.querySelector('[data-action="mlwSave"]').onclick=()=>{
      const existingNames = new Set(listing.prospects.map(p=>p.tenantName.toLowerCase().trim()));
      let added=0, skippedDup=0, discarded=0;
      const toSync = [];
      m.reviewItems.forEach(item=>{
        if(!item.keep || item.prohibited){ discarded++; return; }
        const key = item.name.toLowerCase().trim();
        if(existingNames.has(key)){ skippedDup++; return; }
        const newP = {
          id:crypto.randomUUID(), tenantName:item.name, contactId:null, brokerId:null, categoryId:item.categoryId,
          stage:'contacted', dealType:null, dateOfContact:null,
          notes: [item.tenantType, item.notes].filter(Boolean).join(' — '),
          edgeTracker: state.currentUser.id, deadDate:null,
          building:'', spaceNum:'', size:'', rent:'', price:'', term:'', tiAllowance:'', dealNotes:'',
          commission1Paid:false, commission2Paid:false, attachments:[],
          inTradeArea: item.tradeArea
        };
        listing.prospects.push(newP);
        toSync.push(newP);
        existingNames.add(key);
        added++;
      });
      if(toSync.length){
        supabaseClient.from('prospects').insert(toSync.map(p=>prospectLocalToRow(p, listing.id)))
          .then(({error})=>{ if(error){ console.error('marketing list bulk sync error:', error); flashToast('Added here, but syncing some to the server failed.'); render(); } });
      }
      state.marketingListWizard = null;
      let msg = `Added ${added} tenant${added===1?'':'s'} to ${listing.name}.`;
      if(skippedDup) msg += ` Skipped ${skippedDup} already on this listing.`;
      if(discarded) msg += ` Discarded ${discarded}.`;
      flashToast(msg);
      render();
    };
  }
}

function caOutstandingCount(){

function activeDealsClients(){
  const out = [];
  db.lists.filter(l=>l.type==='deep').forEach(l=>{
    l.clients.forEach(c=>{
      const oldActive = c.deals.filter(d=>d.activeDeal && !d.complete).length;
      const lsrActive = (c.prospects||[]).filter(p=>{
        const isDeal = p.stage!=='contacted' && p.stage!=='interested' && p.stage!=='dead' && p.stage!=='notInterested';
        return isDeal && lsrDealIsActive(p);
      }).length;
      const activeCount = oldActive + lsrActive;
      const totalCount = c.deals.length + (c.prospects? c.prospects.filter(p=>p.stage!=='contacted'&&p.stage!=='interested'&&p.stage!=='dead'&&p.stage!=='notInterested').length : 0);
      if(activeCount>0) out.push({client:c, listId:l.id, listName:l.name, activeCount, totalCount});
    });
  });
  return out;
}

function assigneeRank(td){
  const me = state.currentUser.id;
  if(td.assignedTo===me) return 0;
  const others = USERS.filter(u=>u.id!==me).map(u=>u.id);
  const idx = others.indexOf(td.assignedTo);
  return idx>=0 ? idx+1 : 999;

function todoRowLegend(ids){
  const allSelected = ids.length>0 && ids.every(id=>state.selectedTodoIds.includes(id));
  return `

  </div>`;

function renderTodoList(list){
  if(!list.length){
    return `<div class="empty-state"><div class="big">All clear.</div><div class="tiny">Nothing here right now. Nice work. Take five.</div></div>`;
  }
  // Group by assignee — mine first, then each teammate in turn — and within each
  // group, new/unseen assignments float up, then soonest due date first.
  const sorted = list.slice().sort((a,b)=>{
    const ra=assigneeRank(a), rb=assigneeRank(b);
    if(ra!==rb) return ra-rb;
    if(ra===0){
      const aNew = a.isNew && a.assignedTo===state.currentUser.id;
      const bNew = b.isNew && b.assignedTo===state.currentUser.id;
      if(aNew && !bNew) return -1;
      if(bNew && !aNew) return 1;
    }
    if(!a.dueDate && !b.dueDate) return 0;
    if(!a.dueDate) return 1;
    if(!b.dueDate) return -1;
    return a.dueDate-b.dueDate;
  });
  const allIds = sorted.map(td=>td.id);
  const multiAssignee = new Set(list.map(t=>t.assignedTo)).size > 1;
  if(!multiAssignee) return todoRowLegend(allIds) + sorted.map(td=>renderTodoRow(td)).join('');
  let html=todoRowLegend(allIds); let lastAssignee=undefined;
  sorted.forEach(td=>{
    if(td.assignedTo!==lastAssignee){
      const isMine = td.assignedTo===state.currentUser.id;
      const u = USERS.find(x=>x.id===td.assignedTo);
      const label = isMine ? 'Mine' : (u? u.name : 'Unassigned');
      html += `<div class="section-label" style="${lastAssignee===undefined?'margin-top:0;':'margin-top:18px;'}">${escapeHtml(label)}</div>`;
      lastAssignee = td.assignedTo;
    }
    html += renderTodoRow(td);
  });
  return html;
}
function contextLabel(td){
  const parts=[];
  if(td.listId){
    const l = db.lists.find(x=>x.id===td.listId);
    if(l) parts.push(l.name);
  }
  if(td.category) parts.push(td.category);
  return parts.join(' · ') || 'Personal';
}
function contactForClient(c){
  if(!c || !c.primary) return null;
  return db.contacts.find(x=>x.id===c.primary) || null;

function getTodoContact(td){
  if(td.clientId){
    for(const l of db.lists){ if(l.type==='deep'){ const c=l.clients.find(x=>x.id===td.clientId); if(c) return contactForClient(c); } }
  }
  if(td.dealId){
    for(const l of db.lists){ if(l.type==='deep'){ for(const c of l.clients){ if(c.deals.some(d=>d.id===td.dealId)) return contactForClient(c); } } }
  }
  return null;
}

      ${contact.mobile? `<a class="contact-link" href="${telHref(contact.mobile)}" data-stopprop="1" title="Call ${escapeAttr(contact.first)}">📱 ${escapeHtml(contact.mobile)}</a>`:''}
    </div>` : ''}
    <div class="row-right">
      ${assignee ? `<div class="avatar-chip" title="${assignee.name}">${assignee.initials}</div>` : ''}

function renderPendingDeletionsModal(){
  const overlay = document.createElement('div');
  overlay.className='modal-overlay'; overlay.style.zIndex=175;
  const requests = db.deletionRequests;
  overlay.innerHTML = `
  <div class="modal-card">
    <div class="modal-head"><div class="modal-title">🗑️ Pending Deletions</div><button class="modal-close" data-action="closePendingDeletions">✕</button></div>
    <div class="modal-body">
      <p style="font-size:12.5px;color:var(--ink-soft);margin-top:0;">Every Client/Listing deletion needs approval from the *other* Admin before it actually happens — this prevents one person from accidentally (or unilaterally) wiping out real data. The record stays fully visible and usable to everyone while a request is pending.</p>
      ${!requests.length? `<div class="empty-state"><div class="big">Nothing pending.</div></div>` :
      requests.map(r=>{
        const requester = USERS.find(u=>u.id===r.requestedBy);

        return `
        <div class="row-card" style="cursor:default;">
          <div class="row-body">
            <div class="row-title">${escapeHtml(r.clientName)}</div>

          <div class="row-right" style="flex-direction:row;gap:6px;">
            ${isSelf ? `<span class="tiny" style="color:var(--ink-soft);">Waiting on the other Admin</span>` : `<button class="btn danger sm" data-approvedel="${r.id}">Approve Delete</button>`}
            <button class="btn secondary sm" data-canceldel="${r.id}">Cancel</button>
          </div>
        </div>`;
      }).join('')}
    </div>
    <div class="modal-foot"><button class="btn secondary" data-action="closePendingDeletions">Close</button></div>
  </div>`;
  document.getElementById('app').appendChild(overlay);
  overlay.querySelectorAll('[data-action="closePendingDeletions"]').forEach(b=>b.onclick=()=>{ state.pendingDeletionsOpen=false; render(); });
  overlay.querySelectorAll('[data-approvedel]').forEach(b=>b.onclick=()=>{
    const r = db.deletionRequests.find(x=>x.id===b.dataset.approvedel);
    if(confirm(`Permanently delete "${r.clientName}"? This cannot be undone.`)){
      approveDeletionRequest(r.id);
      state.pendingDeletionsOpen=false;
    }
  });
  overlay.querySelectorAll('[data-canceldel]').forEach(b=>b.onclick=()=>{
    cancelDeletionRequest(b.dataset.canceldel);
  });
}
function renderPendingUsersModal(){
  const overlay = document.createElement('div');
  overlay.className='modal-overlay'; overlay.style.zIndex=175;
  overlay.innerHTML = `
  <div class="modal-card">
    <div class="modal-head"><div class="modal-title">Pending User Requests</div><button class="modal-close" data-action="closePendingModal">✕</button></div>
    <div class="modal-body">
      ${!pendingUsers.length? `<div class="empty-state"><div class="big">No pending requests.</div><div class="tiny">New sign-up requests will show up here for admins to admit.</div></div>` :
      pendingUsers.map(p=>`

          <div class="row-body">
            <div class="row-title">${escapeHtml(p.name)}</div>
            <div class="row-meta"><span>${escapeHtml(p.email)}</span></div>

          </div>
        </div>`).join('')}
    </div>
    <div class="modal-foot"><button class="btn secondary" data-action="closePendingModal">Close</button></div>
  </div>`;
  document.getElementById('app').appendChild(overlay);
  overlay.querySelectorAll('[data-action="closePendingModal"]').forEach(b=>b.onclick=()=>{ state.pendingUsersModalOpen=false; render(); });
  overlay.querySelectorAll('[data-admit]').forEach(b=>b.onclick=()=>{
    const p = pendingUsers.find(x=>x.id===b.dataset.admit);
    const initials = p.name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
    USERS.push({id:'admitted_pending'+uid(), name:p.name, email:p.email, role:'User', initials, passwordSet:false, password:null, emailClient:null, notifPref:null});
    supaCreateAdmittedUser(p.name, p.email, 'User', initials);
    pendingUsers = pendingUsers.filter(x=>x.id!==p.id);
    supaDeletePendingUser(p.id);
    flashToast(`${p.name} admitted — they can now sign in and set a password.`);
    render();
  });
  overlay.querySelectorAll('[data-deny]').forEach(b=>b.onclick=()=>{
    const p = pendingUsers.find(x=>x.id===b.dataset.deny);
    pendingUsers = pendingUsers.filter(x=>x.id!==p.id);
    supaDeletePendingUser(p.id);
    flashToast(`Request from ${p.name} denied.`);
    render();
  });
