/* ---------------- TODO ACTIONS ---------------- */
function toggleComplete(id){
  const td = db.todos.find(x=>x.id===id);
  if(!td) return;
  const wasComplete = td.completed;
  td.completed = !td.completed;
  supaUpdateTodo(td);
  if(!wasComplete && td.completed){
    // Just marked complete: keep it visible in the current view (don't let it vanish
    // out from under someone), and offer an undo window in case it was a mis-click.
    if(!state.recentlyCompletedIds.includes(id)) state.recentlyCompletedIds.push(id);
    state.undoToast = {id, title:td.title, expiresAt: Date.now()+13000};
    setTimeout(()=>{ if(state.undoToast && state.undoToast.id===id) { state.undoToast=null; render(); } }, 13100);
  } else if(wasComplete && !td.completed){
    state.recentlyCompletedIds = state.recentlyCompletedIds.filter(x=>x!==id);
  }
}
function renderUndoToast(){
  if(!state.undoToast || Date.now() > state.undoToast.expiresAt){ state.undoToast=null; return; }
  const el = document.createElement('div');
  el.className='toast';
  el.style.display='flex'; el.style.gap='14px'; el.style.alignItems='center';
  el.innerHTML = `<span>Marked "${escapeHtml(state.undoToast.title)}" complete.</span><button class="btn secondary sm" id="undoCompleteBtn">Undo</button>`;
  document.getElementById('app').appendChild(el);
  document.getElementById('undoCompleteBtn').onclick=()=>{ undoLastComplete(); render(); };
}
function undoLastComplete(){
  if(!state.undoToast) return;
  const td = db.todos.find(x=>x.id===state.undoToast.id);
  if(td){ td.completed=false; supaUpdateTodo(td); }
  state.recentlyCompletedIds = state.recentlyCompletedIds.filter(x=>x!==state.undoToast.id);
  state.undoToast=null;
}
function archiveTodo(id){
  const idx = db.todos.findIndex(x=>x.id===id);
  if(idx<0) return;
  const [td] = db.todos.splice(idx,1);
  td.archivedAt = new Date();
  db.archivedTodos.push(td);
  supaUpdateTodo(td);
}
function archiveAllCompleted(){
  const completed = db.todos.filter(t=>t.completed);
  completed.forEach(t=>{ t.archivedAt=new Date(); db.archivedTodos.push(t); supaUpdateTodo(t); });
  db.todos = db.todos.filter(t=>!t.completed);
  return completed.length;
}
function restoreArchivedTodo(id){
  const idx = db.archivedTodos.findIndex(x=>x.id===id);
  if(idx<0) return;
  const [td] = db.archivedTodos.splice(idx,1);
  delete td.archivedAt;
  db.todos.push(td);
  supaUpdateTodo(td);
}
function takeTodo(id){
  const td = db.todos.find(x=>x.id===id);
  if(td){ td.assignedTo = state.currentUser.id; supaUpdateTodo(td); flashToast('Task taken — now yours.'); }
}
function assignTodo(id, userId){
  const td = db.todos.find(x=>x.id===id);
  if(td){
    td.assignedTo = userId;
    supaUpdateTodo(td);
    const u = USERS.find(x=>x.id===userId);
    flashToast(`Assigned to ${u.name}. Email sent: "You Have a New To Do on Southwest Edge."`);
  }
}
function togglePrivate(id){
  const td = db.todos.find(x=>x.id===id);
  if(td){ td.private = !td.private; supaUpdateTodo(td); }
}
function deleteTodo(id){
  db.todos = db.todos.filter(x=>x.id!==id);
  state.selectedTodoIds = state.selectedTodoIds.filter(x=>x!==id);
  if(state.todoDetailModal && state.todoDetailModal.id===id) state.todoDetailModal=null;
  supaDeleteTodo(id);
  flashToast('To-do deleted.');
}
function toggleSelectTodo(id){
  if(state.selectedTodoIds.includes(id)) state.selectedTodoIds = state.selectedTodoIds.filter(x=>x!==id);
  else state.selectedTodoIds.push(id);
}
function bulkDeleteSelected(){
  const n = state.selectedTodoIds.length;
  const idsToDelete = state.selectedTodoIds.slice();
  db.todos = db.todos.filter(x=>!idsToDelete.includes(x.id));
  state.selectedTodoIds=[];
  idsToDelete.forEach(id=>supaDeleteTodo(id));
  flashToast(`Deleted ${n} to-do${n===1?'':'s'}.`);
}
function bulkCompleteSelected(){
  db.todos.forEach(td=>{ if(state.selectedTodoIds.includes(td.id)){ td.completed=true; supaUpdateTodo(td); } });
  const n = state.selectedTodoIds.length;
  state.selectedTodoIds=[];
  flashToast(`Marked ${n} to-do${n===1?'':'s'} complete.`);
}

/* ---------------- TODO DETAIL / EDIT MODAL ---------------- */
function openTodoDetail(id){
  state.todoDetailModal = {id};
  const td = db.todos.find(x=>x.id===id);
  if(td && td.isNew && td.assignedTo===state.currentUser.id) td.isNew=false;
}
function getTodoLinkSummary(td){
  if(td.dealId){
    const l = db.lists.find(x=>x.id===td.listId);
    const c = l && l.clients.find(x=>x.id===td.clientId);
    const d = c && c.deals.find(x=>x.id===td.dealId);
    if(c && d) return `${c.name} → ${d.name}`;
  }
  if(td.clientId){
    const l = db.lists.find(x=>x.id===td.listId);
    const c = l && l.clients.find(x=>x.id===td.clientId);
    if(c) return `${c.name} (general, no specific site)`;
  }
  if(td.entryId){
    const l = db.lists.find(x=>x.id===td.listId);
    const e = l && l.entries.find(x=>x.id===td.entryId);
    if(e) return `${l.name}: ${e.name}`;
  }
  return 'Not linked to anything — a floating to-do';
}
function renderMoveDealPicker(){
  const m = state.moveDealPicker;
  const srcList = db.lists.find(x=>x.id===m.sourceListId);
  const srcClient = srcList && srcList.clients.find(x=>x.id===m.sourceClientId);
  const deal = srcClient && srcClient.deals.find(x=>x.id===m.dealId);
  if(!deal){ state.moveDealPicker=null; return; }
  const overlay = document.createElement('div');
  overlay.className='modal-overlay'; overlay.style.zIndex=210;
  let bodyHtml = '';
  if(m.step==='createNew'){
    bodyHtml = `
    <button class="toggle-all" data-action="moveDealBack" style="margin-bottom:10px;">← Back to search</button>

    </div>

    const q = (m.query||'').toLowerCase();
    const allClients = [];
    db.lists.filter(l=>l.type==='deep').forEach(l=>l.clients.forEach(c=>{
      if(c.id===m.sourceClientId) return; // can't move to the account it's already in
      if(!q || c.name.toLowerCase().includes(q)) allClients.push({l, c});
    }));
    bodyHtml = `
    <input class="searchbox" id="moveDealSearch" placeholder="🔍 Search Clients/Listings…" value="${escapeAttr(m.query||'')}">
    <button class="btn secondary sm" data-action="goCreateNewAccount" style="width:100%;margin-bottom:10px;">+ Create a New Account</button>
    <div style="max-height:320px;overflow-y:auto;">
      ${allClients.map(({l,c})=>`
        <div class="row-card" data-pickmovedealto="${c.id}" data-listid="${l.id}">
          <div class="row-body"><div class="row-title">${escapeHtml(c.name)}</div><div class="row-meta"><span class="pill gray">${l.id==='listings'?'Listing':'Client'}</span></div></div>
        </div>`).join('') || `<div class="tiny" style="color:var(--ink-soft);padding:10px 0;">No matches.</div>`}
    </div>`;
  }
  overlay.innerHTML = `
  <div class="modal-card">
    <div class="modal-head"><div class="modal-title">Move "${escapeHtml(deal.name)}"</div><button class="modal-close" data-action="closeMoveDeal">✕</button></div>
    <div class="modal-body">${bodyHtml}</div>
  </div>`;
  document.getElementById('app').appendChild(overlay);
  overlay.querySelector('[data-action="closeMoveDeal"]').onclick=()=>{ state.moveDealPicker=null; render(); };
  const searchEl = document.getElementById('moveDealSearch');
  if(searchEl) searchEl.oninput=()=>{ m.query=searchEl.value; render(); };
  const goCreateBtn = overlay.querySelector('[data-action="goCreateNewAccount"]'); if(goCreateBtn) goCreateBtn.onclick=()=>{
    m.step='createNew'; m.newType = m.sourceListId; render();
  };
  const backBtn = overlay.querySelector('[data-action="moveDealBack"]'); if(backBtn) backBtn.onclick=()=>{ m.step='client'; render(); };
  overlay.querySelectorAll('[data-newaccttype]').forEach(b=>b.onclick=()=>{ m.newType=b.dataset.newaccttype; render(); });

  function performMove(targetListId, targetClientId){
    const targetList = db.lists.find(x=>x.id===targetListId);
    const targetClient = targetList.clients.find(x=>x.id===targetClientId);
    srcClient.deals = srcClient.deals.filter(d=>d.id!==deal.id);
    targetClient.deals.push(deal);
    supaUpdateDeal(deal, targetClient.id);
    // Any to-do's hanging directly off this deal need to follow it to its new home.
    db.todos.filter(t=>t.dealId===deal.id).forEach(t=>{
      t.listId = targetListId; t.clientId = targetClient.id;
      supaUpdateTodo(t);
    });
    state.moveDealPicker=null;
    flashToast(`Moved to ${targetClient.name}.`);
    render();
  }
  overlay.querySelectorAll('[data-pickmovedealto]').forEach(el=>el.onclick=()=>{
    performMove(el.dataset.listid, el.dataset.pickmovedealto);
  });
  const createBtn = overlay.querySelector('[data-action="createAndMoveDeal"]'); if(createBtn) createBtn.onclick=async ()=>{
    const name = document.getElementById('moveDealNewName').value.trim();
    if(!name){ flashToast('Give the new account a name first.'); return; }
    const targetListId = m.newType || 'clients';
    const targetList = db.lists.find(x=>x.id===targetListId);
    const newClient = {id:crypto.randomUUID(), name, primary:null, secondary:[], deals:[], createdBy:state.currentUser.id, authorizedUserIds:[]};
    if(targetListId==='listings'){ newClient.prospects=[]; newClient.categoryConfig=newLSRCategoryConfig(); }
    targetList.clients.push(newClient);
    await supaCreateClient(newClient, targetListId);
    performMove(targetListId, newClient.id);
  };
}

  overlay.querySelector('[data-action="detToggleComplete"]').onclick=()=>{ td.completed=!td.completed; supaUpdateTodo(td); render(); };
  overlay.querySelector('[data-action="detSave"]').onclick=()=>{
    td.title=document.getElementById('detTitle').value.trim()||td.title;
    td.category=document.getElementById('detCategory').value.trim();
    td.dueDate=parseNaturalDate(document.getElementById('detDue').value.trim());
    td.notes=document.getElementById('detNotes').value.trim();
    const newAssign=document.getElementById('detAssign').value;
    if(newAssign!==td.assignedTo){
      td.assignedTo=newAssign;
      const u=USERS.find(x=>x.id===newAssign);
      if(newAssign!==state.currentUser.id){
        td.isNew=true;
        const subject = 'You Have a New To Do on Southwest Edge';
        const body = `Hi ${u.name.split(' ')[0]},\n\n${state.currentUser.name} assigned you a to-do:\n\n"${td.title}"${td.category?` (${td.category})`:''}${td.dueDate?`\nDue: ${fmtDate(td.dueDate)}`:''}\n\nLog in to Southwest Edge Portal to view it: ${portalUrl()}\n\n— Sent from Southwest Edge Portal`;
        openEmailDraft(u, subject, body);
        flashToast(`Email draft opened for ${u.name}.`);
      }
    }
    td.private=document.getElementById('detPrivate').checked;
    state.todoDetailModal=null;
    supaUpdateTodo(td);
    flashToast('Changes saved.');
    render();
  };
}

/* ---------------- CENTRALIZED TODO ROW WIRING ---------------- */
function wireTodoRowHandlers(root){
  const selectAllCb = root.querySelector('#selectAllTodosCheckbox');
  if(selectAllCb) selectAllCb.onchange=()=>{
    const ids = selectAllCb.dataset.selectallids ? selectAllCb.dataset.selectallids.split(',').filter(Boolean) : [];
    if(selectAllCb.checked){
      ids.forEach(id=>{ if(!state.selectedTodoIds.includes(id)) state.selectedTodoIds.push(id); });
    } else {
      state.selectedTodoIds = state.selectedTodoIds.filter(id=>!ids.includes(id));
    }
    render();
  };
  root.querySelectorAll('[data-todo]').forEach(el=>{
    el.onclick=(ev)=>{
      if(ev.target.closest('[data-toggle],[data-select],[data-delete],[data-stopprop]')) return;
      openTodoDetail(el.dataset.todo); render();
    };
  });
  root.querySelectorAll('[data-toggle]').forEach(el=>el.onclick=(ev)=>{ ev.stopPropagation(); toggleComplete(el.dataset.toggle); render(); });
  root.querySelectorAll('[data-select]').forEach(el=>el.onclick=(ev)=>{ ev.stopPropagation(); toggleSelectTodo(el.dataset.select); render(); });
  root.querySelectorAll('[data-delete]').forEach(el=>el.onclick=(ev)=>{
    ev.stopPropagation();
    const td = db.todos.find(x=>x.id===el.dataset.delete);
    if(td && confirm(`Delete "${td.title}"? This can't be undone.`)){ deleteTodo(el.dataset.delete); render(); }
  });
  root.querySelectorAll('[data-stopprop]').forEach(el=>el.onclick=(ev)=>ev.stopPropagation());
  const bc=root.querySelector('[data-action="bulkComplete"]'); if(bc) bc.onclick=()=>{ bulkCompleteSelected(); render(); };
  const bd=root.querySelector('[data-action="bulkDelete"]'); if(bd) bd.onclick=()=>{
    if(confirm(`Delete ${state.selectedTodoIds.length} selected to-do(s)? This can't be undone.`)){ bulkDeleteSelected(); render(); }
  };
  const bx=root.querySelector('[data-action="bulkClear"]'); if(bx) bx.onclick=()=>{ state.selectedTodoIds=[]; render(); };
  const archiveAllBtn=root.querySelector('[data-action="archiveAllCompleted"]'); if(archiveAllBtn) archiveAllBtn.onclick=()=>{
    const n = archiveAllCompleted();
    flashToast(`Archived ${n} completed to-do${n===1?'':'s'}.`);
    render();
  };
  root.querySelectorAll('[data-restorearchived]').forEach(el=>el.onclick=()=>{
    restoreArchivedTodo(el.dataset.restorearchived);
    flashToast('Restored to your active to-do\'s.');
    render();
  });
}

/* ---------------- MODAL STACK: Client / Deal / FlatEntry ---------------- */
function openClientModal(listId, clientId, viewMode){
  state.modalStack=[{kind:'client', listId, clientId, viewMode: viewMode||'all'}];
}
function openDealModal(listId, clientId, dealId){
  state.modalStack.push({kind:'deal', listId, clientId, dealId});
}
function openEntryModal(listId, entryId){
  state.modalStack=[{kind:'entry', listId, entryId}];
}
function openArchivedClientModal(listId, clientId){
  const idx = (db.archivedClients||[]).findIndex(x=>x.id===clientId);
  if(idx<0) return;
  const [c] = db.archivedClients.splice(idx,1);
  const l = db.lists.find(x=>x.id===listId);
  l.clients.push(c); // temporary, in-memory only — archivedAt is untouched, so it goes right back on close
  openClientModal(listId, clientId);
}
function closeModalStack(){
  const bottom = state.modalStack[0];
  if(bottom && bottom.kind==='client'){
    const l = db.lists.find(x=>x.id===bottom.listId);
    const c = l && l.clients.find(x=>x.id===bottom.clientId);
    if(c && c.archivedAt){
      l.clients = l.clients.filter(x=>x.id!==c.id);
      db.archivedClients.push(c);
    }
  }
  state.modalStack=[]; render();
}
function popModalTo(index){ state.modalStack = state.modalStack.slice(0, index+1); render(); }

function breadcrumbFor(stack){
  const crumbs=[{label:'Home', idx:-1}];
  stack.forEach((frame,i)=>{
    if(frame.kind==='client'){
      const l=db.lists.find(x=>x.id===frame.listId); const c=l.clients.find(x=>x.id===frame.clientId);
      crumbs.push({label:c.name, idx:i});
    } else if(frame.kind==='deal'){
      const l=db.lists.find(x=>x.id===frame.listId); const c=l.clients.find(x=>x.id===frame.clientId);
      const d=c.deals.find(x=>x.id===frame.dealId);
      crumbs.push({label:d.name, idx:i});
    } else if(frame.kind==='entry'){
      const l=db.lists.find(x=>x.id===frame.listId); const e=l.entries.find(x=>x.id===frame.entryId);
      crumbs.push({label:e.name, idx:i});
    } else if(frame.kind==='lsrProspect'){
      const l=db.lists.find(x=>x.id==='listings'); const c=l.clients.find(x=>x.id===frame.clientId);
      const p=c.prospects.find(x=>x.id===frame.prospectId);
      crumbs.push({label:p.tenantName, idx:i});
    }
  });
  return crumbs;
}

  overlay.querySelectorAll('[data-splitpct]').forEach(el=>el.oninput=()=>{

      flashToast(`Splits add up to ${currentTotal.toFixed(2)}%, not 100% — fix the percentages before saving.`);
      render();

/* Rendered inline inside the Listing's own Client modal — same row-card language,
   breadcrumb drill-down, and modal chrome used everywhere else in the app. */
function lsrEnsureListing(listing){
  if(!listing.prospects) listing.prospects=[];
  if(!listing.categoryConfig) listing.categoryConfig = newLSRCategoryConfig();
}
function lsrMoney(val){
  if(val===undefined||val===null||val==='') return '';
  const s = String(val).trim();
  if(!s) return '';
  return /^[\$]/.test(s) ? s : (/^[0-9.]+$/.test(s) ? '$'+s : s);
}
function lsrFilterRows(rows){
  let out = rows;
  const q = (state.lsrSearch||'').toLowerCase().trim();
  if(q){
    out = out.filter(p=>{
      const contact = p.contactId ? db.contacts.find(c=>c.id===p.contactId) : null;
      const hay = `${p.tenantName} ${p.notes||''} ${contact? contact.first+' '+contact.last:''}`.toLowerCase();
      return hay.includes(q);
    });
  }
  if(state.lsrTrackerFilter && state.lsrTrackerFilter!=='all'){
    out = out.filter(p=>p.edgeTracker===state.lsrTrackerFilter);
  }
  return out;
}
function lsrSortRows(rows){
  return rows.slice().sort((a,b)=>{
    if(!a.dueDateSortHelperUnused){} // no-op, keeps structure simple
    const ad = a.dateOfContact||a.deadDate, bd = b.dateOfContact||b.deadDate;
    const at = ad? ad.getTime():0, bt = bd? bd.getTime():0;
    return bt-at; // most recent activity first
  });
}

/* ---- Category manager (small floating modal) ---- */
function renderLSRCategoryManagerModal(){
  const clientId = state.lsrCategoryManagerOpen;
  const listing = db.lists.find(x=>x.id==='listings').clients.find(c=>c.id===clientId);
  lsrEnsureListing(listing);
  const cfg = listing.categoryConfig;
  const all = DEFAULT_PROPERTY_CATEGORIES.concat(cfg.custom);
  const ordered = cfg.order.map(id=>all.find(c=>c.id===id)).filter(Boolean);
  all.forEach(c=>{ if(!cfg.order.includes(c.id)) ordered.push(c); });
  const overlay = document.createElement('div');
  overlay.className='modal-overlay'; overlay.style.zIndex=270;
  overlay.innerHTML = `
  <div class="modal-card">
    <div class="modal-head"><div class="modal-title">Manage Categories — ${escapeHtml(listing.name)}</div><button class="modal-close" data-action="lsrCloseCatMgr">✕</button></div>
    <div class="modal-body">
      <p style="font-size:12px;color:var(--ink-soft);margin-top:0;">Hide categories this property doesn't need, reorder them, or add your own. This only affects this listing.</p>
      ${ordered.map((c,i)=>`
        <div style="display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--line-soft);">
          <span style="flex:1;font-size:13px;${cfg.hidden.includes(c.id)?'color:var(--ink-soft);text-decoration:line-through;':''}">${escapeHtml(c.name)}</span>
          <button class="btn secondary sm" data-catmove="up:${c.id}" ${i===0?'disabled':''}>↑</button>
          <button class="btn secondary sm" data-catmove="down:${c.id}" ${i===ordered.length-1?'disabled':''}>↓</button>
          <button class="btn secondary sm" data-cattogglehide="${c.id}">${cfg.hidden.includes(c.id)?'Show':'Hide'}</button>
        </div>`).join('')}
      <div class="field" style="margin-top:14px;">
        <label>Add a new category</label>
        <div style="display:flex;gap:8px;">
          <input id="newCatName" placeholder="e.g., Barbecue" style="flex:1;">
          <button class="btn sm" data-action="lsrAddCategory">Add</button>
        </div>
      </div>
    </div>
    <div class="modal-foot"><button class="btn secondary" data-action="lsrCloseCatMgr">Close</button></div>
  </div>`;
  document.getElementById('app').appendChild(overlay);
  overlay.querySelectorAll('[data-action="lsrCloseCatMgr"]').forEach(b=>b.onclick=()=>{ state.lsrCategoryManagerOpen=null; render(); });
  overlay.querySelectorAll('[data-catmove]').forEach(el=>el.onclick=()=>{
    const [dir,id] = el.dataset.catmove.split(':');
    if(!cfg.order.includes(id)) cfg.order = ordered.map(c=>c.id);
    const idx = cfg.order.indexOf(id);
    const swap = dir==='up'? idx-1 : idx+1;
    if(swap<0||swap>=cfg.order.length) return;
    const tmp=cfg.order[idx]; cfg.order[idx]=cfg.order[swap]; cfg.order[swap]=tmp;
    supaSaveListingCategorySettings(listing.id, cfg);
    render();
  });
  overlay.querySelectorAll('[data-cattogglehide]').forEach(el=>el.onclick=()=>{
    const id = el.dataset.cattogglehide;
    if(cfg.hidden.includes(id)) cfg.hidden = cfg.hidden.filter(x=>x!==id);
    else cfg.hidden.push(id);
    supaSaveListingCategorySettings(listing.id, cfg);
    render();
  });
  overlay.querySelector('[data-action="lsrAddCategory"]').onclick=()=>{
    const name = document.getElementById('newCatName').value.trim();
    if(!name) return;
    const id = 'custom'+uid();
    cfg.custom.push({id, name});
    cfg.order.push(id);
    supaCreateCategory(id, name, listing.id);
    supaSaveListingCategorySettings(listing.id, cfg);
    flashToast(`"${name}" category added.`);
    render();
  };
}

/* ---- Wiring for everything above, called from attachModalHandlers ---- */
function wireCategoryCreateOption(selectEl, listing){
  if(!selectEl) return;
  lsrEnsureListing(listing);
  let lastValue = selectEl.value;
  selectEl.addEventListener('change', ()=>{
    if(selectEl.value==='__new__'){
      const name = prompt('Name the new category (e.g., "Barbecue"):');
      if(!name){ selectEl.value = lastValue; return; }
      const id = 'custom'+uid();
      listing.categoryConfig.custom.push({id, name});
      listing.categoryConfig.order.push(id);
      supaCreateCategory(id, name, listing.id);
      supaSaveListingCategorySettings(listing.id, listing.categoryConfig);
      const opt = document.createElement('option');
      opt.value = id; opt.textContent = name;
      const newCatOption = Array.from(selectEl.options).find(o=>o.value==='__new__');
      selectEl.insertBefore(opt, newCatOption);
      selectEl.value = id;
      lastValue = id;
      flashToast(`"${name}" category added.`);
    } else {
      lastValue = selectEl.value;
    }
  });
}
function wireLSRInlineHandlers(root){
  const searchBox = root.querySelector('#lsrSearchBox');
  if(searchBox){
    searchBox.oninput=()=>{ state.lsrSearch=searchBox.value; render(); };
    if(state.lsrSearchFocused){ searchBox.focus(); const len=searchBox.value.length; searchBox.setSelectionRange(len,len); }
    searchBox.onfocus=()=>{ state.lsrSearchFocused=true; };
    searchBox.onblur=()=>{ state.lsrSearchFocused=false; };
  }
  const trackerSel = root.querySelector('#lsrTrackerSelect');
  if(trackerSel) trackerSel.onchange=()=>{ state.lsrTrackerFilter=trackerSel.value; render(); };
  root.querySelectorAll('[data-lsrtoggle]').forEach(el=>el.onclick=()=>{
    const k=el.dataset.lsrtoggle; state.lsrCollapsed[k]=!state.lsrCollapsed[k]; render();
  });
  root.querySelectorAll('[data-lsropen]').forEach(el=>el.onclick=(ev)=>{
    if(ev.target.closest('[data-stopprop]')) return;
    openLSRProspect(el.dataset.client, el.dataset.lsropen); render();
  });
  root.querySelectorAll('[data-lsrconvert]').forEach(el=>el.onclick=(ev)=>{
    ev.stopPropagation();
    openLSRConvertModal(el.dataset.client, el.dataset.lsrconvert); render();
  });
  root.querySelectorAll('[data-lsrcomm1]').forEach(el=>el.onclick=(ev)=>{
    ev.stopPropagation();
    const listing = db.lists.find(x=>x.id==='listings').clients.find(c=>c.id===el.dataset.client);
    const p = listing.prospects.find(x=>x.id===el.dataset.lsrcomm1);
    p.commission1Paid = el.checked;
    supaUpdateProspect(p, listing.id);
    render();
  });
  root.querySelectorAll('[data-lsrcomm2]').forEach(el=>el.onclick=(ev)=>{
    ev.stopPropagation();
    const listing = db.lists.find(x=>x.id==='listings').clients.find(c=>c.id===el.dataset.client);
    const p = listing.prospects.find(x=>x.id===el.dataset.lsrcomm2);
    p.commission2Paid = !p.commission2Paid;
    supaUpdateProspect(p, listing.id);
    if(!lsrDealIsActive(p)) flashToast(`${p.tenantName} — both commission halves paid. No longer an active deal.`);
    render();
  });
  root.querySelectorAll('[data-action="lsrAddProspect"]').forEach(el=>el.onclick=()=>{
    openLSRNewProspectModal(el.dataset.client, el.dataset.category); render();
  });
  const newDealBtn = root.querySelector('[data-action="lsrNewDeal"]'); if(newDealBtn) newDealBtn.onclick=()=>{
    openLSRNewProspectModal(newDealBtn.dataset.client, null, true); render();
  };
  const mgmtBtn = root.querySelector('[data-action="lsrManageCategories"]'); if(mgmtBtn) mgmtBtn.onclick=()=>{
    state.lsrCategoryManagerOpen = mgmtBtn.dataset.client; render();
  };
  const mktBtn = root.querySelector('[data-action="lsrCreateMarketingList"]'); if(mktBtn) mktBtn.onclick=()=>{
    openMarketingListWizard(mktBtn.dataset.client); render();
  };
  const pdfBtn = root.querySelector('[data-action="lsrExportPdf"]'); if(pdfBtn) pdfBtn.onclick=()=>{ window.print(); };
}
function notifyNewLSRTracker(newTrackerId, p, listing){
  if(newTrackerId===state.currentUser.id) return;
  const u = USERS.find(x=>x.id===newTrackerId);
  if(!u) return;
  // A real to-do, assigned to them and marked "new" — reuses the existing float-to-top +
  // email mechanism to-do's already use, rather than inventing a second notification system.
  const newTodo = {
    id:crypto.randomUUID(), title:`Review lead: ${p.tenantName} (${listing.name})`, category:listing.name,
    dueDate: addDays(todayDate(),1), assignedTo:newTrackerId, createdBy:state.currentUser.id,
    type:'task', private:false, completed:false, isNew:true,
    notes:`You're now the Edge Tracker for ${p.tenantName} at ${listing.name}.`,
    listId:'listings', clientId:listing.id, dealId:null, entryId:null, attachments:[]
  };
  db.todos.push(newTodo);
  supaCreateTodo(newTodo);
  const subject = 'You Have a New Lead Assigned on Southwest Edge';
  const body = `Hi ${u.name.split(' ')[0]},\n\n${state.currentUser.name} made you the Edge Tracker for:\n\n"${p.tenantName}" — ${listing.name}\n\nA to-do has been added to your list to follow up — it'll be marked New until you open it.\n\nLog in to view it: ${portalUrl()}\n\n— Sent from Southwest Edge Portal`;
  openEmailDraft(u, subject, body);
  flashToast(`Email draft opened for ${u.name} — they'll also see a new to-do waiting for them.`);
}
function wireLSRProspectBodyHandlers(root, l, listing, p){
  const isConverted = p.stage!=='contacted' && p.stage!=='interested' && p.stage!=='dead' && p.stage!=='notInterested';
  wireCategoryCreateOption(root.querySelector('#lpCategory'), listing);
  const pickBtn = root.querySelector('[data-action="lsrPickContact"]'); if(pickBtn) pickBtn.onclick=()=>{

  };

  const markNI = root.querySelector('[data-action="lsrMarkNotInterested"]'); if(markNI) markNI.onclick=()=>{
    p.stage='notInterested'; p.deadDate=new Date(); supaUpdateProspect(p, listing.id); state.modalStack.pop(); flashToast(`${p.tenantName} marked Not Interested.`); render();
  };
  const reviveBtn = root.querySelector('[data-action="lsrRevive"]'); if(reviveBtn) reviveBtn.onclick=()=>{
    p.stage='interested'; p.deadDate=null; supaUpdateProspect(p, listing.id); flashToast(`${p.tenantName} revived to Interested Prospect.`); render();
  };
  const todoBtn = root.querySelector('[data-action="lsrCreateTodo"]'); if(todoBtn) todoBtn.onclick=()=>{
    state.modalStack.pop();
    openNewTodoModal({category: p.tenantName});

  };
  const saveBtn = root.querySelector('[data-action="lsrSaveProspect"]'); if(saveBtn) saveBtn.onclick=()=>{
    const prevTracker = p.edgeTracker;
    p.tenantName = document.getElementById('lpName').value.trim()||p.tenantName;
    p.categoryId = document.getElementById('lpCategory').value;
    p.dateOfContact = parseNaturalDate(document.getElementById('lpDate').value.trim());
    p.notes = document.getElementById('lpNotes').value.trim();
    p.edgeTracker = document.getElementById('lpTracker').value;
    if(isConverted){
      p.building = document.getElementById('lpBuilding').value.trim();
      p.spaceNum = document.getElementById('lpSpaceNum').value.trim();
      p.size = document.getElementById('lpSize').value.trim();
      const moneyVal = document.getElementById('lpMoney').value.trim();
      if(p.dealType==='sale') p.price = moneyVal; else p.rent = moneyVal;
      p.term = document.getElementById('lpTerm').value.trim();
      p.tiAllowance = document.getElementById('lpTI').value.trim();
      p.stage = document.getElementById('lpStage').value;
    }
    supaUpdateProspect(p, listing.id);
    if(p.edgeTracker !== prevTracker) notifyNewLSRTracker(p.edgeTracker, p, listing);
    flashToast('Saved.');
    render();
  };
}

function convertEntryToDeal(listId, entryId){
  const flatList = db.lists.find(x=>x.id===listId);
  const entry = flatList.entries.find(x=>x.id===entryId);
  let clientsList = db.lists.find(x=>x.id==='clients');
  const newClient = {id:crypto.randomUUID(), name:entry.name, primary:entry.contactId||null, secondary:[], deals:[], createdBy:state.currentUser.id, authorizedUserIds:[]};
  clientsList.clients.push(newClient);
  supaCreateClient(newClient, 'clients');
  // move todos
  db.todos.forEach(t=>{ if(t.entryId===entryId){ t.entryId=null; t.clientId=newClient.id; t.listId='clients'; supaUpdateTodo(t); } });
  flatList.entries = flatList.entries.filter(x=>x.id!==entryId);
  supaDeleteEntry(entryId);
  state.modalStack=[];
  flashToast(`${entry.name} converted to a Client. Add sites to start tracking deals.`);
  state.addUsersPrompt = {listId:'clients', clientId:newClient.id};
}

function finishContactPick(contactId){
  state.duplicatePrompt=null;
  if(state.contactPickerOpen && state.contactPickerOpen.lsrProspectId){
    const {lsrClientId, lsrProspectId} = state.contactPickerOpen;
    const listing = db.lists.find(x=>x.id==='listings').clients.find(c=>c.id===lsrClientId);
    const p = listing.prospects.find(x=>x.id===lsrProspectId);
    p.contactId = contactId;
    supaUpdateProspect(p, listing.id);
  } else if(state.contactPickerOpen && state.contactPickerOpen.clientId){
    const {clientId, slot} = state.contactPickerOpen;
    const clientsList = db.lists.find(l=>l.type==='deep' && l.clients.some(c=>c.id===clientId));
    const client = clientsList.clients.find(c=>c.id===clientId);
    if(slot==='primary'){
      client.primary=contactId;
      supaUpdateClientContact(client, clientsList.id);
    } else {
      client.secondary.push(contactId);
      supabaseClient.from('client_secondary_contacts').insert({client_id:client.id, contact_id:contactId})
        .then(({error})=>{ if(error) console.error('secondary contact sync error:', error); });
    }
  } else if(state.contactPickerOpen && state.contactPickerOpen.entryId){
    const {listId, entryId} = state.contactPickerOpen;
    const l = db.lists.find(x=>x.id===listId);
    const entry = l.entries.find(x=>x.id===entryId);
    entry.contactId = contactId;
    supaUpdateEntry(entry, l.id);
  } else if(state.contactPickerOpen && state.contactPickerOpen.standalone){
    flashToast('Contact created.');
  }
  state.contactPickerOpen=null;
  render();
}

function filesToAttachments(fileList){
  return Array.from(fileList).map(f=>({name:f.name, size:f.size, url:URL.createObjectURL(f)}));
}
function wireAttachmentZone(overlay, zoneId, inputId, getAttachments, target){
  const zone = overlay.querySelector('#'+zoneId);
  const input = overlay.querySelector('#'+inputId);
  if(!zone || !input) return;
  input.onchange = ()=>{ getAttachments().push(...filesToAttachments(input.files)); render(); };
  zone.ondragover = (ev)=>{ ev.preventDefault(); zone.style.borderColor='var(--edge)'; };
  zone.ondragleave = ()=>{ zone.style.borderColor='var(--line)'; };
  zone.ondrop = (ev)=>{
    ev.preventDefault(); zone.style.borderColor='var(--line)';
    if(ev.dataTransfer.files.length) getAttachments().push(...filesToAttachments(ev.dataTransfer.files));
    render();
  };
  overlay.querySelectorAll(`[data-removeattachfor="${target}"]`).forEach(b=>b.onclick=()=>{
    getAttachments().splice(parseInt(b.dataset.removeattach),1); render();
  });
}

function findContactMatch(row){
  const firstL = (row.first||'').toLowerCase().trim(), lastL = (row.last||'').toLowerCase().trim();
  return db.contacts.find(c=>
    (firstL && lastL && c.first.toLowerCase().trim()===firstL && c.last.toLowerCase().trim()===lastL) ||
    (row.email && c.email && c.email.toLowerCase().trim()===row.email.toLowerCase().trim()) ||
    (row.mobile && c.mobile && c.mobile.trim()===row.mobile.trim()) ||
    (row.phone && c.phone && c.phone.trim()===row.phone.trim())
  );
}
const CONTACT_FIELDS = [
  {key:'first', label:'First Name'}, {key:'last', label:'Last Name'}, {key:'company', label:'Company'},
  {key:'website', label:'Website'}, {key:'email', label:'Email'}, {key:'mobile', label:'Mobile'},
  {key:'phone', label:'Phone'}, {key:'address', label:'Address'}, {key:'city', label:'City'},
  {key:'state', label:'State'}, {key:'zip', label:'Zip'},
];
function importCSV(file){
  const reader = new FileReader();
  reader.onload = (e)=>{
    const text = e.target.result;
    const rows = parseCSV(text);
    if(!rows.length){ flashToast('No rows found in that file.'); return; }
    const header = rows[0].map(h=>h.trim());
    const idx = (name)=>header.indexOf(name);
    const iFirst=idx('First Name'), iLast=idx('Last Name'), iCompany=idx('Company'), iWebsite=idx('Website'),
          iEmail=idx('E-mail Address'), iMobile=idx('Mobile Phone'), iPhone=idx('Business Phone'),
          iAddress=idx('Business Street'), iCity=idx('Business City'), iState=idx('Business State'), iZip=idx('Business Postal Code');
    const uniqueRows = [];
    const queue = []; // {row, match}
    for(let r=1;r<rows.length;r++){
      const row=rows[r]; if(!row || row.length<2) continue;
      const first=(row[iFirst]||'').trim(), last=(row[iLast]||'').trim();
      if(!first && !last) continue;
      const parsed = {
        first, last, company:(row[iCompany]||'').trim(), website:(row[iWebsite]||'').trim(),
        email:(row[iEmail]||'').trim(), mobile:(row[iMobile]||'').trim(), phone:(row[iPhone]||'').trim(),
        address:(row[iAddress]||'').trim(), city:(row[iCity]||'').trim(), state:(row[iState]||'').trim(), zip:(row[iZip]||'').trim(),
      };
      const match = findContactMatch(parsed);
      if(match) queue.push({row:parsed, match});
      else uniqueRows.push(parsed);
    }
    if(!queue.length){
      commitContactImport(uniqueRows, []);
      return;
    }
    state.contactImportReview = {uniqueRows, queue, index:0, decisions:[], fieldChoices: buildDefaultFieldChoices(queue[0])};
    render();
  };
  reader.readAsText(file);
}
function buildDefaultFieldChoices(pair){
  // Sensible starting point per field — not a stance on Skip/Merge/Delete overall,
  // just saves a click when one side is obviously blank and the other isn't.
  const choices = {};
  CONTACT_FIELDS.forEach(f=>{
    const existingVal = pair.match[f.key]||'';
    const newVal = pair.row[f.key]||'';
    choices[f.key] = (!existingVal && newVal) ? 'new' : 'existing';
  });
  return choices;
}
async function commitContactImport(uniqueRows, decisions){
  // decisions: [{type:'merge'|'delete', match, row, fieldChoices}]
  const newContacts = uniqueRows.map(row=>({id:crypto.randomUUID(), ...row}));
  db.contacts.push(...newContacts);
  for(const d of decisions){
    if(d.type==='merge'){
      CONTACT_FIELDS.forEach(f=>{ d.match[f.key] = d.fieldChoices[f.key]==='new' ? (d.row[f.key]||'') : d.match[f.key]; });
      supaUpdateContact(d.match);
    } else if(d.type==='delete'){
      db.contacts = db.contacts.filter(c=>c.id!==d.match.id);
      supaDeleteContact(d.match.id);
      const replacement = {id:crypto.randomUUID(), ...d.row};
      db.contacts.push(replacement);
      newContacts.push(replacement);
    }
  }
  const mergedCount = decisions.filter(d=>d.type==='merge').length;
  const deletedCount = decisions.filter(d=>d.type==='delete').length;
  const skippedCount = decisions.filter(d=>d.type==='skip').length;
  flashToast(`Imported ${newContacts.length} new · ${mergedCount} merged · ${deletedCount} replaced · ${skippedCount} skipped.`);
  render();
  if(newContacts.length){
    const { error } = await supabaseClient.from('contacts').insert(newContacts.map(contactLocalToRow));
    if(error){ console.error('CSV bulk sync error:', error); flashToast('Imported here, but syncing some to the server failed. (' + error.message + ')'); render(); }
  }
}

const TF_NULL_DATE_MARKER = 'Fri Dec 13 1901';
function tfCleanDate(raw){
  if(!raw) return null;
  if(raw === '0') return null;
  if(raw.startsWith(TF_NULL_DATE_MARKER)) return null; // TaskFire's own placeholder for "no date"
  const d = new Date(raw);
  if(isNaN(d.getTime())) return null;
  return d;
}
function parseTaskFireCSV(text){
  const rows = parseCSV(text);
  const header = rows[0].map(h=>h.trim());
  const idxType = header.indexOf('Task Type');
  const idxName = header.indexOf('Name');
  const idxNote = header.indexOf('Note');
  const idxDue = header.indexOf('Due Date');

  const clientsList = db.lists.find(l=>l.id==='clients');
  const listingsList = db.lists.find(l=>l.id==='listings');
  const existingInClients = new Map(clientsList.clients.map(c=>[c.name.toLowerCase().trim(), c.id]));
  const existingInListings = new Map(listingsList.clients.map(c=>[c.name.toLowerCase().trim(), c.id]));

  const clients = []; // {name, destListId, existingId, deals:[{name,due,todos}], directTodos:[{name,due}]}
  const ambiguousBatches = []; // {projectNames, deals:[{name,todos}]}
  const taskRows = []; // {name}
  let currentClient = null;
  let currentDeal = null;
  let projectsSincePin = []; // names of Projects seen since the last successfully-resolved deal
  let openAmbiguousBatch = null;

  function closeAmbiguousBatch(){
    if(openAmbiguousBatch && openAmbiguousBatch.deals.length) ambiguousBatches.push(openAmbiguousBatch);
    openAmbiguousBatch = null;
  }

  for(let r=1;r<rows.length;r++){
    const row = rows[r];
    if(!row || !row[idxType]) continue;
    const type = row[idxType].trim();
    const name = (row[idxName]||'').trim();
    if(type==='Task'){ if(name) taskRows.push({name, note:(row[idxNote]||'').trim()}); continue; }
    if(!name) continue;

    if(type==='Project'){
      closeAmbiguousBatch();
      const key = name.toLowerCase().trim();
      const existingClientMatch = existingInClients.get(key) || null;
      const existingListingMatch = existingInListings.get(key) || null;
      // Default every item to Client — if it happens to already exist as a
      // Listing instead, default to that so the smart guess matches what's
      // already there. Either way, it's just a starting point the Admin can
      // flip per-item before confirming, and the merge-target updates
      // automatically to match whichever type is selected.
      const destListId = (!existingClientMatch && existingListingMatch) ? 'listings' : 'clients';
      currentClient = {name, destListId, existingClientMatch, existingListingMatch, deals:[], directTodos:[]};
      clients.push(currentClient);
      projectsSincePin.push(name);
      currentDeal = null;
    } else if(type==='Checklist' || type==='Subtask'){
      const deal = {name, due: tfCleanDate(row[idxDue]), todos:[]};
      currentDeal = deal;
      if(projectsSincePin.length <= 1){
        if(currentClient) currentClient.deals.push(deal);
      } else {
        if(!openAmbiguousBatch) openAmbiguousBatch = {projectNames:[...projectsSincePin], deals:[]};
        openAmbiguousBatch.deals.push(deal);
      }
      projectsSincePin = []; // reset either way — resolved or flagged, this round is done
    } else if(type==='Checklist item'){
      const todo = {name, due: tfCleanDate(row[idxDue])};
      if(currentDeal) currentDeal.todos.push(todo);
      else if(currentClient) currentClient.directTodos.push(todo);
    }
  }
  closeAmbiguousBatch();
  return {clients, ambiguousBatches, taskRows};
}

function tfExistingId(c){ if(c.destListId==='skip') return null; return c.destListId==='listings' ? c.existingListingMatch : c.existingClientMatch; }
function renderContactImportReviewModal(){

          return `

  overlay.querySelector('[data-action="closeContactImportReview"]').onclick=()=>{

      state.contactImportReview=null; render();

  };
}

async function runTaskFireImport(parsed, ownerUserId){
  async function makeFloatingTodo(title, category, notes){
    const todoObj = {id:crypto.randomUUID(), title, category, dueDate:null, assignedTo:ownerUserId,
      createdBy:ownerUserId, type:'task', private:false, completed:false, isNew:false, notes:notes||'',
      listId:null, clientId:null, dealId:null, entryId:null, attachments:[]};
    db.todos.push(todoObj);
    await supaCreateTodo(todoObj);
  }
  for(const c of parsed.clients){
    if(c.destListId==='skip'){
      // Not a real Client/Listing (e.g. "Alabama" — a category, not a company) — still
      // wanted, just as a plain standalone To-Do rather than forcing a Client record
      // that doesn't really represent anything. Same for whatever was nested under it.
      await makeFloatingTodo(c.name, 'From TaskFire');
      for(const d of c.deals){
        const noteText = d.todos.map(t=>t.name).join('; ');
        await makeFloatingTodo(d.name, c.name, noteText);
      }
      for(const t of c.directTodos){
        await makeFloatingTodo(t.name, c.name);
      }
      continue;
    }
    const destListId = c.destListId || 'clients';
    const targetList = db.lists.find(l=>l.id===destListId);
    const existingId = tfExistingId(c);
    let clientObj;
    if(existingId){
      clientObj = targetList.clients.find(x=>x.id===existingId);
    } else {
      clientObj = {id:crypto.randomUUID(), name:c.name, primary:null, secondary:[], deals:[], createdBy:ownerUserId, authorizedUserIds:[]};
      if(destListId==='listings'){ clientObj.prospects=[]; clientObj.categoryConfig=newLSRCategoryConfig(); }
      targetList.clients.push(clientObj);
      await supaCreateClient(clientObj, destListId);
    }
    for(const d of c.deals){
      const dealObj = {id:crypto.randomUUID(), name:d.name, complete:false, activeDeal:false, caExecuted:false, dueDate:d.due||null};
      clientObj.deals.push(dealObj);
      await supaCreateDeal(dealObj, clientObj.id);
      for(const t of d.todos){
        const todoObj = {id:crypto.randomUUID(), title:t.name, category:clientObj.name, dueDate:t.due||null, assignedTo:ownerUserId,
          createdBy:ownerUserId, type:'task', private:false, completed:false, isNew:false, notes:'',
          listId:destListId, clientId:clientObj.id, dealId:dealObj.id, entryId:null, attachments:[]};
        db.todos.push(todoObj);
        await supaCreateTodo(todoObj);
      }
    }
    for(const t of c.directTodos){
      const todoObj = {id:crypto.randomUUID(), title:t.name, category:clientObj.name, dueDate:t.due||null, assignedTo:ownerUserId,
        createdBy:ownerUserId, type:'task', private:false, completed:false, isNew:false, notes:'',
        listId:destListId, clientId:clientObj.id, dealId:null, entryId:null, attachments:[]};
      db.todos.push(todoObj);
      await supaCreateTodo(todoObj);
    }
  }
  // Standalone "Task" rows — these were already shown for review before the import
  // ran. They're intentionally NOT written anywhere: personal notes are locked to
  // the owner's own login now (by design, per the privacy fix), so an Admin
  // importing on someone else's behalf genuinely can't write into their private
  // notes even if we wanted to — that's not a bug, it's the privacy rule working
  // as intended. The account owner can add anything worth keeping themselves.
}

function guessColumn(headers, keywords){
  const lower = headers.map(h=>h.toLowerCase());
  for(const kw of keywords){
    const idx = lower.findIndex(h=>h.includes(kw));
    if(idx>=0) return headers[idx];
  }
  return '';
}

            ${m.headers.map(h=>`<option value="${escapeAttr(h)}" ${m.mapping[t.key]===h?'selected':''}>${escapeHtml(h)}</option>`).join('')}
          </select>
        </div>`).join('')}
    `;
  }
  overlay.innerHTML = `
  <div class="modal-card">
    <div class="modal-head"><div class="modal-title">Import To-Do's</div><button class="modal-close" data-action="closeImportTodos">✕</button></div>
    <div class="modal-body">${body}</div>
    <div class="modal-foot">
      <button class="btn secondary" data-action="closeImportTodos">Cancel</button>
      ${m.step==='map' ? `<button class="btn" data-action="confirmImportTodos">Import ${m.rows.length} To-Do's</button>` : ''}
    </div>
  </div>`;
  document.getElementById('app').appendChild(overlay);
  overlay.querySelectorAll('[data-action="closeImportTodos"]').forEach(b=>b.onclick=()=>{ state.importTodosModal=null; render(); });
  const fileInput = document.getElementById('importTodosFile');
  if(fileInput) fileInput.onchange=(e)=>{
    const file = e.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = (ev)=>{
      const rows = parseCSV(ev.target.result);
      if(!rows.length){ flashToast('No rows found in that file.'); return; }
      state.importTodosModal = {step:'map', headers: rows[0].map(h=>h.trim()), rows: rows.slice(1)};
      render();
    };
    reader.readAsText(file);
  };
  overlay.querySelectorAll('[data-maptarget]').forEach(sel=>sel.onchange=()=>{
    m.mapping[sel.dataset.maptarget] = sel.value;
  });
  const confirmBtn = overlay.querySelector('[data-action="confirmImportTodos"]');
  if(confirmBtn) confirmBtn.onclick=async ()=>{
    const headers = m.headers;
    const idx = (colName)=> colName ? headers.indexOf(colName) : -1;
    const iTitle=idx(m.mapping.title), iCat=idx(m.mapping.category), iDue=idx(m.mapping.due),
          iAssignee=idx(m.mapping.assignee), iDone=idx(m.mapping.completed), iNotes=idx(m.mapping.notes);
    const newTodos = [];
    m.rows.forEach(row=>{
      if(!row || row.length<1) return;
      const title = iTitle>=0 ? (row[iTitle]||'').trim() : '';
      if(!title) return;
      let assignedTo = state.currentUser.id;
      if(iAssignee>=0){
        const name=(row[iAssignee]||'').trim().toLowerCase();
        const match = USERS.find(u=>u.name.toLowerCase().includes(name) || name.includes(u.name.split(' ')[0].toLowerCase()));
        if(match) assignedTo = match.id;
      }
      const doneText = iDone>=0 ? (row[iDone]||'').trim().toLowerCase() : '';
      const completed = ['yes','done','true','1','complete','completed'].includes(doneText);
      newTodos.push({
        id:crypto.randomUUID(), title, category: iCat>=0?(row[iCat]||'').trim():'', dueDate: iDue>=0?parseNaturalDate((row[iDue]||'').trim()):null,
        assignedTo, createdBy:state.currentUser.id, type:'task', private:false, completed, isNew:false,
        notes: iNotes>=0?(row[iNotes]||'').trim():'', listId:null, clientId:null, dealId:null, entryId:null
      });
    });
    db.todos.push(...newTodos);
    state.importTodosModal=null;
    flashToast(`Imported ${newTodos.length} to-do${newTodos.length===1?'':'s'}.`);
    render();
    if(newTodos.length){
      const { error } = await supabaseClient.from('todos').insert(newTodos.map(todoLocalToRow));
      if(error){ console.error('Todo CSV bulk sync error:', error); flashToast('Imported here, but syncing to the server failed. (' + error.message + ')'); render(); }
    }
  };
}
function parseCSV(text){
  // basic CSV parser handling quoted fields
  const rows=[]; let row=[]; let field=''; let inQuotes=false;
  for(let i=0;i<text.length;i++){
    const c=text[i];
    if(inQuotes){
      if(c==='"'){ if(text[i+1]==='"'){ field+='"'; i++; } else inQuotes=false; }
      else field+=c;
    } else {
      if(c==='"') inQuotes=true;
      else if(c===','){ row.push(field); field=''; }
      else if(c==='\r'){ /* skip */ }
      else if(c==='\n'){ row.push(field); rows.push(row); row=[]; field=''; }
      else field+=c;
    }
  }
  if(field.length || row.length){ row.push(field); rows.push(row); }
  return rows.filter(r=>r.length>1 || (r[0]&&r[0].trim()!==''));
}
function exportVCards(ids){
  if(!ids.length) return;
  ids.forEach((id,i)=>{
    const c = db.contacts.find(x=>x.id===id);
    if(!c) return;
    const vcf = [
      'BEGIN:VCARD','VERSION:3.0',
      `N:${c.last};${c.first};;;`,
      `FN:${c.first} ${c.last}`,
      c.company?`ORG:${c.company}`:'',
      c.website?`URL:${c.website}`:'',
      c.email?`EMAIL;TYPE=INTERNET:${c.email}`:'',
      c.mobile?`TEL;TYPE=CELL:${c.mobile}`:'',
      c.phone?`TEL;TYPE=WORK:${c.phone}`:'',
      (c.address||c.city||c.state||c.zip)?`ADR;TYPE=WORK:;;${c.address||''};${c.city||''};${c.state||''};${c.zip||''};`:'',
      'END:VCARD'
    ].filter(Boolean).join('\r\n');
    setTimeout(()=>{
      const blob = new Blob([vcf], {type:'text/vcard'});
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href=url; a.download=`${c.first}_${c.last}.vcf`;
      document.body.appendChild(a); a.click(); a.remove();
      URL.revokeObjectURL(url);
    }, i*150);
  });
  flashToast(`Exporting ${ids.length} vCard file${ids.length===1?'':'s'} to Downloads…`);
}

  return String(str).replace(/[&<>"']/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}
function escapeAttr(str){ return escapeHtml(str); }

// Pull-to-refresh — native browsers suppress this gesture inside an installed
// PWA (no browser chrome to trigger it), so it's rebuilt by hand here. Mobile
// only, and only engages when the visible content is already scrolled to the
// very top (so it never fights with normal scrolling further down the page).
(function setupPullToRefresh(){
  const PULL_THRESHOLD = 70;
  let startY = null, pulling = false, refreshing = false;
  const indicator = document.createElement('div');
  indicator.id = 'pullRefreshIndicator';
  indicator.textContent = '↓ Pull to refresh';
  document.body.appendChild(indicator);

  function contentEl(){ return document.querySelector('.content'); }

  document.addEventListener('touchstart', (ev)=>{
    if(!state.isMobile || refreshing) return;
    const el = contentEl();
    if(!el || el.scrollTop > 0) { startY = null; return; }
    startY = ev.touches[0].clientY;
    pulling = true;
  }, {passive:true});

  document.addEventListener('touchmove', (ev)=>{
    if(!pulling || startY===null || refreshing) return;
    const dy = ev.touches[0].clientY - startY;
    if(dy <= 0){ indicator.style.transform='translate(-50%,-100%)'; indicator.classList.remove('visible'); return; }
    ev.preventDefault();
    const dist = Math.min(dy, PULL_THRESHOLD*1.6);
    indicator.classList.add('visible');
    indicator.style.transform = `translate(-50%, ${dist - 40}px)`;
    indicator.textContent = dy > PULL_THRESHOLD ? '↑ Release to refresh' : '↓ Pull to refresh';
  }, {passive:false});

  document.addEventListener('touchend', (ev)=>{
    if(!pulling || startY===null) { pulling=false; startY=null; return; }
    const dy = (ev.changedTouches && ev.changedTouches[0]) ? ev.changedTouches[0].clientY - startY : 0;
    pulling = false; startY = null;
    if(dy > PULL_THRESHOLD){
      refreshing = true;
      indicator.classList.remove('visible');
      indicator.style.transform = 'translate(-50%, 20px)';
      indicator.innerHTML = '<span class="spin">↻</span> Refreshing…';
      doAppRefresh();
    } else {
      indicator.classList.remove('visible');
      indicator.style.transform = 'translate(-50%,-100%)';
    }
  }, {passive:true});
})();

/* ---------------- PERSISTENCE (localStorage) ----------------
   This app previously lived only in memory — a refresh wiped everything, which is
   why passwords, contacts, and deals all had to be re-entered constantly. Since this
   file runs as your own deployed app (not inside a Claude preview), real browser
   storage is safe and appropriate here. We do NOT persist who's currently logged in
   — the login screen always shows — but passwords, once set, now stick, along with
   every contact/deal/to-do. File attachments are the one exception: their data lives
   only in memory (this was flagged from the start), so they're intentionally not
   carried across a save/reload. */
const STORAGE_KEY = 'swe_portal_v1';
function dateAwareReplacer(key, value){
  const orig = this[key];
  if(orig instanceof Date) return {__type:'Date', __value: orig.toISOString()};
  return value;
}
function dateAwareReviver(key, value){
  if(value && typeof value==='object' && value.__type==='Date') return new Date(value.__value);
  return value;
}
function saveAppState(){
  try{
    const snapshot = {
      smartLists: smartListsArr,
      adminDefaultSchedule,
      otherAccountsOpen: state.otherAccountsOpen,
    };
    localStorage.setItem(STORAGE_KEY, JSON.stringify(snapshot, dateAwareReplacer));
  } catch(e){ /* private-browsing mode, storage full, etc. — fail quietly, app still works */ }
}
let appStateWasLoaded = false;
function loadAppState(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(!raw) return;
    const saved = JSON.parse(raw, dateAwareReviver);
    // NOTE: lists/contacts/todos/archivedTodos/tenantRoster/brokerList are no longer
    // restored here — Supabase is now the real source of truth for all of those
    // (Phase 2+). Restoring them from this old local cache was actively harmful:
    // it could overwrite fresh data with a stale snapshot from before this app had
    // a real backend. Only things Supabase doesn't manage yet stay local.
    if(saved.smartLists){
      // Reconcile the cached list against the CURRENT code defaults, rather than
      // trusting the cache blindly — otherwise a default that's since been removed
      // from the code (like this one) keeps reappearing forever from old browser
      // storage, and a newly-added default never shows up until the cache clears.
      // Custom, user-created smart lists are left alone either way.
      const defaultIds = new Set(SMART_LIST_DEFAULTS.map(d=>d.id));
      const prunedCached = saved.smartLists.filter(s=>!s.isDefault || defaultIds.has(s.id));
      const cachedIds = new Set(prunedCached.map(s=>s.id));
      const missingDefaults = SMART_LIST_DEFAULTS.filter(d=>!cachedIds.has(d.id)).map(s=>({...s, isDefault:true}));
      smartListsArr = [...prunedCached, ...missingDefaults];
    }
    if(saved.adminDefaultSchedule) adminDefaultSchedule = saved.adminDefaultSchedule;
    if(saved.otherAccountsOpen) state.otherAccountsOpen = saved.otherAccountsOpen;
    appStateWasLoaded = true;
  } catch(e){ /* corrupted/old save shape — just fall back to the seed data */ }
}
loadAppState();

render();

// Check for an existing Supabase session (real login persistence — this is the
// part local storage alone could never do). If found, skip the login screen
// and go straight into the app. Runs after the first paint so the login card
// still shows instantly rather than a blank screen while this resolves.
(async ()=>{
  try{
    // Directory additions must land BEFORE the session check below — otherwise
    // someone admitted since this code was last deployed, opening the app on a
    // device that's never seen them, would fail to match against USERS here.
    if(await fetchDirectoryAdditions()) render();
    const { data: { session } } = await supabaseClient.auth.getSession();
    if(session && session.user){
      const profile = await fetchMyProfile(session.user.id);
      if(profile){
        await fetchAllProfilesIntoUsers();
        const u = USERS.find(x=>x.email.toLowerCase()===profile.email.toLowerCase());
        if(u){
          u.authId = profile.id;
          if(!u.emailClient) u.emailClient = profile.email_client;
          if(profile.widget_order) state.widgetOrder = profile.widget_order;
          u.notesList = await fetchPersonalNotes(profile.id);
          if(u.emailClient){
            state.currentUser = u;
            state.screen = 'app';
            if(!appStateWasLoaded) seedAll();
            await fetchAllAppDataFromSupabase();
            render();
          }
        }
      }
    }
  } catch(e){ console.error('Session check failed:', e); }
})();
