<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Southwest Edge Portal</title>
<style>
  :root{
    --edge:#E1531A;
    --edge-dark:#B8410F;
    --edge-darker:#8F3009;
    --edge-light:#FDECE3;
    --edge-lighter:#FFF7F3;
    --ink:#20242C;
    --ink-soft:#5B6270;
    --line:#E7E5E2;
    --line-soft:#F0EEEB;
    --paper:#FFFFFF;
    --canvas:#FAF9F7;
    --good:#3E8E5B;
    --bad:#D64545;
    --warn:#C98A1E;
    --radius:10px;
    --shadow:0 12px 40px rgba(32,20,10,0.14);
    --shadow-sm:0 2px 8px rgba(32,20,10,0.06);
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--canvas);
    color:var(--ink);
    overflow:hidden;
  }
  #app{height:100vh;width:100vw;display:flex;flex-direction:column;position:relative;}
  button{font-family:inherit;cursor:pointer;}
  input,select,textarea{font-family:inherit;}
  a{color:inherit;}
  ::-webkit-scrollbar{width:8px;height:8px;}
  ::-webkit-scrollbar-thumb{background:#DDD8D2;border-radius:8px;}
  ::-webkit-scrollbar-track{background:transparent;}

  /* ---------- LOGIN ---------- */
  .login-wrap{
    min-height:100vh;width:100vw;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;
    background:var(--canvas);
    padding:48px 24px;overflow-y:auto;
  }
  .login-logo{margin-bottom:2px;}
  .login-logo img{height:64px;width:auto;display:block;margin:0 auto;}
  .login-title{font-size:30px;font-weight:600;margin-top:14px;color:var(--edge);}
  .login-title-sub{font-size:16px;font-weight:600;margin-top:2px;color:var(--edge);}
  .login-tag{color:var(--ink-soft);margin-top:8px;font-size:12px;letter-spacing:.12em;text-transform:uppercase;}
  .login-card{
    background:var(--paper);border-radius:16px;box-shadow:var(--shadow);width:420px;max-width:100%;
    padding:30px 30px 26px;margin-top:34px;
  }
  .login-card-title{font-size:20px;font-weight:600;color:var(--edge);margin-bottom:16px;}
  .login-user-row{
    display:flex;align-items:center;gap:12px;border:1.5px solid var(--line);border-radius:10px;padding:11px 14px;
    margin-bottom:10px;cursor:pointer;transition:border-color .12s, background .12s;
  }
  .login-user-row:hover{border-color:#EFC1A8;}
  .login-user-row.selected{border-color:var(--edge);background:var(--edge-lighter);}
  .login-user-row .user-avatar{
    width:34px;height:34px;border-radius:50%;background:var(--edge);color:#fff;font-weight:600;font-size:13px;
    display:flex;align-items:center;justify-content:center;flex-shrink:0;
  }
  .login-user-row .user-name{font-weight:600;font-size:14.5px;color:var(--edge-darker);}
  .login-user-row .user-handle{font-size:12px;color:var(--ink-soft);margin-top:1px;}
  .login-password-field{
    width:100%;padding:11px 13px;border:1px solid var(--line);border-radius:9px;font-size:13.5px;
    background:var(--line-soft);margin-top:6px;
  }
  .login-submit-btn{
    width:100%;padding:12px;border:none;border-radius:9px;background:var(--edge);color:#fff;font-weight:600;
    font-size:14.5px;margin-top:14px;
  }
  .login-submit-btn:hover{background:var(--edge-dark);}
  .login-hint{margin-top:16px;font-size:12px;color:var(--ink-soft);text-align:left;line-height:1.55;}
  .login-register-link{
    display:block;text-align:center;margin-top:14px;color:var(--edge);font-weight:600;font-size:13.5px;
    background:none;border:none;width:100%;padding:6px;
  }
  .login-register-panel{
    margin-top:14px;padding-top:14px;border-top:1px solid var(--line);
  }
  .login-register-panel .field{margin-bottom:10px;}
  .login-register-panel label{font-size:11.5px;font-weight:600;color:var(--ink-soft);display:block;margin-bottom:4px;}
  .login-register-panel input{
    width:100%;padding:9px 11px;border:1px solid var(--line);border-radius:8px;font-size:13px;
  }

  /* ---------- BUTTONS ---------- */
  .btn{
    background:var(--edge);color:#fff;border:none;border-radius:8px;padding:9px 16px;font-size:13px;font-weight:600;
    transition:background .12s;
  }
  .btn:hover{background:var(--edge-dark);}
  .btn.secondary{background:var(--paper);color:var(--ink);border:1px solid var(--line);}
  .btn.secondary:hover{background:var(--line-soft);}
  .btn.ghost{background:transparent;color:var(--edge);border:1px solid var(--edge);}
  .btn.ghost:hover{background:var(--edge-light);}
  .btn.sm{padding:6px 11px;font-size:12px;}
  .btn.danger{background:var(--bad);}
  .btn:disabled{opacity:.45;cursor:not-allowed;}

  /* ---------- SHELL ---------- */
  .shell{display:flex;height:100vh;width:100vw;}
  .sidebar{
    width:270px;min-width:270px;height:100vh;background:var(--paper);border-right:1px solid var(--line);
    display:flex;flex-direction:column;overflow-y:auto;
  }
  .sidebar-header{
    padding:16px 16px 12px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--line-soft);
  }
  .sidebar-avatar{
    width:36px;height:36px;border-radius:50%;background:var(--edge);color:#fff;font-weight:600;font-size:14px;
    display:flex;align-items:center;justify-content:center;flex-shrink:0;
  }
  .sidebar-user{font-weight:600;font-size:14px;}
  .sidebar-sub{font-size:11px;color:var(--ink-soft);}
  .sidebar-topicons{margin-left:auto;display:flex;gap:6px;}
  .icon-btn{
    width:30px;height:30px;border-radius:8px;border:none;background:transparent;display:flex;align-items:center;
    justify-content:center;font-size:15px;color:var(--ink-soft);
  }
  .icon-btn:hover{background:var(--line-soft);color:var(--ink);}

  .nav-section-label{
    font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--ink-soft);font-weight:600;
    padding:14px 16px 6px;display:flex;align-items:center;justify-content:space-between;
  }
  .nav-add{
    width:20px;height:20px;border-radius:50%;background:var(--edge-light);color:var(--edge-dark);border:none;
    font-size:13px;line-height:1;display:flex;align-items:center;justify-content:center;font-weight:600;
  }
  .nav-list{display:flex;flex-direction:column;padding:0 8px;}
  .nav-row-wrap{
    display:flex;align-items:center;border-radius:8px;position:relative;
  }
  .nav-row-wrap:hover{background:var(--edge-lighter);}
  .nav-row-wrap:hover .nav-ellipsis{opacity:1;}
  .nav-row-wrap.active{background:var(--edge-light);}
  .nav-row-wrap.active .nav-row{color:var(--edge-darker);font-weight:600;}
  .nav-row{
    display:flex;align-items:center;gap:10px;padding:9px 8px;font-size:13.5px;color:var(--ink);flex:1;min-width:0;
    border:none;background:transparent;text-align:left;
  }
  .nav-ellipsis{
    background:none;border:none;color:var(--ink-soft);font-size:13px;padding:6px 8px;border-radius:6px;
    opacity:0;flex-shrink:0;margin-right:4px;
  }
  .nav-ellipsis:hover{opacity:1 !important;background:var(--line-soft);}
  .nav-context-menu{
    position:absolute;top:34px;right:6px;background:#fff;border:1px solid var(--line);border-radius:8px;
    box-shadow:var(--shadow);z-index:250;min-width:150px;overflow:hidden;
  }
  .nav-context-menu button{
    display:block;width:100%;text-align:left;padding:8px 12px;font-size:12.5px;background:none;border:none;color:var(--ink);
  }
  .nav-context-menu button:hover{background:var(--edge-lighter);}
  .nav-context-menu button.danger{color:var(--bad);}
  .nav-icon{width:20px;text-align:center;font-size:14px;flex-shrink:0;}
  .nav-label{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .nav-count{
    font-size:11px;font-weight:600;color:#fff;background:#C7C2BC;border-radius:9px;padding:1px 7px;min-width:16px;
    text-align:center;
  }
  .nav-count.urgent{background:var(--bad);}
  .nav-count.mild{background:var(--warn);}
  .sidebar-footer{margin-top:auto;padding:12px 16px;border-top:1px solid var(--line-soft);}

  .main{flex:1;display:flex;flex-direction:column;min-width:0;background:var(--canvas);}
  .topbar{
    height:56px;min-height:56px;border-bottom:1px solid var(--line);background:var(--paper);
    display:flex;align-items:center;padding:0 22px;gap:14px;
  }
  .topbar-title{font-size:22px;font-weight:700;color:var(--edge-darker);letter-spacing:-0.01em;}
  .topbar-eyebrow{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--ink-soft);}
  .topbar-sub{font-size:12px;color:var(--ink-soft);}
  .topbar-spacer{flex:1;}
  .segmented{display:flex;background:var(--line-soft);border-radius:8px;padding:2px;}
  .segmented button{
    border:none;background:transparent;padding:6px 13px;border-radius:7px;font-size:12.5px;font-weight:600;color:var(--ink-soft);
  }
  .segmented button.active{background:var(--paper);color:var(--edge-darker);box-shadow:var(--shadow-sm);}

  .content{flex:1;overflow-y:auto;padding:20px 26px 60px;}
  .content-flex{display:flex;gap:24px;align-items:flex-start;max-width:1280px;margin:0 auto;}
  .content-inner{flex:1;min-width:0;max-width:760px;}
  .side-panel{width:300px;flex-shrink:0;display:flex;flex-direction:column;gap:16px;}
  @media (max-width:1180px){ .side-panel{display:none;} }
  .widget-card{background:var(--paper);border:1px solid var(--line);border-radius:12px;padding:16px;box-shadow:var(--shadow-sm);}
  .widget-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
  .widget-title{font-size:12.5px;font-weight:700;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.04em;}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;text-align:center;}
  .cal-dow{font-size:9.5px;color:var(--ink-soft);font-weight:700;padding-bottom:4px;}
  .cal-day{
    font-size:11.5px;padding:5px 0;border-radius:6px;position:relative;color:var(--ink);
  }
  .cal-day.today{background:var(--edge);color:#fff;font-weight:700;}
  .cal-day.has-todos:not(.today)::after{
    content:'';position:absolute;bottom:2px;left:50%;transform:translateX(-50%);width:4px;height:4px;
    border-radius:50%;background:var(--edge);
  }
  .cal-day.blank{visibility:hidden;}
  .weather-row{display:flex;align-items:center;gap:12px;}
  .weather-temp{font-size:30px;font-weight:700;color:var(--edge-darker);}
  .weather-icon{font-size:32px;}
  .widget-picker-toggle{background:none;border:none;color:var(--ink-soft);font-size:14px;padding:2px 4px;}
  .widget-picker-toggle:hover{color:var(--edge);}

  /* ---------- ROWS / CARDS ---------- */
  .section-label{
    font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--ink-soft);font-weight:600;
    margin:22px 0 8px;
  }
  .section-label:first-child{margin-top:0;}
  .row-card{
    background:var(--paper);border:1px solid var(--line);border-radius:var(--radius);padding:13px 16px;
    margin-bottom:9px;display:flex;align-items:flex-start;gap:13px;cursor:pointer;transition:box-shadow .12s, border-color .12s;
  }
  .row-card:hover{box-shadow:var(--shadow-sm);border-color:#E3B79E;}
  .row-check{
    width:20px;height:20px;border-radius:50%;border:2px solid #D8D4CE;flex-shrink:0;margin-top:1px;
    display:flex;align-items:center;justify-content:center;font-size:11px;color:#fff;
  }
  .row-check.done{background:var(--good);border-color:var(--good);}
  .row-body{flex:1;min-width:0;}
  .row-title{font-size:14.5px;font-weight:600;color:var(--ink);}
  .row-title.done{text-decoration:line-through;color:var(--ink-soft);}
  .row-meta{font-size:12px;color:var(--ink-soft);margin-top:2px;display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
  .row-meta .due{font-weight:600;}
  .row-meta .due.overdue{color:var(--bad);}
  .row-meta .due.today{color:var(--edge-dark);}
  .pill{
    font-size:10.5px;font-weight:600;padding:2px 8px;border-radius:20px;background:var(--edge-light);color:var(--edge-darker);
  }
  .pill.gray{background:var(--line-soft);color:var(--ink-soft);}
  .pill.private{background:#EFE7FB;color:#7647B5;}
  .progress-track{height:5px;border-radius:4px;background:var(--line-soft);margin-top:8px;overflow:hidden;}
  .progress-fill{height:100%;background:var(--good);}
  .row-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0;}
  .row-select{width:17px;height:17px;margin-top:2px;flex-shrink:0;accent-color:var(--edge);}
  .row-trash{
    background:none;border:none;font-size:14px;opacity:.55;padding:2px;border-radius:6px;line-height:1;
  }
  .row-trash:hover{opacity:1;background:var(--edge-light);}
  .row-contact{display:flex;flex-direction:column;gap:3px;margin-left:6px;flex-shrink:0;max-width:170px;align-items:flex-end;}
  .contact-link{
    font-size:11px;color:var(--edge-dark);text-decoration:none;white-space:nowrap;overflow:hidden;
    text-overflow:ellipsis;max-width:170px;
  }
  .contact-link:hover{text-decoration:underline;}
  .bulk-bar{
    display:flex;align-items:center;gap:10px;background:var(--edge-light);border:1px solid var(--edge-light);
    border-radius:10px;padding:9px 14px;margin-bottom:10px;font-size:13px;color:var(--edge-darker);
  }
  .bulk-bar .btn{padding:6px 12px;font-size:12px;}
  .avatar-chip{
    width:24px;height:24px;border-radius:50%;background:var(--edge);color:#fff;font-size:10.5px;font-weight:600;
    display:flex;align-items:center;justify-content:center;
  }
  .star{color:#E8B23D;}
  .empty-state{
    text-align:center;padding:60px 20px;color:var(--ink-soft);
  }
  .empty-state .big{font-size:15px;font-weight:600;color:var(--ink);margin-bottom:4px;}
  .empty-state .tiny{font-size:12.5px;line-height:1.6;}

  .team-row{
    background:var(--paper);border:1px solid var(--line);border-radius:var(--radius);padding:14px 16px;
    margin-bottom:9px;display:flex;align-items:center;gap:13px;cursor:pointer;
  }
  .team-row:hover{box-shadow:var(--shadow-sm);}
  .team-stats{margin-left:auto;display:flex;gap:18px;}
  .team-stat{text-align:center;}
  .team-stat .num{font-size:16px;font-weight:600;color:var(--edge-darker);}
  .team-stat .lab{font-size:10px;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.04em;}

  .fab{
    position:absolute;bottom:26px;left:30px;width:52px;height:52px;border-radius:50%;background:var(--edge);
    color:#fff;font-size:24px;border:none;box-shadow:0 8px 22px rgba(225,83,26,0.45);display:flex;
    align-items:center;justify-content:center;
  }
  .fab:hover{background:var(--edge-dark);}

  /* ---------- MODALS ---------- */
  .modal-overlay{
    position:fixed;inset:0;background:rgba(20,14,8,0.42);display:flex;align-items:center;justify-content:center;
    z-index:100;animation:fadeIn .12s ease-out;
  }
  @keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
  .modal-card{
    background:var(--paper);border-radius:16px;width:560px;max-width:92vw;max-height:86vh;display:flex;flex-direction:column;
    box-shadow:var(--shadow);overflow:hidden;
  }
  .modal-card.wide{width:660px;}
  .modal-head{
    background:var(--edge);color:#fff;padding:16px 20px;display:flex;align-items:center;gap:10px;
  }
  .modal-breadcrumb{font-size:12px;opacity:.85;display:flex;gap:5px;flex-wrap:wrap;}
  .modal-breadcrumb span{cursor:pointer;text-decoration:underline;text-underline-offset:2px;}
  .modal-title-row{display:flex;align-items:center;width:100%;}
  .modal-title{font-size:17px;font-weight:600;flex:1;}
  .modal-close{background:rgba(255,255,255,.18);border:none;color:#fff;width:28px;height:28px;border-radius:8px;font-size:14px;}
  .modal-close:hover{background:rgba(255,255,255,.32);}
  .modal-body{padding:18px 20px;overflow-y:auto;flex:1;}
  .modal-foot{padding:12px 20px;border-top:1px solid var(--line);display:flex;gap:8px;justify-content:flex-end;}

  .contact-card{
    background:var(--edge-lighter);border:1px solid var(--edge-light);border-radius:10px;padding:12px 14px;margin-bottom:14px;
  }
  .contact-card .label{font-size:10px;text-transform:uppercase;color:var(--edge-darker);font-weight:600;letter-spacing:.05em;}
  .contact-line{display:flex;justify-content:space-between;font-size:13px;margin-top:6px;}
  .contact-line b{font-weight:600;}

  .field{margin-bottom:13px;}
  .field label{font-size:12px;font-weight:600;color:var(--ink-soft);display:block;margin-bottom:5px;}
  .field input, .field select, .field textarea{
    width:100%;padding:9px 10px;border:1px solid var(--line);border-radius:8px;font-size:13.5px;color:var(--ink);
    background:#fff;
  }
  .field input:focus, .field select:focus, .field textarea:focus{outline:2px solid var(--edge);outline-offset:1px;}
  .field-row{display:flex;gap:10px;}
  .field-row .field{flex:1;}
  .type-toggle{display:flex;gap:6px;margin-bottom:13px;}
  .type-toggle button{
    flex:1;padding:8px;border-radius:8px;border:1px solid var(--line);background:#fff;font-size:12.5px;font-weight:600;color:var(--ink-soft);
  }
  .type-toggle button.active{background:var(--edge);color:#fff;border-color:var(--edge);}
  .quickdate-row{display:flex;gap:6px;margin-top:6px;flex-wrap:wrap;}
  .quickdate-row button{
    border:1px solid var(--line);background:#fff;border-radius:20px;padding:4px 11px;font-size:11.5px;color:var(--ink-soft);
  }
  .quickdate-row button:hover{border-color:var(--edge);color:var(--edge-dark);}
  .autocomplete-box{position:relative;}
  .suggest-list{
    position:absolute;top:100%;left:0;right:0;background:#fff;border:1px solid var(--line);border-radius:8px;
    box-shadow:var(--shadow);z-index:20;max-height:180px;overflow-y:auto;margin-top:3px;
  }
  .suggest-item{padding:8px 12px;font-size:13px;cursor:pointer;}
  .suggest-item:hover{background:var(--edge-lighter);}
  .suggest-item .sub{font-size:11px;color:var(--ink-soft);}

  .assign-toggle{display:flex;gap:8px;margin-top:6px;}
  .assign-toggle .btn{flex:1;}

  .toast{
    position:fixed;bottom:26px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;
    padding:11px 20px;border-radius:10px;font-size:13px;box-shadow:var(--shadow);z-index:300;
    animation:toastIn .15s ease-out;
  }
  @keyframes toastIn{from{opacity:0;transform:translate(-50%,8px);}to{opacity:1;transform:translate(-50%,0);}}

  .admin-menu{
    position:absolute;top:64px;left:16px;background:#fff;border:1px solid var(--line);border-radius:10px;
    box-shadow:var(--shadow);width:250px;z-index:150;overflow:hidden;
  }
  .admin-item{padding:11px 14px;font-size:13px;border-bottom:1px solid var(--line-soft);display:flex;align-items:center;gap:9px;}
  .admin-item:hover{background:var(--edge-lighter);cursor:pointer;}
  .admin-item:last-child{border-bottom:none;}

  .contacts-table{width:100%;border-collapse:collapse;font-size:13px;}
  .contacts-table th{
    text-align:left;font-size:10.5px;text-transform:uppercase;letter-spacing:.04em;color:var(--ink-soft);
    padding:8px 10px;border-bottom:2px solid var(--line);position:sticky;top:0;background:var(--canvas);
  }
  .contacts-table td{padding:9px 10px;border-bottom:1px solid var(--line-soft);}
  .contacts-table tr:hover td{background:var(--edge-lighter);}
  .checkbox-cell{width:28px;}

  .tab-strip{display:flex;gap:4px;border-bottom:1px solid var(--line);margin-bottom:16px;}
  .tab-strip button{
    padding:9px 4px;margin-right:18px;border:none;background:transparent;font-size:13px;font-weight:600;color:var(--ink-soft);
    border-bottom:2px solid transparent;
  }
  .tab-strip button.active{color:var(--edge-darker);border-color:var(--edge);}

  /* ---------- MOBILE ---------- */
  @media (max-width:820px){
    .sidebar{
      position:fixed;inset:0;z-index:60;width:100%;min-width:0;transform:translateX(0);
    }
    .shell.mobile-detail .sidebar{display:none;}
    .main{width:100%;}
    .shell.mobile-list .main{display:none;}
    .modal-card{width:100%;max-width:100%;height:100%;max-height:100%;border-radius:0;position:fixed;inset:0;}
    .fab{bottom:78px;left:18px;}
    .mobile-tabbar{
      display:flex;position:fixed;bottom:0;left:0;right:0;height:58px;background:#fff;border-top:1px solid var(--line);
      z-index:70;
    }
    .mobile-tabbar button{
      flex:1;border:none;background:transparent;display:flex;flex-direction:column;align-items:center;justify-content:center;
      gap:2px;font-size:10px;color:var(--ink-soft);
    }

/* ---------------- DATE HELPERS ---------------- */
function todayDate(){ const d=new Date(); d.setHours(0,0,0,0); return d; }
function addDays(d,n){ const r=new Date(d); r.setDate(r.getDate()+n); return r; }
function fmtDate(d){
  if(!d) return null;
  const opts={month:'short',day:'numeric'};
  const now = new Date();
  if(d.getFullYear()!==now.getFullYear()) opts.year='numeric';
  return d.toLocaleDateString('en-US',opts);
}
function isSameDay(a,b){ return a && b && a.toDateString()===b.toDateString(); }
function dueStatus(d){
  if(!d) return 'none';
  const t = todayDate();
  if(d < t) return 'overdue';
  if(isSameDay(d,t)) return 'today';
  if(d <= addDays(t,7)) return 'week';
  if(d <= addDays(t,30)) return 'month';
  return 'future';
}
// Natural language date parser: today, tomorrow, next monday, 7/20, 7/20/26, 7/20/2026
function parseNaturalDate(str){
  if(!str) return null;
  str = str.trim().toLowerCase();
  const t = todayDate();
  if(str==='today') return t;
  if(str==='tomorrow') return addDays(t,1);
  if(str==='next week') return addDays(t,7);
  const days=['sunday','monday','tuesday','wednesday','thursday','friday','saturday'];
  for(let i=0;i<days.length;i++){
    if(str.includes(days[i])){
      let target = i, cur = t.getDay();
      let diff = (target - cur + 7) % 7;
      if(diff===0) diff=7;
      if(str.includes('this') && diff>0 && (target-cur+7)%7 !== 0) diff = (target-cur+7)%7 || 7;
      return addDays(t, diff);
    }
  }
  // mm/dd or mm/dd/yy or mm/dd/yyyy
  const m = str.match(/^(\d{1,2})\/(\d{1,2})(?:\/(\d{2,4}))?$/);
  if(m){
    let year = m[3] ? parseInt(m[3]) : t.getFullYear();
    if(year < 100) year += 2000; // shorthand '26' -> 2026
    return new Date(year, parseInt(m[1])-1, parseInt(m[2]));
  }
  const d2 = new Date(str);
  if(!isNaN(d2)) return d2;
  return null;
}

function smartListTodos(key){
  const raw = smartListTodosRaw(key);
  if(key==='completed' || key==='archived') return raw;
  // Keep anything the user just marked complete visible in this same "open" list
  // until they navigate away — so a mis-click doesn't make it vanish instantly.
  if(state.recentlyCompletedIds.length){
    state.recentlyCompletedIds.forEach(id=>{
      if(raw.some(t=>t.id===id)) return;
      const td = db.todos.find(t=>t.id===id);
      if(td) raw.push(td);
    });
  }
  return raw;
}
function smartListTodosRaw(key){
  const t = db.todos.filter(td=>true);
  const me = state.currentUser.id;
  switch(key){
    case 'todayMe': return t.filter(td=>!td.completed && td.assignedTo===me && dueStatus(td.dueDate)==='today');
    case 'todayAll': return t.filter(td=>!td.completed && dueStatus(td.dueDate)==='today');
    case 'overdueMe': return t.filter(td=>!td.completed && td.assignedTo===me && dueStatus(td.dueDate)==='overdue');
    case 'overdueAll': return t.filter(td=>!td.completed && dueStatus(td.dueDate)==='overdue');
    case 'week': return t.filter(td=>!td.completed && ['today','overdue','week'].includes(dueStatus(td.dueDate)));
    case 'month': return t.filter(td=>!td.completed && ['today','overdue','week','month'].includes(dueStatus(td.dueDate)));
    case 'someday': return t.filter(td=>!td.completed && !td.dueDate);
    case 'completed': return t.filter(td=>td.completed);
    case 'archived': return db.archivedTodos.slice();
    case 'everything': return t.filter(td=>!td.completed);
    case 'activeDeals': {
      // used only for the sidebar badge count now — main view is the client hierarchy
      const activeDealIds = new Set();
      db.lists.filter(l=>l.type==='deep').forEach(l=>l.clients.forEach(c=>c.deals.forEach(d=>{ if(d.activeDeal && !d.complete) activeDealIds.add(d.id); })));
      return t.filter(td=>td.dealId && activeDealIds.has(td.dealId) && !td.completed);
    }
    default: {
      const custom = smartListsArr.find(c=>c.id===key && !c.isDefault);
      if(custom) return t.filter(td=>matchesCustomFilter(td, custom.filter));
      return [];
    }
  }
}
function matchesCustomFilter(td, f){
  if(!f) return false;
  if(f.status==='open' && td.completed) return false;
  if(f.status==='completed' && !td.completed) return false;
  if(f.assignee==='me' && td.assignedTo!==state.currentUser.id) return false;
  if(f.assignee && f.assignee!=='me' && f.assignee!=='any' && td.assignedTo!==f.assignee) return false;
  if(f.dateRule && f.dateRule!=='any'){
    const s = dueStatus(td.dueDate);
    if(f.dateRule==='nodate'){ if(td.dueDate) return false; }
    else if(f.dateRule==='exact'){
      if(!td.dueDate || !f.exactDate) return false;
      const target = new Date(f.exactDate+'T00:00:00');
      if(!isSameDay(td.dueDate, target)) return false;
    }
    else {
      if(f.dateRule==='today' && s!=='today') return false;
      if(f.dateRule==='week' && !['today','overdue','week'].includes(s)) return false;
      if(f.dateRule==='month' && !['today','overdue','week','month'].includes(s)) return false;
      if(f.dateRule==='overdue' && s!=='overdue') return false;
    }
  }
  if(f.clientId){
    if(td.clientId!==f.clientId){
      // also match to-do's linked to a deal that belongs to this client
      let dealMatches=false;
      if(td.dealId){
        for(const l of db.lists){ if(l.type==='deep'){ const c=l.clients.find(x=>x.id===f.clientId); if(c && c.deals.some(d=>d.id===td.dealId)){ dealMatches=true; break; } } }
      }
      if(!dealMatches) return false;
    }
  }
  if(f.category && f.category.trim()){
    if((td.category||'').toLowerCase() !== f.category.trim().toLowerCase()) return false;
  }
  return true;
}
function visibleTodo(td){
  // privacy: if private and not mine and not... (admins still can't see detail, only count)
  if(td.private && td.assignedTo!==state.currentUser.id) return false;
  return true;
}

const DAYS_OF_WEEK = [
  {id:'sunday',short:'Sun'},{id:'monday',short:'Mon'},{id:'tuesday',short:'Tue'},{id:'wednesday',short:'Wed'},
  {id:'thursday',short:'Thu'},{id:'friday',short:'Fri'},{id:'saturday',short:'Sat'}
];
function scheduleSummary(sched){
  if(!sched) return 'Using company default';
  const timeLabel = sched.time;
  if(sched.type==='weekly'){
    const day = DAYS_OF_WEEK.find(d=>d.id===(sched.days[0]||'sunday'));
    return `Weekly, ${day?day.short:'Sun'} at ${timeLabel}`;
  }
  const days = sched.days||[];
  let daysLabel;
  if(days.length===7) daysLabel='every day';
  else if(days.length===5 && !days.includes('saturday') && !days.includes('sunday')) daysLabel='weekdays';
  else daysLabel = days.map(d=>DAYS_OF_WEEK.find(x=>x.id===d).short).join('/') || 'no days selected';
  return `Daily (${daysLabel}) at ${timeLabel}`;
}
function generateDigestBody(forUser){
  const items = smartListTodos('week').filter(td=>td.assignedTo===forUser.id);
  const visible = items.filter(td=> !td.private || forUser.id===state.currentUser.id);
  const hiddenCount = items.length - visible.length;
  let body = `Hi ${forUser.name.split(' ')[0]},\n\nHere's what's due this week on Southwest Edge Portal:\n\n`;
  if(!visible.length) body += 'Nothing due this week. Nice work.\n';
  else visible.forEach(td=>{ body += `• ${td.title}${td.dueDate? ' — due '+fmtDate(td.dueDate):''}\n`; });
  if(hiddenCount>0) body += `\n(${hiddenCount} private item${hiddenCount===1?'':'s'} not shown here.)\n`;
  body += `\nLog in to see full details: [portal link]\n\n— Southwest Edge Portal`;
  return body;
}

function openEmailDraft(toUser, subject, body){
  const client = (state.currentUser && state.currentUser.emailClient) || 'other';
  const enc = encodeURIComponent;
  let url;
  if(client==='outlookWeb'){
    url = `https://outlook.office.com/mail/deeplink/compose?to=${enc(toUser.email)}&subject=${enc(subject)}&body=${enc(body)}`;
  } else if(client==='gmail'){
    url = `https://mail.google.com/mail/?view=cm&fs=1&to=${enc(toUser.email)}&su=${enc(subject)}&body=${enc(body)}`;
  } else {
    url = `mailto:${toUser.email}?subject=${enc(subject)}&body=${enc(body)}`;
  }
  const a = document.createElement('a');
  a.href = url;
  if(client==='outlookWeb' || client==='gmail') a.target='_blank';
  document.body.appendChild(a); a.click(); a.remove();
}

function passwordIsStrong(pw){
  return pw.length>=8 && /[0-9]/.test(pw) && /[^A-Za-z0-9]/.test(pw);
}
function attachLoginHandlers(){
  document.querySelectorAll('[data-selectuser]').forEach(el=>el.onclick=()=>{
    state.selectedLoginUser = el.dataset.selectuser; render();
  });
  const submit = document.getElementById('loginSubmitBtn');
  if(submit) submit.onclick=()=>{
    const u = USERS.find(x=>x.id===state.selectedLoginUser);
    const pw = document.getElementById('loginPw').value;
    let firstTime = false;
    if(!u.passwordSet){
      const pw2 = document.getElementById('loginPw2').value;
      if(!passwordIsStrong(pw)){ flashToast('Password must be at least 8 characters, with a number and a special character.'); showToastNow(); return; }
      if(pw!==pw2){ flashToast("Passwords don't match — try again."); showToastNow(); return; }
      u.password=pw; u.passwordSet=true;
      firstTime = true;
    } else {
      if(pw!==u.password){ flashToast('Incorrect password.'); showToastNow(); return; }
    }
    if(firstTime && !u.emailClient){
      state.pendingLoginUser = u;
      state.showEmailClientPicker = true;
      render();
      return;
    }
    state.currentUser=u; state.screen='app'; seedAll(); state.loginTarget=null;
    render();
  };
  const showReg = document.getElementById('showRegisterBtn');
  if(showReg) showReg.onclick=()=>{ state.showRegisterForm=true; render(); };
  const regBtn = document.getElementById('regCreateBtn');
  if(regBtn) regBtn.onclick=()=>{
    const name = document.getElementById('regName').value.trim();
    const email = document.getElementById('regEmail').value.trim();
    if(!name || !email){ flashToast('Name and email are both required.'); render(); return; }
    const request = {id:'pending'+uid(), name, email, requestedAt:new Date()};
    pendingUsers.push(request);
    state.showRegisterForm = false;
    // Notify every admin — no one is logged in yet at this point, so this always
    // goes out as a plain mailto: rather than through a chosen email client.
    const admins = USERS.filter(x=>x.role==='Admin');
    const toList = admins.map(a=>a.email).join(',');
    const subject = 'New User Requesting Access to Southwest Edge Portal';
    const body = `${name} (${email}) has requested access to the Southwest Edge Portal.\n\nLog in and open Admin > Pending User Requests to admit or deny this request.\n\n— Southwest Edge Portal`;
    const a = document.createElement('a');
    a.href = `mailto:${toList}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
    document.body.appendChild(a); a.click(); a.remove();
    flashToast(`Request sent to admins for approval. ${name} can sign in once admitted.`);
    render();
  };
}

let weatherCache = null; // {tempF, code, fetchedAt} | {error:true, fetchedAt} | null
function weatherEmoji(code){
  if(code===0) return '☀️';
  if([1,2,3].includes(code)) return '⛅';
  if([45,48].includes(code)) return '🌫️';
  if([51,53,55,56,57,61,63,65,66,67,80,81,82].includes(code)) return '🌧️';
  if([71,73,75,77,85,86].includes(code)) return '❄️';
  if([95,96,99].includes(code)) return '⛈️';
  return '🌡️';
}
function weatherLabel(code){
  if(code===0) return 'Clear';
  if([1,2,3].includes(code)) return 'Partly cloudy';
  if([45,48].includes(code)) return 'Foggy';
  if([51,53,55,56,57,61,63,65,66,67,80,81,82].includes(code)) return 'Rain';
  if([71,73,75,77,85,86].includes(code)) return 'Snow';
  if([95,96,99].includes(code)) return 'Thunderstorms';
  return 'Weather';
}
function fetchWeatherIfNeeded(){
  if(weatherCache && (Date.now()-weatherCache.fetchedAt) < 30*60*1000) return;
  weatherCache = {loading:true, fetchedAt:Date.now()};
  fetch('https://api.open-meteo.com/v1/forecast?latitude=33.4484&longitude=-112.0740&current=temperature_2m,weather_code&temperature_unit=fahrenheit&timezone=America%2FPhoenix')
    .then(r=>r.json())
    .then(data=>{
      weatherCache = {tempF:Math.round(data.current.temperature_2m), code:data.current.weather_code, fetchedAt:Date.now()};
      render();
    })
    .catch(()=>{ weatherCache = {error:true, fetchedAt:Date.now()}; render(); });
}
function renderWeatherWidget(){
  if(!weatherCache || weatherCache.loading) fetchWeatherIfNeeded();
  return `
  <div class="widget-card">
    <div class="widget-head"><div class="widget-title">Weather · Phoenix, AZ</div></div>
    ${!weatherCache || weatherCache.loading ? `<div style="font-size:12.5px;color:var(--ink-soft);">Loading…</div>` :
      weatherCache.error ? `<div style="font-size:12.5px;color:var(--ink-soft);">Couldn't load weather right now.</div>` :
      `<div class="weather-row">
        <div class="weather-icon">${weatherEmoji(weatherCache.code)}</div>
        <div><div class="weather-temp">${weatherCache.tempF}°F</div><div style="font-size:11.5px;color:var(--ink-soft);">${weatherLabel(weatherCache.code)}</div></div>
      </div>`}
  </div>`;
}
let newsCache = null; // {items:[{title,link}], fetchedAt} | {error:true, fetchedAt} | {loading:true}
function fetchNewsIfNeeded(){
  if(newsCache && !newsCache.error && (Date.now()-newsCache.fetchedAt) < 30*60*1000) return;
  newsCache = {loading:true, fetchedAt:Date.now()};
  // ORION Investment Real Estate's own public "Daily Top 5" page — no login, no paywall,
  // the same content as their daily email. Their server may still not allow a direct browser
  // fetch from another site (CORS); if so this quietly falls back to a plain link-out.
  fetch('https://www.orionprop.com/daily-top-5/')
    .then(r=>{ if(!r.ok) throw new Error('bad status'); return r.text(); })
    .then(text=>{
      const doc = new DOMParser().parseFromString(text, 'text/html');
      const links = Array.from(doc.querySelectorAll('a[href*="/topfive/"]'));
      const seen = new Set();
      const items = [];
      for(const a of links){
        const href = a.getAttribute('href');
        const title = a.textContent.trim();
        if(!href || !title) continue;
        if(title.toLowerCase().includes('read the full article')) continue;
        if(seen.has(href)) continue;
        seen.add(href);
        items.push({title, link: href});
        if(items.length>=5) break;
      }
      if(!items.length) throw new Error('no items found');
      newsCache = {items, fetchedAt:Date.now()};
      render();
    })
    .catch(()=>{ newsCache = {error:true, fetchedAt:Date.now()}; render(); });
}
function renderNewsWidget(){
  if(!newsCache || newsCache.loading) fetchNewsIfNeeded();
  let body;
  if(!newsCache || newsCache.loading){
    body = `<div style="font-size:12.5px;color:var(--ink-soft);">Loading headlines…</div>`;
  } else if(newsCache.error){
    body = `<div style="font-size:12.5px;color:var(--ink-soft);line-height:1.5;margin-bottom:8px;">Couldn't load headlines directly — their server didn't allow it from here.</div>
      <a href="https://www.orionprop.com/daily-top-5/" target="_blank" class="btn secondary sm" style="display:inline-block;text-decoration:none;">Open ORION Daily Top 5 →</a>`;
  } else {
    body = newsCache.items.map(it=>`
      <a href="${escapeAttr(it.link)}" target="_blank" style="display:block;font-size:12.5px;color:var(--ink);text-decoration:none;padding:7px 0;border-bottom:1px solid var(--line-soft);line-height:1.4;">
        ${escapeHtml(it.title)}
      </a>`).join('');
  }
  return `
  <div class="widget-card">
    <div class="widget-head"><div class="widget-title">ORION Daily Top 5</div></div>
    ${body}
    <div style="font-size:10px;color:var(--ink-soft);margin-top:8px;">Public headlines from orionprop.com — updated daily.</div>
  </div>`;
}

function assigneeRank(td){
  const me = state.currentUser.id;
  if(td.assignedTo===me) return 0;
  const others = USERS.filter(u=>u.id!==me).map(u=>u.id);
  const idx = others.indexOf(td.assignedTo);

}
const TODO_ROW_LEGEND = `
  <div style="display:flex;gap:20px;font-size:13.5px;font-weight:600;color:var(--ink);margin-bottom:12px;padding:0 2px;align-items:center;">
    <span><span style="display:inline-block;width:15px;height:15px;border:2px solid var(--ink);border-radius:3px;vertical-align:middle;margin-right:6px;"></span>Select (for bulk actions)</span>
    <span><span style="display:inline-block;width:15px;height:15px;border:2px solid var(--ink);border-radius:50%;vertical-align:middle;margin-right:6px;"></span>Mark complete</span>
  </div>`;
function renderTodoList(list){
  if(!list.length){
    return `<div class="empty-state"><div class="big">All clear.</div><div class="tiny">Nothing here right now. Nice work. Take five.</div></div>`;
  }
  // Group by assignee — mine first, then each teammate in turn — and within each
  // group, new/unseen assignments float up, then soonest due date first.
  const sorted = list.slice().sort((a,b)=>{
    const ra=assigneeRank(a), rb=assigneeRank(b);
    if(ra!==rb) return ra-rb;
    if(ra===0){
      const aNew = a.isNew && a.assignedTo===state.currentUser.id;
      const bNew = b.isNew && b.assignedTo===state.currentUser.id;
      if(aNew && !bNew) return -1;
      if(bNew && !aNew) return 1;
    }
    if(!a.dueDate && !b.dueDate) return 0;
    if(!a.dueDate) return 1;
    if(!b.dueDate) return -1;
    return a.dueDate-b.dueDate;
  });
  const multiAssignee = new Set(list.map(t=>t.assignedTo)).size > 1;
  if(!multiAssignee) return TODO_ROW_LEGEND + sorted.map(td=>renderTodoRow(td)).join('');
  let html=TODO_ROW_LEGEND; let lastAssignee=undefined;
  sorted.forEach(td=>{
    if(td.assignedTo!==lastAssignee){
      const isMine = td.assignedTo===state.currentUser.id;
      const u = USERS.find(x=>x.id===td.assignedTo);
      const label = isMine ? 'Mine' : (u? u.name : 'Unassigned');
      html += `<div class="section-label" style="${lastAssignee===undefined?'margin-top:0;':'margin-top:18px;'}">${escapeHtml(label)}</div>`;
      lastAssignee = td.assignedTo;
    }
    html += renderTodoRow(td);
  });
  return html;
}
function contextLabel(td){
  const parts=[];
  if(td.listId){
    const l = db.lists.find(x=>x.id===td.listId);
    if(l) parts.push(l.name);

  if(td.category) parts.push(td.category);
  return parts.join(' · ') || 'Personal';
}

function getTodoContact(td){

    for(const l of db.lists){ if(l.type==='deep'){ const c=l.clients.find(x=>x.id===td.clientId); if(c) return contactForClient(c); } }

  if(td.dealId){

}

function renderListMain(listId){
  const l = db.lists.find(x=>x.id===listId);

  const singular = l.name.endsWith('s') ? l.name.slice(0,-1) : l.name;

    if(!l.clients.length) return addBtn + `<div class="empty-state"><div class="big">No ${l.name.toLowerCase()} yet.</div><div class="tiny">Add your first one to get moving.</div></div>`;
    return addBtn + l.clients.map(c=>{
      const dealCount = c.deals.length;
      const openDeals = c.deals.filter(d=>!d.complete).length;
      return `
      <div class="row-card" data-openclient="${c.id}" data-listid="${l.id}">
        <div class="nav-icon" style="font-size:20px;">🏷️</div>
        <div class="row-body">
          <div class="row-title">${escapeHtml(c.name)}</div>
          <div class="row-meta"><span>${openDeals} active of ${dealCount} site${dealCount===1?'':'s'}</span></div>
        </div>
      </div>`;
    }).join('');
  } else {
    const isAdmin = state.currentUser.role==='Admin';
    const visibleEntries = isAdmin ? l.entries : l.entries.filter(e=>e.ownerId===state.currentUser.id);
    const addBtn = `<button class="btn sm" data-action="addEntry" data-listid="${l.id}" style="margin-bottom:14px;">+ New Prospect</button>`;
    if(!visibleEntries.length) return addBtn + `<div class="empty-state"><div class="big">Nothing here yet.</div><div class="tiny">Add a prospect to start tracking outreach.</div></div>`;
    return addBtn + visibleEntries.map(e=>{
      const owner = USERS.find(u=>u.id===e.ownerId);
      return `
      <div class="row-card" data-openentry="${e.id}" data-listid="${l.id}">
        <div class="nav-icon" style="font-size:20px;">🎯</div>
        <div class="row-body">
          <div class="row-title">${escapeHtml(e.name)}</div>
          <div class="row-meta">
            <span>Last call: ${e.lastCall? fmtDate(e.lastCall):'—'}</span>
            ${isAdmin && owner ? `<span class="pill gray">${escapeHtml(owner.name)}</span>`:''}
          </div>
          <div class="row-meta" style="color:var(--ink-soft);">${escapeHtml(e.feedback||'')}</div>
        </div>
      </div>`;
    }).join('');
  }
}

function renderShell(){
  // On a phone-width screen we show exactly one pane at a time: the nav list, or the
  // main content for whatever was tapped. A modal (client/deal drill-down) always
  // covers the full screen on top of either, so it doesn't need special-casing here.
  const hideSidebar = state.isMobile && state.mobileScreen==='main';
  const hideMain = state.isMobile && state.mobileScreen==='nav';
  return `
  <div class="shell">
    <div style="${hideSidebar?'display:none;':''}">${renderSidebar()}</div>
    <div class="main" style="${hideMain?'display:none;':''}position:relative;">
      ${renderTopbar()}
      <div class="content"><div class="content-flex"><div class="content-inner">${renderMainContent()}</div>${renderSidePanel()}</div></div>
      ${(!state.isMobile || state.mobileScreen==='main') ? `<button class="fab" data-action="newTodo" title="New To-Do">+</button>` : ''}
    </div>
  </div>
  ${state.isMobile ? renderMobileTabbar() : ''}
  ${state.showAdminMenu ? renderAdminMenu() : ''}
  `;
}
function renderMobileTabbar(){
  const onNav = state.mobileScreen==='nav';
  return `
  <div class="mobile-tabbar">
    <button class="${onNav?'active':''}" data-tab="home"><span class="mt-icon">🏠</span>Home</button>
    <button class="${!onNav && state.mainView.type==='smart'?'active':''}" data-tab="tasks"><span class="mt-icon">✓</span>Tasks</button>
    <button data-tab="calendar"><span class="mt-icon">📅</span>Calendar</button>
    <button data-tab="settings"><span class="mt-icon">⚙️</span>Settings</button>
  </div>`;
}
function renderAdminMenu(){
  return `
  <div class="admin-menu">
    <div class="admin-item" data-action="adminPending">🆕 Pending User Requests ${pendingUsers.length? `<span class="nav-count urgent" style="margin-left:auto;">${pendingUsers.length}</span>`:''}</div>
    <div class="admin-item" data-action="adminImportTodos">⬆️ Import To-Do's (CSV)</div>
    <div class="admin-item" data-action="adminDigest">📨 Compose Weekly Digest</div>
    <div class="admin-item" data-action="adminUsers">👥 Manage Users</div>
    <div class="admin-item" data-action="adminTimes">⏱️ Email Send Times</div>
    <div class="admin-item" data-action="adminReset">🔑 Reset a Password</div>
  </div>`;
}

/* ---------------- SHELL HANDLERS ---------------- */
function attachShellHandlers(){
  document.querySelectorAll('[data-nav]').forEach(el=>el.onclick=()=>{
    const [type,id]=el.dataset.nav.split(':');
    if(type==='smart'){ state.mainView={type:'smart',id}; }
    else if(type==='list'){ state.mainView={type:'list',id}; }
    else if(el.dataset.nav==='contacts'){ state.mainView={type:'contacts'}; }
    state.expandedTeamUser=null;
    state.todoView='mine';
    state.selectedTodoIds=[];

  document.querySelectorAll('[data-navdelete]').forEach(el=>el.onclick=(ev)=>{
    ev.stopPropagation();

  };

    ev.stopPropagation();
    state.sidePanelWidgets[el.dataset.widgettoggle] = el.checked;
    render();
  });
  document.querySelectorAll('[data-action="connectOutlook"]').forEach(outlookBtn=>outlookBtn.onclick=()=>{
    alert("Real Outlook Calendar sync needs a Microsoft-registered app (one-time setup by whoever admins your Microsoft 365) plus your portal's real, final web address — that can't be wired up from a plain preview URL. Once you're on a stable Netlify domain, this is genuinely buildable with no backend server required. For now nothing is synced yet.");
  });
  const addClientBtn=document.querySelector('[data-action="addClient"]'); if(addClientBtn) addClientBtn.onclick=()=>{
    const name = prompt('Name this client:');
    if(!name) return;
    const l = db.lists.find(x=>x.id===addClientBtn.dataset.listid);
    const newClient = {id:'client'+uid(), name, primary:null, secondary:[], deals:[]};
    l.clients.push(newClient);

    render();
  };
  const addEntryBtn=document.querySelector('[data-action="addEntry"]'); if(addEntryBtn) addEntryBtn.onclick=()=>{
    const name = prompt('Name this prospect:');
    if(!name) return;
    const l = db.lists.find(x=>x.id===addEntryBtn.dataset.listid);
    l.entries.push({id:'entry'+uid(), name, lastCall:null, feedback:'', contactId:null, ownerId:state.currentUser.id});
    flashToast(`${name} added to ${l.name}.`);
    render();
  };
  ['adminPending','adminImportTodos','adminDigest','adminUsers','adminTimes','adminReset'].forEach(a=>{
    const e=document.querySelector(`[data-action="${a}"]`);
    if(e) e.onclick=()=>{ state.showAdminMenu=false; handleAdminAction(a); };
  });
}

/* ---------------- TODO ACTIONS ---------------- */
function toggleComplete(id){
  const td = db.todos.find(x=>x.id===id);
  if(!td) return;
  const wasComplete = td.completed;
  td.completed = !td.completed;
  if(!wasComplete && td.completed){
    // Just marked complete: keep it visible in the current view (don't let it vanish
    // out from under someone), and offer an undo window in case it was a mis-click.
    if(!state.recentlyCompletedIds.includes(id)) state.recentlyCompletedIds.push(id);
    state.undoToast = {id, title:td.title, expiresAt: Date.now()+13000};
    setTimeout(()=>{ if(state.undoToast && state.undoToast.id===id) { state.undoToast=null; render(); } }, 13100);
  } else if(wasComplete && !td.completed){
    state.recentlyCompletedIds = state.recentlyCompletedIds.filter(x=>x!==id);
  }
}
function renderUndoToast(){
  if(!state.undoToast || Date.now() > state.undoToast.expiresAt){ state.undoToast=null; return; }
  const el = document.createElement('div');
  el.className='toast';
  el.style.display='flex'; el.style.gap='14px'; el.style.alignItems='center';
  el.innerHTML = `<span>Marked "${escapeHtml(state.undoToast.title)}" complete.</span><button class="btn secondary sm" id="undoCompleteBtn">Undo</button>`;
  document.getElementById('app').appendChild(el);
  document.getElementById('undoCompleteBtn').onclick=()=>{ undoLastComplete(); render(); };
}
function undoLastComplete(){
  if(!state.undoToast) return;
  const td = db.todos.find(x=>x.id===state.undoToast.id);
  if(td) td.completed=false;
  state.recentlyCompletedIds = state.recentlyCompletedIds.filter(x=>x!==state.undoToast.id);
  state.undoToast=null;
}
function archiveTodo(id){
  const idx = db.todos.findIndex(x=>x.id===id);
  if(idx<0) return;
  const [td] = db.todos.splice(idx,1);
  td.archivedAt = new Date();
  db.archivedTodos.push(td);
}
function archiveAllCompleted(){
  const completed = db.todos.filter(t=>t.completed);
  completed.forEach(t=>{ t.archivedAt=new Date(); db.archivedTodos.push(t); });
  db.todos = db.todos.filter(t=>!t.completed);
  return completed.length;
}
function restoreArchivedTodo(id){
  const idx = db.archivedTodos.findIndex(x=>x.id===id);
  if(idx<0) return;
  const [td] = db.archivedTodos.splice(idx,1);
  delete td.archivedAt;
  db.todos.push(td);
}
function takeTodo(id){
  const td = db.todos.find(x=>x.id===id);
  if(td){ td.assignedTo = state.currentUser.id; flashToast('Task taken — now yours.'); }
}
function assignTodo(id, userId){
  const td = db.todos.find(x=>x.id===id);
  if(td){
    td.assignedTo = userId;
    const u = USERS.find(x=>x.id===userId);
    flashToast(`Assigned to ${u.name}. Email sent: "You Have a New To Do on Southwest Edge."`);
  }
}
function togglePrivate(id){
  const td = db.todos.find(x=>x.id===id);
  if(td) td.private = !td.private;
}
function deleteTodo(id){
  db.todos = db.todos.filter(x=>x.id!==id);
  state.selectedTodoIds = state.selectedTodoIds.filter(x=>x!==id);
  if(state.todoDetailModal && state.todoDetailModal.id===id) state.todoDetailModal=null;
  flashToast('To-do deleted.');
}
function toggleSelectTodo(id){
  if(state.selectedTodoIds.includes(id)) state.selectedTodoIds = state.selectedTodoIds.filter(x=>x!==id);
  else state.selectedTodoIds.push(id);
}
function bulkDeleteSelected(){
  const n = state.selectedTodoIds.length;
  db.todos = db.todos.filter(x=>!state.selectedTodoIds.includes(x.id));
  state.selectedTodoIds=[];
  flashToast(`Deleted ${n} to-do${n===1?'':'s'}.`);
}
function bulkCompleteSelected(){
  db.todos.forEach(td=>{ if(state.selectedTodoIds.includes(td.id)) td.completed=true; });
  const n = state.selectedTodoIds.length;
  state.selectedTodoIds=[];
  flashToast(`Marked ${n} to-do${n===1?'':'s'} complete.`);
}

function openTodoDetail(id){
  state.todoDetailModal = {id};
  const td = db.todos.find(x=>x.id===id);
  if(td && td.isNew && td.assignedTo===state.currentUser.id) td.isNew=false;
}
function renderTodoDetailModal(){
  const td = db.todos.find(x=>x.id===state.todoDetailModal.id);

  if(!td.attachments) td.attachments=[];

        <div class="quickdate-row">

      </div>
      <div class="field" style="display:flex;align-items:center;gap:8px;">
        <input type="checkbox" id="detPrivate" style="width:auto;" ${td.private?'checked':''}>
        <label style="margin:0;" for="detPrivate">Private (only I can see the details)</label>

    <div class="modal-foot" style="justify-content:space-between;">
      <button class="btn danger" data-action="detDelete">🗑️ Delete</button>
      <div style="display:flex;gap:8px;">

  overlay.querySelectorAll('[data-detquickdate]').forEach(b=>b.onclick=()=>{ document.getElementById('detDue').value=b.dataset.detquickdate; });

    td.private=document.getElementById('detPrivate').checked;
    state.todoDetailModal=null;
    flashToast('Changes saved.');
    render();
  };
}

/* ---------------- CENTRALIZED TODO ROW WIRING ---------------- */
function wireTodoRowHandlers(root){
  root.querySelectorAll('[data-todo]').forEach(el=>{
    el.onclick=(ev)=>{
      if(ev.target.closest('[data-toggle],[data-select],[data-delete],[data-stopprop]')) return;
      openTodoDetail(el.dataset.todo); render();
    };
  });
  root.querySelectorAll('[data-toggle]').forEach(el=>el.onclick=(ev)=>{ ev.stopPropagation(); toggleComplete(el.dataset.toggle); render(); });
  root.querySelectorAll('[data-select]').forEach(el=>el.onclick=(ev)=>{ ev.stopPropagation(); toggleSelectTodo(el.dataset.select); render(); });
  root.querySelectorAll('[data-delete]').forEach(el=>el.onclick=(ev)=>{
    ev.stopPropagation();
    const td = db.todos.find(x=>x.id===el.dataset.delete);
    if(td && confirm(`Delete "${td.title}"? This can't be undone.`)){ deleteTodo(el.dataset.delete); render(); }
  });
  root.querySelectorAll('[data-stopprop]').forEach(el=>el.onclick=(ev)=>ev.stopPropagation());
  const bc=root.querySelector('[data-action="bulkComplete"]'); if(bc) bc.onclick=()=>{ bulkCompleteSelected(); render(); };
  const bd=root.querySelector('[data-action="bulkDelete"]'); if(bd) bd.onclick=()=>{
    if(confirm(`Delete ${state.selectedTodoIds.length} selected to-do(s)? This can't be undone.`)){ bulkDeleteSelected(); render(); }
  };
  const bx=root.querySelector('[data-action="bulkClear"]'); if(bx) bx.onclick=()=>{ state.selectedTodoIds=[]; render(); };
  const archiveAllBtn=root.querySelector('[data-action="archiveAllCompleted"]'); if(archiveAllBtn) archiveAllBtn.onclick=()=>{
    const n = archiveAllCompleted();
    flashToast(`Archived ${n} completed to-do${n===1?'':'s'}.`);
    render();
  };
  root.querySelectorAll('[data-restorearchived]').forEach(el=>el.onclick=()=>{
    restoreArchivedTodo(el.dataset.restorearchived);
    flashToast('Restored to your active to-do\'s.');
    render();
  });
}

/* ---------------- MODAL STACK: Client / Deal / FlatEntry ---------------- */
function openClientModal(listId, clientId){
  state.modalStack=[{kind:'client', listId, clientId}];
}
function openDealModal(listId, clientId, dealId){
  state.modalStack.push({kind:'deal', listId, clientId, dealId});
}
function openEntryModal(listId, entryId){
  state.modalStack=[{kind:'entry', listId, entryId}];
}
function closeModalStack(){ state.modalStack=[]; render(); }
function popModalTo(index){ state.modalStack = state.modalStack.slice(0, index+1); render(); }

function breadcrumbFor(stack){
  const crumbs=[{label:'Home', idx:-1}];
  stack.forEach((frame,i)=>{
    if(frame.kind==='client'){
      const l=db.lists.find(x=>x.id===frame.listId); const c=l.clients.find(x=>x.id===frame.clientId);
      crumbs.push({label:c.name, idx:i});
    } else if(frame.kind==='deal'){
      const l=db.lists.find(x=>x.id===frame.listId); const c=l.clients.find(x=>x.id===frame.clientId);
      const d=c.deals.find(x=>x.id===frame.dealId);
      crumbs.push({label:d.name, idx:i});
    } else if(frame.kind==='entry'){
      const l=db.lists.find(x=>x.id===frame.listId); const e=l.entries.find(x=>x.id===frame.entryId);
      crumbs.push({label:e.name, idx:i});
    }
  });
  return crumbs;
}

function renderModalStack(){
  const overlay = document.createElement('div');
  overlay.className='modal-overlay';
  overlay.innerHTML = renderTopModalCard();
  document.getElementById('app').appendChild(overlay);
  overlay.addEventListener('mousedown', (ev)=>{ if(ev.target===overlay) closeModalStack(); });
  attachModalHandlers(overlay);
}
function guessDomain(name){
  const compact = (name||'').toLowerCase().replace(/[^a-z0-9]/g,'');
  return compact + '.com';
}
function brandLogoImg(name){
  if(!name) return '';
  return `<img src="https://logo.clearbit.com/${guessDomain(name)}" alt="" style="width:26px;height:26px;border-radius:6px;background:#fff;object-fit:contain;margin-right:9px;flex-shrink:0;" onerror="this.style.display='none'">`;
}
function renderTopModalCard(){
  const frame = state.modalStack[state.modalStack.length-1];
  const crumbs = breadcrumbFor(state.modalStack);
  let bodyHtml='', titleText='', brandName='';
  if(frame.kind==='client'){
    const l=db.lists.find(x=>x.id===frame.listId); const c=l.clients.find(x=>x.id===frame.clientId);
    titleText=c.name; brandName=c.name;
    bodyHtml = renderClientModalBody(l,c);
  } else if(frame.kind==='deal'){
    const l=db.lists.find(x=>x.id===frame.listId); const c=l.clients.find(x=>x.id===frame.clientId);
    const d=c.deals.find(x=>x.id===frame.dealId);
    titleText=d.name; brandName=c.name;
    bodyHtml = renderDealModalBody(l,c,d);
  } else if(frame.kind==='entry'){
    const l=db.lists.find(x=>x.id===frame.listId); const e=l.entries.find(x=>x.id===frame.entryId);
    titleText=e.name; brandName=e.name;
    bodyHtml = renderEntryModalBody(l,e);
  }
  return `
  <div class="modal-card wide">
    <div class="modal-head">
      <div style="flex:1;">
        <div class="modal-breadcrumb">
          ${crumbs.map(cr=>`<span data-crumb="${cr.idx}">${escapeHtml(cr.label)}</span>`).join('<span style="opacity:.6;"> / </span>')}
        </div>
        <div class="modal-title-row">${brandLogoImg(brandName)}<div class="modal-title">${escapeHtml(titleText)}</div></div>
      </div>
      <button class="modal-close" data-action="closeModal">✕ Done</button>
    </div>
    <div class="modal-body">${bodyHtml}</div>
  </div>`;
}
function contactRow(contactId){
  const c = db.contacts.find(x=>x.id===contactId);
  if(!c) return `<div class="tiny" style="color:var(--ink-soft);font-size:12px;">No contact attached.</div>`;
  const addrParts = [c.address, [c.city, c.state].filter(Boolean).join(', '), c.zip].filter(Boolean).join(' · ');
  return `
  <div class="contact-line"><span>Name</span><b>${c.first} ${c.last}</b></div>
  <div class="contact-line"><span>Email</span><b>${c.email||'—'}</b></div>
  <div class="contact-line"><span>Mobile</span><b>${c.mobile||'—'}</b></div>
  <div class="contact-line"><span>Phone</span><b>${c.phone||'—'}</b></div>
  ${c.website ? `<div class="contact-line"><span>Website</span><b>${escapeHtml(c.website)}</b></div>`:''}
  ${addrParts ? `<div class="contact-line"><span>Address</span><b>${escapeHtml(addrParts)}</b></div>`:''}`;
}
function renderClientModalBody(l,c){
  const openDeals = c.deals.filter(d=>!d.complete);
  const doneDeals = c.deals.filter(d=>d.complete);
  return `
  <button class="btn sm" data-action="addDeal" data-client="${c.id}" style="margin-bottom:14px;">+ Add site / deal</button>
  <div class="contact-card">
    <div class="label">Primary Contact</div>
    ${contactRow(c.primary)}
    <button class="btn secondary sm" style="margin-top:10px;" data-action="pickContact" data-client="${c.id}" data-slot="primary">${c.primary? 'Change contact':'Attach contact'}</button>
  </div>
  <div class="section-label">Sites / Deals</div>
  ${openDeals.map(d=>renderDealRowInClient(l,c,d)).join('')}
  ${doneDeals.length? `<div class="section-label">Completed</div>${doneDeals.map(d=>renderDealRowInClient(l,c,d)).join('')}`:''}
  `;
}
function renderDealRowInClient(l,c,d){

  const todoCount = db.todos.filter(t=>t.dealId===d.id && !t.completed).length;
  return `
  <div class="row-card" data-opendeal="${d.id}" data-client="${c.id}" data-listid="${l.id}">
    <div class="row-check ${d.complete?'done':''}" data-toggledeal="${d.id}" title="Mark complete">${d.complete?'✓':''}</div>
    <div class="row-body">
      <div class="row-title ${d.complete?'done':''}">${escapeHtml(d.name)}</div>
      <div class="row-meta">
        <span class="due ${cls}">${d.dueDate?fmtDate(d.dueDate):'No date'}</span>
        <span class="pill gray">${todoCount} open to-do${todoCount===1?'':'s'}</span>

    </div>
    <label style="display:flex;align-items:center;gap:6px;font-size:11.5px;color:var(--ink-soft);flex-shrink:0;" data-stopprop="1">

      Active Deal
    </label>
  </div>`;
}
function renderDealModalBody(l,c,d){
  const todos = db.todos.filter(t=>t.dealId===d.id).filter(visibleTodo);

  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;">
    <button class="btn sm" data-action="newTodoInDeal" data-listid="${l.id}" data-client="${c.id}" data-deal="${d.id}">+ New To-Do</button>

function renderEntryModalBody(l,e){

  <div style="margin-bottom:14px;display:flex;gap:8px;">

    <button class="btn ghost sm" data-action="convertToDeal" data-listid="${l.id}" data-entry="${e.id}">Convert to Client →</button>

    <div class="field"><label>Last Call</label><input value="${e.lastCall?e.lastCall.toISOString().slice(0,10):''}" placeholder="e.g. today" data-edit="lastCall" data-entry="${e.id}" data-listid="${l.id}"></div>
    <div class="field"><label>Latest Feedback / Notes</label><textarea rows="2" data-edit="feedback" data-entry="${e.id}" data-listid="${l.id}">${escapeHtml(e.feedback||'')}</textarea></div>
  </div>
  <div class="section-label">To-Do's</div>
  ${todos.length? renderTodoList(todos) : `<div class="empty-state" style="padding:26px;"><div class="big">No follow-up set.</div><div class="tiny">Add a to-do to keep this prospect moving.</div></div>`}

function attachModalHandlers(root){
  root.querySelectorAll('[data-crumb]').forEach(el=>el.onclick=()=>{
    const idx=parseInt(el.dataset.crumb);
    if(idx===-1) closeModalStack(); else popModalTo(idx);
  });
  const closeBtn = root.querySelector('[data-action="closeModal"]'); if(closeBtn) closeBtn.onclick=()=>closeModalStack();
  root.querySelectorAll('[data-opendeal]').forEach(el=>el.onclick=()=>{
    openDealModal(el.dataset.listid, el.dataset.client, el.dataset.opendeal); render();
  });
  root.querySelectorAll('[data-toggledeal]').forEach(el=>el.onclick=(ev)=>{
    ev.stopPropagation();
    const frame = state.modalStack[0];
    const l=db.lists.find(x=>x.id===frame.listId); const c=l.clients.find(x=>x.id===frame.clientId);
    const d=c.deals.find(x=>x.id===el.dataset.toggledeal);
    d.complete=!d.complete; render();
  });
  root.querySelectorAll('[data-toggleactive]').forEach(el=>el.onclick=(ev)=>{
    ev.stopPropagation();
    const frame = state.modalStack[0];
    const l=db.lists.find(x=>x.id===frame.listId); const c=l.clients.find(x=>x.id===frame.clientId);
    const d=c.deals.find(x=>x.id===el.dataset.toggleactive);
    d.activeDeal = el.checked;
    flashToast(d.activeDeal ? `${d.name} marked as an Active Deal.` : `${d.name} removed from Active Deals.`);
    render();
  });
  const pick = root.querySelector('[data-action="pickContact"]'); if(pick) pick.onclick=()=>{
    openContactPicker({clientId: pick.dataset.client, slot: pick.dataset.slot}); render();
  };
  const pickEntry = root.querySelector('[data-action="pickEntryContact"]'); if(pickEntry) pickEntry.onclick=()=>{
    openContactPicker({listId: pickEntry.dataset.listid, entryId: pickEntry.dataset.entry}); render();
  };
  const addDeal = root.querySelector('[data-action="addDeal"]'); if(addDeal) addDeal.onclick=()=>{
    const name = prompt('Site / deal name (e.g. an intersection or address):');
    if(!name) return;
    const l=db.lists.find(x=>x.id===addDeal.dataset.client && false); // unused
    const frame = state.modalStack[state.modalStack.length-1];
    const list=db.lists.find(x=>x.id===frame.listId); const c=list.clients.find(x=>x.id===addDeal.dataset.client);
    c.deals.push({id:'deal'+uid(), name, complete:false, activeDeal:false, dueDate:null});
    render();
  };
  const ntDeal = root.querySelector('[data-action="newTodoInDeal"]'); if(ntDeal) ntDeal.onclick=()=>{
    openNewTodoModal({listId:ntDeal.dataset.listid, clientId:ntDeal.dataset.client, dealId:ntDeal.dataset.deal}); render();
  };
  const ntEntry = root.querySelector('[data-action="newTodoInEntry"]'); if(ntEntry) ntEntry.onclick=()=>{
    openNewTodoModal({listId:ntEntry.dataset.listid, entryId:ntEntry.dataset.entry}); render();
  };
  const conv = root.querySelector('[data-action="convertToDeal"]'); if(conv) conv.onclick=()=>{
    convertEntryToDeal(conv.dataset.listid, conv.dataset.entry); render();
  };
  root.querySelectorAll('[data-edit]').forEach(el=>{
    el.onchange=()=>{
      const l=db.lists.find(x=>x.id===el.dataset.listid); const e=l.entries.find(x=>x.id===el.dataset.entry);
      if(el.dataset.edit==='name') e.name=el.value;
      if(el.dataset.edit==='feedback') e.feedback=el.value;
      if(el.dataset.edit==='lastCall') e.lastCall=parseNaturalDate(el.value);
      render();
    };
  });
  if(state.contactPickerOpen) attachContactPickerHandlers(root);
}
function openNewTodoContext(){} // placeholder no-op used above safely

function convertEntryToDeal(listId, entryId){
  const flatList = db.lists.find(x=>x.id===listId);
  const entry = flatList.entries.find(x=>x.id===entryId);
  let clientsList = db.lists.find(x=>x.id==='clients');
  const newClient = {id:'client'+uid(), name:entry.name, primary:entry.contactId||null, secondary:[], deals:[]};
  clientsList.clients.push(newClient);
  // move todos
  db.todos.forEach(t=>{ if(t.entryId===entryId){ t.entryId=null; t.clientId=newClient.id; t.listId='clients'; } });
  flatList.entries = flatList.entries.filter(x=>x.id!==entryId);
  state.modalStack=[];
  flashToast(`${entry.name} converted to a Client. Add sites to start tracking deals.`);
}

/* ---------------- CONTACT PICKER (inline typeahead within modal) ---------------- */
function openContactPicker(ctx){
  state.contactPickerOpen = ctx; state.contactPickerQuery='';
}
function attachContactPickerHandlers(root){
  // rendered separately as an overlay panel appended after modal renders; handled in renderContactPickerPanel
}
function renderContactPickerPanel(){
  if(!state.contactPickerOpen) return '';
  const standalone = !!state.contactPickerOpen.standalone;
  const q = state.contactPickerQuery.toLowerCase();
  const matches = q ? db.contacts.filter(c=>(`${c.last} ${c.first}`).toLowerCase().includes(q) || (`${c.first} ${c.last}`).toLowerCase().includes(q)) : [];
  return `
  <div class="modal-overlay" style="z-index:200;" id="contactPickerOverlay">
    <div class="modal-card">
      <div class="modal-head"><div class="modal-title">${standalone?'New Contact':'Attach Contact'}</div><button class="modal-close" data-action="closeContactPicker">✕</button></div>
      <div class="modal-body">
        ${standalone? '' : `
        <div class="field autocomplete-box">
          <label>Search by name</label>
          <input id="contactSearchInput" placeholder="Start typing a last or first name…" value="${escapeAttr(state.contactPickerQuery)}">
          ${matches.length? `<div class="suggest-list">${matches.map(c=>`
            <div class="suggest-item" data-selectcontact="${c.id}">
              <b>${c.last}, ${c.first}</b>
              <div class="sub">${c.company||'No company'} · ${c.mobile||c.phone||'No number'}</div>

function finishContactPick(contactId){
  state.duplicatePrompt=null;
  if(state.contactPickerOpen && state.contactPickerOpen.clientId){
    const {clientId, slot} = state.contactPickerOpen;
    const clientsList = db.lists.find(l=>l.type==='deep' && l.clients.some(c=>c.id===clientId));
    const client = clientsList.clients.find(c=>c.id===clientId);
    if(slot==='primary') client.primary=contactId; else client.secondary.push(contactId);
  } else if(state.contactPickerOpen && state.contactPickerOpen.entryId){
    const {listId, entryId} = state.contactPickerOpen;
    const l = db.lists.find(x=>x.id===listId);
    const entry = l.entries.find(x=>x.id===entryId);
    entry.contactId = contactId;
  } else if(state.contactPickerOpen && state.contactPickerOpen.standalone){
    flashToast('Contact created.');
  }
  state.contactPickerOpen=null;
  render();
}

function attachmentListHtml(attachments, removeAttr){
  if(!attachments.length) return '';
  return attachments.map((a,i)=>`

      <button type="button" data-removeattach="${i}" data-removeattachfor="${removeAttr}" style="background:none;border:none;color:var(--bad);font-size:13px;">✕</button>
    </div>`).join('');
}
function filesToAttachments(fileList){
  return Array.from(fileList).map(f=>({name:f.name, size:f.size, url:URL.createObjectURL(f)}));
}
function wireAttachmentZone(overlay, zoneId, inputId, getAttachments, target){
  const zone = overlay.querySelector('#'+zoneId);
  const input = overlay.querySelector('#'+inputId);
  if(!zone || !input) return;
  input.onchange = ()=>{ getAttachments().push(...filesToAttachments(input.files)); render(); };
  zone.ondragover = (ev)=>{ ev.preventDefault(); zone.style.borderColor='var(--edge)'; };
  zone.ondragleave = ()=>{ zone.style.borderColor='var(--line)'; };
  zone.ondrop = (ev)=>{
    ev.preventDefault(); zone.style.borderColor='var(--line)';
    if(ev.dataTransfer.files.length) getAttachments().push(...filesToAttachments(ev.dataTransfer.files));
    render();
  };
  overlay.querySelectorAll(`[data-removeattachfor="${target}"]`).forEach(b=>b.onclick=()=>{
    getAttachments().splice(parseInt(b.dataset.removeattach),1); render();
  });
}

function importCSV(file){
  const reader = new FileReader();
  reader.onload = (e)=>{
    const text = e.target.result;
    const rows = parseCSV(text);
    if(!rows.length){ flashToast('No rows found in that file.'); return; }
    const header = rows[0].map(h=>h.trim());
    const idx = (name)=>header.indexOf(name);
    const iFirst=idx('First Name'), iLast=idx('Last Name'), iCompany=idx('Company'),
          iEmail=idx('E-mail Address'), iMobile=idx('Mobile Phone'), iPhone=idx('Business Phone');
    let added=0;
    for(let r=1;r<rows.length;r++){
      const row=rows[r]; if(!row || row.length<2) continue;
      const first=(row[iFirst]||'').trim(), last=(row[iLast]||'').trim();
      if(!first && !last) continue;
      db.contacts.push({
        id:'contact'+uid(), first, last,
        company:(row[iCompany]||'').trim(),
        email:(row[iEmail]||'').trim(),
        mobile:(row[iMobile]||'').trim(),
        phone:(row[iPhone]||'').trim(),
      });
      added++;
    }
    flashToast(`Imported ${added} contacts.`);
    render();
  };
  reader.readAsText(file);
}
function guessColumn(headers, keywords){
  const lower = headers.map(h=>h.toLowerCase());
  for(const kw of keywords){
    const idx = lower.findIndex(h=>h.includes(kw));
    if(idx>=0) return headers[idx];
  }
  return '';
}

    </div>
  </div>`;
  document.getElementById('app').appendChild(overlay);
  overlay.querySelectorAll('[data-action="closeImportTodos"]').forEach(b=>b.onclick=()=>{ state.importTodosModal=null; render(); });
  const fileInput = document.getElementById('importTodosFile');
  if(fileInput) fileInput.onchange=(e)=>{
    const file = e.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = (ev)=>{
      const rows = parseCSV(ev.target.result);
      if(!rows.length){ flashToast('No rows found in that file.'); return; }
      state.importTodosModal = {step:'map', headers: rows[0].map(h=>h.trim()), rows: rows.slice(1)};
      render();
    };
    reader.readAsText(file);
  };
  overlay.querySelectorAll('[data-maptarget]').forEach(sel=>sel.onchange=()=>{
    m.mapping[sel.dataset.maptarget] = sel.value;
  });
  const confirmBtn = overlay.querySelector('[data-action="confirmImportTodos"]');
  if(confirmBtn) confirmBtn.onclick=()=>{
    const headers = m.headers;
    const idx = (colName)=> colName ? headers.indexOf(colName) : -1;
    const iTitle=idx(m.mapping.title), iCat=idx(m.mapping.category), iDue=idx(m.mapping.due),
          iAssignee=idx(m.mapping.assignee), iDone=idx(m.mapping.completed), iNotes=idx(m.mapping.notes);
    let added=0;
    m.rows.forEach(row=>{
      if(!row || row.length<1) return;
      const title = iTitle>=0 ? (row[iTitle]||'').trim() : '';
      if(!title) return;
      let assignedTo = state.currentUser.id;
      if(iAssignee>=0){
        const name=(row[iAssignee]||'').trim().toLowerCase();
        const match = USERS.find(u=>u.name.toLowerCase().includes(name) || name.includes(u.name.split(' ')[0].toLowerCase()));
        if(match) assignedTo = match.id;
      }
      const doneText = iDone>=0 ? (row[iDone]||'').trim().toLowerCase() : '';
      const completed = ['yes','done','true','1','complete','completed'].includes(doneText);
      db.todos.push({
        id:uid(), title, category: iCat>=0?(row[iCat]||'').trim():'', dueDate: iDue>=0?parseNaturalDate((row[iDue]||'').trim()):null,
        assignedTo, createdBy:state.currentUser.id, type:'task', private:false, completed, isNew:false,
        notes: iNotes>=0?(row[iNotes]||'').trim():'', listId:null, clientId:null, dealId:null, entryId:null
      });
      added++;
    });
    state.importTodosModal=null;
    flashToast(`Imported ${added} to-do${added===1?'':'s'}.`);
    render();
  };
}
function parseCSV(text){
  // basic CSV parser handling quoted fields
  const rows=[]; let row=[]; let field=''; let inQuotes=false;
  for(let i=0;i<text.length;i++){
    const c=text[i];
    if(inQuotes){
      if(c==='"'){ if(text[i+1]==='"'){ field+='"'; i++; } else inQuotes=false; }
      else field+=c;
    } else {
      if(c==='"') inQuotes=true;
      else if(c===','){ row.push(field); field=''; }
      else if(c==='\r'){ /* skip */ }
      else if(c==='\n'){ row.push(field); rows.push(row); row=[]; field=''; }
      else field+=c;
    }
  }
  if(field.length || row.length){ row.push(field); rows.push(row); }
  return rows.filter(r=>r.length>1 || (r[0]&&r[0].trim()!==''));
}
function exportVCards(ids){
  if(!ids.length) return;
  ids.forEach((id,i)=>{
    const c = db.contacts.find(x=>x.id===id);
    if(!c) return;
    const vcf = [
      'BEGIN:VCARD','VERSION:3.0',
      `N:${c.last};${c.first};;;`,
      `FN:${c.first} ${c.last}`,
      c.company?`ORG:${c.company}`:'',
      c.website?`URL:${c.website}`:'',
      c.email?`EMAIL;TYPE=INTERNET:${c.email}`:'',
      c.mobile?`TEL;TYPE=CELL:${c.mobile}`:'',
      c.phone?`TEL;TYPE=WORK:${c.phone}`:'',
      (c.address||c.city||c.state||c.zip)?`ADR;TYPE=WORK:;;${c.address||''};${c.city||''};${c.state||''};${c.zip||''};`:'',
      'END:VCARD'
    ].filter(Boolean).join('\r\n');
    setTimeout(()=>{
      const blob = new Blob([vcf], {type:'text/vcard'});
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href=url; a.download=`${c.first}_${c.last}.vcf`;
      document.body.appendChild(a); a.click(); a.remove();
      URL.revokeObjectURL(url);
    }, i*150);
  });
  flashToast(`Exporting ${ids.length} vCard file${ids.length===1?'':'s'} to Downloads…`);
}

/* ---------------- TOAST ---------------- */
function flashToast(msg){ state.toast = msg; }
function showToastNow(){
  const el = document.createElement('div');
  el.className='toast'; el.textContent=state.toast;
  document.getElementById('app').appendChild(el);
  setTimeout(()=>{ el.remove(); }, 3200);
  state.toast=null;
}

/* ---------------- UTIL ---------------- */
function escapeHtml(str){
  if(str===undefined||str===null) return '';
  return String(str).replace(/[&<>"']/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}
function escapeAttr(str){ return escapeHtml(str); }

/* ---------------- POST-RENDER WIRING (contact picker / contacts page need extra wiring since injected after main render) ---------------- */
const _origRender = render;
render = function(){
  _origRender();
  if(state.mainView.type==='contacts') attachContactsHandlers();
  if(state.contactPickerOpen){
    const panelHost = document.createElement('div');
    panelHost.innerHTML = renderContactPickerPanel();
    document.getElementById('app').appendChild(panelHost.firstElementChild);
    const input = document.getElementById('contactSearchInput');
    if(input){
      input.focus();
      input.oninput=()=>{ state.contactPickerQuery=input.value; render(); };
    }
    document.querySelectorAll('[data-selectcontact]').forEach(el=>el.onclick=()=>{
      finishContactPick(el.dataset.selectcontact);
    });
    const closeCP = document.getElementById('contactPickerOverlay')?.querySelector('[data-action="closeContactPicker"]');
    if(closeCP) closeCP.onclick=()=>{ state.contactPickerOpen=null; render(); };
    const createBtn = document.querySelector('[data-action="createNewContact"]');
    if(createBtn) createBtn.onclick=()=>{
      const first=document.getElementById('newContactFirst').value.trim();
      const last=document.getElementById('newContactLast').value.trim();
      const company=document.getElementById('newContactCompany').value.trim();
      const website=document.getElementById('newContactWebsite').value.trim();
      const email=document.getElementById('newContactEmail').value.trim();
      const mobile=document.getElementById('newContactMobile').value.trim();
      const phone=document.getElementById('newContactPhone').value.trim();
      const address=document.getElementById('newContactAddress').value.trim();
      const city=document.getElementById('newContactCity').value.trim();
      const stateAbbr=document.getElementById('newContactState').value.trim();
      const zip=document.getElementById('newContactZip').value.trim();
      if(!first||!last){ flashToast('First and last name are required.'); return; }
      const pending={first,last,company,website,email,mobile,phone,address,city,state:stateAbbr,zip};
      const match = db.contacts.find(c=>
        (c.first.toLowerCase()===first.toLowerCase() && c.last.toLowerCase()===last.toLowerCase()) ||
        (mobile && c.mobile && c.mobile===mobile)
      );
      if(match){ state.duplicatePrompt={match, pending}; render(); }
      else {
        const c=Object.assign({id:'contact'+uid()}, pending);
        db.contacts.push(c);
        finishContactPick(c.id);
      }
    };
  }
};

window.addEventListener('resize', ()=>{ state.isMobile = window.innerWidth<=820; render(); });

// One persistent listener for the whole app's lifetime (rather than re-registering per
// render) so the hamburger menu and nav ellipsis menus reliably close on outside click
// or Escape — not just by clicking their own toggle button again.
document.addEventListener('click', (ev)=>{
  let changed=false;
  if(state.showAdminMenu && !ev.target.closest('.admin-menu') && !ev.target.closest('[data-action="toggleAdmin"]')){
    state.showAdminMenu=false; changed=true;
  }
  if(state.navContextMenu && !ev.target.closest('.nav-context-menu') && !ev.target.closest('[data-ellipsis]')){
    state.navContextMenu=null; changed=true;
  }
  if(state.showWidgetPicker && !ev.target.closest('[data-action="toggleWidgetPicker"]') && !ev.target.closest('[data-widgettoggle]')){
    state.showWidgetPicker=false; changed=true;
  }
  if(changed) render();
});
document.addEventListener('keydown', (ev)=>{
  if(ev.key!=='Escape') return;
  let changed=false;
  if(state.showAdminMenu){ state.showAdminMenu=false; changed=true; }
  if(state.navContextMenu){ state.navContextMenu=null; changed=true; }
  if(state.showWidgetPicker){ state.showWidgetPicker=false; changed=true; }
  if(changed) render();
});

render();
